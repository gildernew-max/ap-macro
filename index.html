<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX — Your AP Exam Edge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070d;--surf:#0d0d18;--card:#131320;--card2:#191928;
  --bdr:#1e1e30;--bdr2:#2a2a3e;
  --txt:#f0f0f8;--mut:#4a4a6a;--soft:#8888aa;--mid:#b0b0c8;
  --accent:#f0c040;
  --c1:#f0c040;--c2:#4fc3f7;--c3:#a78bfa;--c4:#34d399;--c5:#fb7185;--c6:#c084fc;--c7:#ff8c42;
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer}
a{color:inherit;text-decoration:none}
::selection{background:rgba(240,192,64,.25);color:var(--txt)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

.hero{position:relative;padding:2rem 1.5rem 1.75rem;overflow:hidden;border-bottom:1px solid var(--bdr)}
.hero::before{content:'';position:absolute;top:-80px;left:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(240,192,64,.06) 0%,transparent 65%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-60px;right:-60px;width:400px;height:400px;background:radial-gradient(circle,rgba(79,195,247,.04) 0%,transparent 65%);pointer-events:none}
.hero-inner{max-width:860px;margin:0 auto;position:relative;z-index:1}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-family:monospace;letter-spacing:3px;text-transform:uppercase;color:var(--accent);background:rgba(240,192,64,.08);border:1px solid rgba(240,192,64,.2);border-radius:2px;padding:4px 10px;margin-bottom:14px}
.hero-title{font-family:monospace;font-size:clamp(38px,8vw,62px);font-weight:900;letter-spacing:-1px;line-height:.95;color:var(--txt);margin-bottom:10px}
.hero-title .a{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--soft);line-height:1.65;max-width:420px}

.axie{flex-shrink:0;cursor:pointer;position:relative;user-select:none}
.axie svg{transition:transform .35s cubic-bezier(.34,1.56,.64,1);display:block}
.axie:hover svg{transform:rotate(-8deg) scale(1.08) translateY(-3px)}
.axie:active svg{transform:scale(.95)}
.axie-msg{position:absolute;right:90px;top:-4px;background:var(--card2);border:1px solid var(--bdr2);border-radius:10px 10px 0 10px;padding:9px 13px;font-size:12px;color:var(--mid);line-height:1.5;max-width:200px;opacity:0;transform:scale(.85) translateY(4px);transition:all .22s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.axie-msg.on{opacity:1;transform:scale(1) translateY(0)}
.axie-msg::after{content:'';position:absolute;right:-7px;top:10px;border:4px solid transparent;border-left-color:var(--bdr2)}

.stats{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.035);border:1px solid var(--bdr);border-radius:20px;padding:5px 11px;font-size:12px;color:var(--soft)}
.stat b{color:var(--txt);font-weight:600}

.cd{background:linear-gradient(135deg,rgba(240,192,64,.07),rgba(240,192,64,.03));border:1px solid rgba(240,192,64,.18);border-radius:8px;padding:14px 18px;margin-top:14px;display:flex;align-items:center;flex-wrap:wrap;min-height:0}
.cd:empty{display:none}
.cd-block{display:flex;flex-direction:column;align-items:center;padding:0 16px}
.cd-num{font-family:monospace;font-size:30px;font-weight:900;line-height:1;color:var(--accent)}
.cd-lbl{font-size:9px;font-family:monospace;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-top:2px}
.cd-div{width:1px;height:32px;background:var(--bdr2)}
.cd-info{flex:1;min-width:160px;padding-left:18px;font-size:13px;color:var(--soft);line-height:1.55}
.cd-swatches{display:flex;gap:6px;align-items:center;margin-left:auto;padding-left:16px;flex-wrap:wrap}
.swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0}
.swatch.on{border-color:rgba(255,255,255,.7);transform:scale(1.15)}

.xp-wrap{margin-top:12px}
.xp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-family:monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--mut)}
.xp-top span{color:var(--accent)}
.xp-track{height:5px;background:var(--bdr);border-radius:3px;overflow:hidden}
.xp-fill{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.34,1.56,.64,1)}

#app{max-width:860px;margin:0 auto}
.page{padding:1.25rem 1rem 5rem}

.tabbar{display:flex;border-bottom:1px solid var(--bdr);overflow-x:auto;background:var(--surf);position:sticky;top:0;z-index:40;scrollbar-width:none}
.tabbar::-webkit-scrollbar{display:none}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:12px 14px;font-size:10px;font-family:monospace;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);white-space:nowrap;transition:color .15s;flex-shrink:0}
.tab.on{border-bottom-color:var(--accent);color:var(--accent);font-weight:700}
.tab:hover:not(.on){color:var(--soft)}

.btn{background:transparent;border:1px solid var(--bdr2);border-radius:4px;padding:8px 16px;font-size:13px;color:var(--mid);transition:all .15s}
.btn:hover{border-color:var(--soft);color:var(--txt);background:rgba(255,255,255,.03)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.btn-hi{background:rgba(240,192,64,.1);border:1px solid rgba(240,192,64,.35);border-radius:6px;padding:11px 22px;font-size:14px;font-weight:600;color:var(--accent);transition:all .2s}
.btn-hi:hover{background:rgba(240,192,64,.18);border-color:rgba(240,192,64,.6);transform:translateY(-1px);box-shadow:0 4px 16px rgba(240,192,64,.15)}
.btn-hi:active{transform:scale(.98) translateY(0)}
.btn-hi:disabled{opacity:.35;cursor:not-allowed;pointer-events:none;transform:none}
.btn-full{display:block;width:100%;text-align:center}
.btn-del{color:var(--c5);border-color:rgba(251,113,133,.2);font-size:11px;padding:4px 10px}
.btn-del:hover{background:rgba(251,113,133,.08);border-color:rgba(251,113,133,.4)}
.btn-notion{color:var(--c3);border-color:rgba(167,139,250,.3);font-size:12px;padding:7px 13px;display:flex;align-items:center;gap:5px}

.card{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:16px 18px}
.card-hi{border-top:2px solid}
.scard{border-left:3px solid;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;padding:13px 16px;cursor:pointer;border-radius:6px;transition:background .15s,transform .15s}
.scard:hover{background:var(--card2);transform:translateX(2px)}

.ugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-top:8px}
.utile{border:1px solid var(--bdr);border-radius:8px;padding:18px 16px;cursor:pointer;position:relative;overflow:hidden;transition:all .2s;background:var(--card)}
.utile:hover{border-color:var(--bdr2);background:var(--card2);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.utile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.utile-ghost{font-family:monospace;font-size:44px;font-weight:900;line-height:1;opacity:.07;position:absolute;top:6px;right:10px;letter-spacing:-2px;user-select:none}

.ring{position:relative;flex-shrink:0}
.ring svg{transform:rotate(-90deg);display:block}
.ring-n{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:monospace;font-size:9px;font-weight:700;line-height:1;text-align:center}

.sh{display:flex;align-items:baseline;gap:12px;padding-bottom:9px;border-bottom:1px solid var(--bdr);margin:26px 0 12px}
.sh-n{font-family:monospace;font-size:34px;font-weight:900;opacity:.08;line-height:1;flex-shrink:0}
.sh-t{font-family:monospace;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}

.formula{background:rgba(0,0,0,.35);border:1px solid var(--bdr);border-radius:3px;padding:9px 15px;font-family:monospace;font-size:13px;letter-spacing:.5px;margin:5px 0;border-left:3px solid}
.formula .fl{font-size:10px;color:var(--mut)}

.lbl{font-family:monospace;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mut)}

.g2{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:11px}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:9px}

.fc-scene{perspective:900px;cursor:pointer;margin-bottom:16px}
.fc-inner{position:relative;min-height:220px;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1px solid var(--bdr);border-radius:8px;padding:32px 24px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:var(--card)}
.fc-face:hover{border-color:var(--bdr2)}
.fc-back{transform:rotateY(180deg);background:var(--card2)}

.qopt{padding:10px 14px;border-radius:4px;border:1px solid var(--bdr);cursor:pointer;font-size:13px;color:var(--soft);transition:all .15s;margin-bottom:7px;line-height:1.5}
.qopt:hover:not(.locked){background:rgba(255,255,255,.03);border-color:var(--bdr2);color:var(--mid)}
.qopt.locked{cursor:default}

.bubble-u{background:rgba(79,195,247,.09);border:1px solid rgba(79,195,247,.22);color:#6ed4f8;padding:10px 15px;border-radius:10px 10px 2px 10px;font-size:13px;line-height:1.65;max-width:78%}
.bubble-a{background:var(--card);border:1px solid var(--bdr);color:var(--mid);padding:12px 15px;border-radius:10px 10px 10px 2px;font-size:13px;line-height:1.75;max-width:82%}
.cbline{display:flex;gap:7px;padding:3px 0;align-items:flex-start}
.cbline .arr{color:var(--accent);font-size:10px;padding-top:4px;flex-shrink:0}

.setup{max-width:440px;margin:3rem auto;padding:0 1rem}
.setup-steps{background:rgba(79,195,247,.05);border:1px solid rgba(79,195,247,.18);border-radius:6px;padding:14px 18px;font-size:12px;color:var(--soft);line-height:1.95;margin-bottom:18px}

.grade-badge{background:var(--card);border-radius:8px;padding:12px 16px;min-width:148px}
.grade-n{font-family:monospace;font-size:30px;font-weight:900;line-height:1}
.grade-bar{height:3px;border-radius:2px;background:var(--bdr);margin-top:8px;overflow:hidden}
.grade-fill{height:100%;border-radius:2px;transition:width .9s cubic-bezier(.34,1.56,.64,1)}
.tip-box{background:rgba(240,192,64,.05);border:1px solid rgba(240,192,64,.18);border-left:3px solid var(--accent);border-radius:4px;padding:13px 17px}

ul.blist{padding:0;list-style:none;margin:0}
ul.blist li{padding:4px 0 4px 16px;position:relative;color:var(--soft);font-size:12px;line-height:1.65;border-bottom:1px solid rgba(255,255,255,.025)}
ul.blist li::before{content:'›';position:absolute;left:0;color:var(--mut)}

.notion-ta{background:#060610;border:1px solid rgba(167,139,250,.22);border-radius:4px;padding:10px;font-family:monospace;font-size:11px;color:var(--soft);width:100%;height:130px;resize:none;outline:none;margin-top:8px;line-height:1.6}

.unav{position:fixed;bottom:0;left:0;right:0;background:rgba(6,6,12,.97);border-top:1px solid var(--bdr);display:flex;justify-content:center;z-index:100;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.unav-btn{background:none;border:none;border-top:2px solid transparent;padding:7px 0;flex:1;max-width:100px;font-family:monospace;font-size:8px;letter-spacing:.5px;text-transform:uppercase;color:var(--mut);transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.unav-btn:hover{color:var(--soft)}
.unav-btn.on{border-top-color:var(--accent);color:var(--accent)}
.unav-n{font-size:17px;font-weight:900;font-family:monospace;line-height:1}
.has-unav{padding-bottom:58px}

.cf{position:fixed;width:7px;height:7px;border-radius:2px;pointer-events:none;z-index:9999;animation:cffall linear forwards}
@keyframes cffall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(760deg);opacity:0}}

.toast{position:fixed;top:18px;right:18px;background:rgba(240,192,64,.12);border:1px solid rgba(240,192,64,.35);border-radius:6px;padding:9px 15px;font-family:monospace;font-size:12px;color:var(--accent);z-index:9998;animation:tin .25s ease,tout .25s ease 1.75s forwards;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.4)}
@keyframes tin{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes tout{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(16px)}}

.qfoot{border-top:1px solid var(--bdr);padding:22px 24px;background:linear-gradient(180deg,transparent,rgba(240,192,64,.025));max-width:860px;margin:0 auto}
.qfoot-q{font-size:13px;color:var(--soft);line-height:1.8;font-style:italic;margin-bottom:8px}
.qfoot-a{font-family:monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mut)}
.qfoot-a span{color:var(--accent)}
.qfoot-btn{background:none;border:none;font-family:monospace;font-size:9px;letter-spacing:1px;color:var(--mut);cursor:pointer;padding:0;margin-top:5px;text-transform:uppercase;transition:color .15s;display:block}
.qfoot-btn:hover{color:var(--soft)}

.err{color:var(--c5);font-size:12px;padding:6px 0;font-family:monospace}
.spin{width:15px;height:15px;border:2px solid var(--bdr2);border-top-color:var(--c2);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.fadein{animation:fadein .3s ease both}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.scalein{animation:scalein .25s cubic-bezier(.34,1.56,.64,1) both}
@keyframes scalein{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}

@media(max-width:540px){
  .hero{padding:1.5rem 1rem 1.25rem}
  .hero-title{font-size:clamp(32px,9vw,48px)}
  .ugrid,.g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr}
  .grade-badge{min-width:120px}
  .cd-swatches{display:none}
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-top">
      <div style="flex:1;min-width:0">
        <div class="hero-eyebrow">🎓 AP Exam Prep · CoCo's Study Tool</div>
        <div class="hero-title"><span class="a">APEX</span></div>
        <div class="hero-sub">Turn any lecture into a complete study system.</div>
      </div>
      <div class="axie" onclick="axieTap()" id="axie">
        <svg width="82" height="82" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="40" cy="51" rx="21" ry="19" fill="#12122a" stroke="var(--accent)" stroke-width="1.4"/>
          <ellipse cx="40" cy="28" rx="18" ry="17" fill="#12122a" stroke="var(--accent)" stroke-width="1.4"/>
          <polygon points="25,15 20,4 29,13" fill="var(--accent)" opacity=".9"/>
          <polygon points="55,15 60,4 51,13" fill="var(--accent)" opacity=".9"/>
          <rect x="23" y="12" width="34" height="5" rx="1.5" fill="var(--accent)"/>
          <rect x="36" y="7" width="8" height="6" rx="1" fill="var(--accent)"/>
          <line x1="57" y1="14" x2="62" y2="21" stroke="var(--accent)" stroke-width="2"/>
          <circle cx="62" cy="22" r="2.5" fill="var(--accent)"/>
          <circle cx="32" cy="27" r="6.5" fill="#08081a" stroke="var(--c2)" stroke-width="1.5"/>
          <circle cx="48" cy="27" r="6.5" fill="#08081a" stroke="var(--c2)" stroke-width="1.5"/>
          <circle cx="33" cy="26" r="3.2" fill="var(--c2)"/>
          <circle cx="49" cy="26" r="3.2" fill="var(--c2)"/>
          <circle cx="34.2" cy="24.8" r="1.2" fill="white" opacity=".85"/>
          <circle cx="50.2" cy="24.8" r="1.2" fill="white" opacity=".85"/>
          <polygon points="40,33 37,37 43,37" fill="var(--accent)"/>
          <ellipse cx="19" cy="53" rx="7" ry="11" fill="var(--accent)" opacity=".15" transform="rotate(-12 19 53)"/>
          <ellipse cx="61" cy="53" rx="7" ry="11" fill="var(--accent)" opacity=".15" transform="rotate(12 61 53)"/>
          <line x1="32" y1="68" x2="27" y2="75" stroke="var(--accent)" stroke-width="1.8"/>
          <line x1="32" y1="68" x2="32" y2="76" stroke="var(--accent)" stroke-width="1.8"/>
          <line x1="32" y1="68" x2="37" y2="75" stroke="var(--accent)" stroke-width="1.8"/>
          <line x1="48" y1="68" x2="43" y2="75" stroke="var(--accent)" stroke-width="1.8"/>
          <line x1="48" y1="68" x2="48" y2="76" stroke="var(--accent)" stroke-width="1.8"/>
          <line x1="48" y1="68" x2="53" y2="75" stroke="var(--accent)" stroke-width="1.8"/>
        </svg>
        <div class="axie-msg" id="axie-msg">Hoot! Let's ace this 🎓</div>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="cd" id="cd"></div>
    <div class="xp-wrap" id="xp"></div>
  </div>
</div>

<div id="app"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────────────────────────────
const MODEL        = 'claude-sonnet-4-20250514';
const PALETTE      = ['#f0c040','#4fc3f7','#a78bfa','#34d399','#fb7185','#c084fc','#ff8c42'];
const AC           = ['#f0c040','#4fc3f7','#a78bfa','#34d399','#fb7185','#c084fc'];
const ac           = i => AC[i % AC.length];
const AP_EXAM_DATE = new Date('2026-05-07T08:00:00'); // single source of truth
const AXIE_DURATION = 3500; // ms — matches axisSay display time; queue derives from this

// ─────────────────────────────────────────────────────────────────────────────
// MESSAGE QUEUE — sequential Axie messaging, no collision
// Only level-up, streak milestones, and adaptive pressure use axieEnqueue.
// Everything else (quiz feedback, taps, one-shots) calls axisSay directly.
// ─────────────────────────────────────────────────────────────────────────────
const axieQ = { msgs: [], busy: false, _at: null };

function axieEnqueue(msg) {
  axieQ.msgs.push(msg);
  axieFlush();
}

function axieFlush() {
  if (axieQ.busy || !axieQ.msgs.length) return;
  axieQ.busy = true;
  axieSay(axieQ.msgs.shift());
  setTimeout(() => { axieQ.busy = false; axieFlush(); }, AXIE_DURATION); // same duration, no drift
}

function axieAfterQueue(cb) {
  const check = () => {
    if (!axieQ.busy && axieQ.msgs.length === 0) cb();
    else setTimeout(check, 100);
  };
  setTimeout(check, 100);
}

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
const $    = id => document.getElementById(id);
const e    = s  => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const bold = s  => e(s).replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--txt)">$1</strong>');

// ─────────────────────────────────────────────────────────────────────────────
// STATE  — single object, all mutable globals live here
// ─────────────────────────────────────────────────────────────────────────────
const state = {
  // persisted
  apiKey:   '',
  accent:   '#f0c040',
  sessions: [],
  xp:   { xp:0, lv:1, streak:0, last:'', sess:0, cards:0, quizzes:0 },
  perf: {},       // { [unitId]: { correct, total, ignored, topics: { [topic]: { correct, total } } } }

  // navigation
  page:      'home',
  _setupErr: '',
  htab:      'sessions',
  tab:       'visual',
  unitId:    1,
  curIdx:    -1,
  focusUnit: null,  // unitId flagged by prediction — drives visual bias on unit tiles
  lastDrill: 0,     // timestamp — gates 10-min auto-drill cooldown

  // per-session interaction
  axIdx:     0,
  fcIdx:     0,
  fcFlipped: false,
  picks:     {},
  checked:   {},
  chatH:     [],
  mcqP:      {},
  qScore:    0,
  qTotal:    0,
  qIdx:      0,
};

// Convenience accessor — current session object (or null)
const cur = () => state.sessions[state.curIdx] ?? null;

// Load persisted state from localStorage (called once at init)
function loadState() {
  state.apiKey    = localStorage.getItem('apex-key')      || '';
  state.accent    = localStorage.getItem('apex-accent')   || '#f0c040';

       <div class="cd-div"></div>
       <div class="cd-info">until <strong style="color:var(--txt)">AP Macro Exam</strong><br><span style="font-size:11px;color:var(--mut)">${AP_EXAM_DATE.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})} · 8:00 AM</span></div>
       <div class="cd-swatches">${PALETTE.map(c =>
         `<div class="swatch${c === state.accent ? ' on' : ''}" style="background:${c}" onclick="setAccent('${c}')"></div>`

// BEHAVIORAL ENGINE — tier, bonus, momentum, adaptive pressure

function getTier(lv) {
  if (lv < 3)  return 'Apprentice';
  if (lv < 6)  return 'Strategist';
  if (lv < 10) return 'Analyst';
  return 'Macro Master';
}

function streakBonus(streak) {
  return Math.min(1 + (streak * 0.05), 1.5); // caps at +50% (30-day streak)
}

function sessionsToday() {
  const td = new Date().toDateString();
  return state.sessions.filter(s => new Date(s.date).toDateString() === td).length;
}

function normTopic(t) {
  return t?.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'') || null;
}

const UNIT_TOPICS = {
  1: ['scarcity','opportunity_cost','ppc','comparative_advantage','supply_demand'],
  2: ['gdp','unemployment','inflation_cpi','business_cycle','gdp_deflator'],
  3: ['asad_model','fiscal_policy','multiplier_effect','automatic_stabilizers','output_gaps'],
  4: ['money_supply','t_accounts','money_multiplier','fed_tools','loanable_funds'],
  5: ['phillips_curve','crowding_out','quantity_theory','long_run_growth','stagflation'],
  6: ['exchange_rates','balance_of_payments','forex_market','interest_rate_chain','net_exports'],
};

function getUnitProfile() {
  const profile = {};
  for (const u of UNITS) {
    const unitSessions = state.sessions.filter(s => s.unit?.id === u.id);
    const perf         = state.perf[u.id];
    const avgScore     = perf?.total > 0
      ? perf.correct / perf.total
      : unitSessions.length && unitSessions[0].instructorGrade
        ? unitSessions[0].instructorGrade.score / 100
        : null;
    const lastStudied  = unitSessions.length
      ? Math.max(...unitSessions.map(s => new Date(s.date).getTime()))
      : null;
    const daysSince    = lastStudied
      ? Math.floor((Date.now() - lastStudied) / 86400000)
      : Infinity;
    const wm           = u.ex.match(/(\d+)[–-](\d+)/);
    const weight       = wm ? (parseInt(wm[1]) + parseInt(wm[2])) / 2 : 15;
    const scoreSignal  = avgScore != null ? (1 - avgScore) : 0.5;
    const urgency      = scoreSignal * (weight / 10) + (Math.min(daysSince, 30) / 45);
    profile[u.id] = {
      id:u.id, lbl:u.lbl, col:u.col, em:u.em, ex:u.ex, weight,
      sessions:unitSessions.length, avgScore, daysSince, urgency,
      ignored: perf?.ignored ?? 0,
    };
  }
  return profile;
}

function getWeakestUnit() {
  const profile = Object.values(getUnitProfile());
  const unstudied = profile.filter(u => u.sessions === 0);
  if (unstudied.length) return unstudied.sort((a,b) => b.weight - a.weight)[0];
  return profile.sort((a,b) => b.urgency - a.urgency)[0];
}

function getWeakTopics(unitId) {
  const topics = state.perf[unitId]?.topics;
  if (!topics) return [];
  return Object.entries(topics)
    .filter(([,v]) => v.total >= 3 && (v.correct / v.total) < 0.6)
    .map(([k,v]) => ({ topic:k, label:k.replace(/_/g,' '), score:v.correct/v.total, total:v.total }))
    .sort((a,b) => a.score - b.score);
}

function getWeakestTopic() {
  let worst = null;
  for (const u of UNITS) {
    const weak = getWeakTopics(u.id);
    if (!weak.length) continue;
    const top = weak[0];
    if (!worst || top.score < worst.score) worst = { ...top, unitId:u.id, unitLbl:u.lbl };
  }
  return worst;
}

function renderAdaptivePressure() {
  if (window._pressureFired) return;
  window._pressureFired = true;

  const G         = state.xp;
  const COOLDOWN  = 1000 * 60 * 10;
  const weakTopic = getWeakestTopic();

  // ── PREDICTIVE: topic-level, highest priority ──
  if (weakTopic && weakTopic.score < 0.5) {
    state.focusUnit = weakTopic.unitId;
    setTimeout(() => {
      axieEnqueue(`⚠️ You're likely to miss ${weakTopic.label} questions — ${Math.round(weakTopic.score*100)}% correct so far.`);
      if (Date.now() - (state.lastDrill || 0) < COOLDOWN) {
        axieEnqueue(`→ Do one session on ${weakTopic.label} to clear this.`);
      } else {
        axieEnqueue(`→ Pulling up a quick drill now.`);
        axieAfterQueue(() => {
          state.lastDrill = Date.now();
          persistLastDrill();
          launchDrill(weakTopic.unitId, weakTopic.topic);
        });
      }
    }, 1800);
    return;
  }

  const weakest = getWeakestUnit();
  const p       = weakest ? getUnitProfile()[weakest.id] : null;

  if (!weakest || state.sessions.length < 2) {
    if (G.streak >= 3) {
      setTimeout(() => axieSay(
        G.streak >= 7
          ? `📈 ${G.streak} days straight. Most people quit by now.`
          : `📊 ${G.streak}-day streak — you're building something real.`
      ), 2000);
    } else if (Math.random() < 0.2) {
      setTimeout(() => axieSay("🧠 Most students skip this part. You're not most students."), 3500);
    }
    return;
  }

  let msg = null, delay = 1800, followUp = null;

  if (p.sessions === 0) {
    if (p.ignored === 0)      { msg = `📌 You haven't touched ${p.em} Unit ${p.id} yet — it's ${p.ex} of the exam.`; followUp = `→ One session on Unit ${p.id} fixes this today.`; }
    else if (p.ignored === 1) { msg = `📌 Unit ${p.id} is still untouched. That gap is growing.`; followUp = `→ Do one session on Unit ${p.id} right now.`; }
    else                      { msg = `🚨 You're actively avoiding Unit ${p.id} (${p.lbl}). That's dangerous.`; followUp = `→ Unit ${p.id} is ${p.ex} of the exam. This is the one.`; }
    if (!state.perf[weakest.id]) state.perf[weakest.id] = { correct:0, total:0, ignored:0, topics:{} };
    state.perf[weakest.id].ignored++; persistPerf();

  } else if (p.avgScore != null && p.avgScore < 0.7) {
    if (p.ignored === 0)      { msg = `⚠️ Unit ${p.id} (${p.lbl}) is your weakest — ${Math.round(p.avgScore*100)}% avg. That's fixable.`; followUp = `→ Do one session on Unit ${p.id} today.`; }
    else if (p.ignored === 1) { msg = `⚠️ Unit ${p.id} is still your weakest. This is starting to matter.`; followUp = `→ One focused session changes this number.`; }
    else                      { msg = `🚨 You're avoiding Unit ${p.id} (${p.lbl}). Real risk before the exam.`; followUp = `→ This is the one. Do it now.`; }
    if (!state.perf[weakest.id]) state.perf[weakest.id] = { correct:0, total:0, ignored:0, topics:{} };
    state.perf[weakest.id].ignored++; persistPerf();

  } else if (p.daysSince >= 4) {
    msg = `📅 Unit ${p.id} was ${p.daysSince} days ago. AP exams don't forget.`;
    followUp = `→ A quick review session keeps it sharp.`;

  } else if (G.streak >= 3) {
    msg = G.streak >= 7
      ? `📈 ${G.streak} days straight. Most people quit by now.`
      : `📊 ${G.streak}-day streak — you're building something real.`;
    delay = 2000;

  } else if (Math.random() < 0.2) {
    msg = "🧠 Most students skip this part. You're not most students.";
    delay = 3500;
  }

  if (msg) {
    setTimeout(() => {
      axieEnqueue(msg);
      if (followUp) axieEnqueue(followUp);
    }, delay);
  }
}

function renderHeroFullBar() {
  const G    = state.xp;
  const xpEl = $('xp');
  if (!xpEl) return;
  xpEl.innerHTML =

     <div class="xp-track"><div class="xp-fill" style="width:100%;background:linear-gradient(90deg,${state.accent},#ff9f40)"></div></div>`;
  setTimeout(() => renderHero(), 400);
}

function addXP(pts, msg) {
  const G        = state.xp;
  const streak   = streakBonus(G.streak);
  const count    = sessionsToday();
  const momentum = Math.min(1 + (count - 1) * 0.1, 1.4);
  const actual   = Math.round(pts * streak * momentum);
  G.xp += actual;

  const parts = [`+${actual} XP  ${msg}`];
  if (G.streak >= 2) parts.push(`🔥 +${Math.round((streak-1)*100)}% streak`);
  if (momentum > 1)  parts.push(`⚡ +${Math.round((momentum-1)*100)}% momentum`);
  showToast(parts.join('  '));

  let leveled = false;
  while (G.xp >= xpNeeded(G.lv)) {
    G.xp -= xpNeeded(G.lv);
    G.lv++;
    leveled = true;
  }
  if (leveled) {
    renderHeroFullBar();
    setTimeout(() => {
      launchConfetti();
      const messages = {
        'Apprentice':   `🏆 Apprentice — you're building the habit. Keep going.`,
        'Strategist':   `🏆 Strategist — you're ahead of where you should be.`,
        'Analyst':      `🏆 Analyst — this is where most people stall. You didn't.`,
        'Macro Master': `🏆 Macro Master — you're in rare company now.`,
      };
      axieEnqueue(messages[getTier(G.lv)]);
    }, 400);
  }
  persistXP();
  if (!leveled) renderHero();
}

function checkStreak() {
  const td  = new Date().toDateString();
  const yd  = new Date(Date.now() - 86400000).toDateString();
  if (state.xp.last === td) return;
  const wasStreak  = state.xp.streak;
  const continued  = state.xp.last === yd;
  state.xp.streak  = continued ? state.xp.streak + 1 : 1;
  state.xp.last    = td;
  if (!continued && wasStreak > 0) {
    setTimeout(() => axieSay("⚠️ You almost lost it. Reset — but you're back."), 800);
  } else if ([3, 7, 14].includes(state.xp.streak)) {
    setTimeout(() => {
      launchConfetti();
      axieEnqueue(`🔥 ${state.xp.streak}-day streak! You're locked in.`);
    }, 150);
  }
  persistXP();
}

function countdown() {
  const diff = AP_EXAM_DATE - new Date();
  if (diff <= 0) return { d:0, h:0, done:true };
  return { d: Math.floor(diff / 86400000), h: Math.floor((diff % 86400000) / 3600000), done:false };
}

function showToast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 2100);
}

function launchConfetti() {
  const cols = ['#f0c040','#4fc3f7','#a78bfa','#34d399','#fb7185','#c084fc','#ff8c42','#fff'];
  for (let i = 0; i < 70; i++) {
    const el = document.createElement('div'); el.className = 'cf';
    el.style.cssText = `left:${Math.random()*100}vw;background:${cols[Math.floor(Math.random()*cols.length)]};transform:rotate(${Math.random()*360}deg);animation-duration:${1.4+Math.random()*2}s;animation-delay:${Math.random()*.6}s`;
    document.body.appendChild(el); setTimeout(() => el.remove(), 3800);
  }

}

    <svg width="${sz}" height="${sz}" viewBox="0 0 34 34">
      <circle cx="17" cy="17" r="${r}" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="3"/>
      <circle cx="17" cy="17" r="${r}" fill="none" stroke="${col}" stroke-width="3" stroke-dasharray="${d} ${g}" stroke-linecap="round"/>
    </svg>
    <div class="ring-n" style="color:${col}">${pct}%</div>
  </div>`;
}

const UNIT_OVERVIEWS = [
  {id:1,tag:'The foundation everything else is built on.',intro:'Before you can understand why the stock market moves or what the Fed does, you need to get comfortable with a few big ideas. Unit 1 is all about those fundamentals — and once these click, the rest of AP Macro starts to make sense.',secs:[{t:'Scarcity — the reason economics exists',b:'Here\'s the core problem: people want more than they can have. Resources — time, money, land, labor — are limited. Wants are not. That gap is called **scarcity**, and it\'s why every decision has a cost. Even choosing Netflix over studying has an opportunity cost.'},{t:'Opportunity cost — the real price of everything',b:'Every time you choose one thing, you give up another. That thing you give up is your **opportunity cost**. The true cost of any decision isn\'t just what you paid — it\'s what you didn\'t do instead.'},{t:'The PPC — a picture of what\'s possible',b:'The **Production Possibilities Curve** shows the maximum output a country can produce. On the curve = efficient. Inside = wasting resources. Outside = impossible. Outward shift = **economic growth**.'},{t:'Comparative advantage — why trade makes everyone richer',b:'Even if one country is better at producing everything, it still makes sense to trade. Focus on what you\'re **relatively** better at. Everyone ends up with more.'},{t:'Supply & demand — how markets find their price',b:'When price rises, buyers want less and sellers want more. When they meet, you get **equilibrium**. Master the shifters and you can predict almost any market outcome.'}],tip:'Unit 1 is 5–10% of the exam but runs through everything. Opportunity cost, PPC shifts, and comparative advantage appear in FRQs constantly.'},
  {id:2,tag:'How do we know if the economy is healthy?',intro:'You can\'t fix what you can\'t measure. Unit 2 is about the scoreboard — the tools economists use to take the economy\'s temperature. These are the numbers policymakers obsess over every day.',secs:[{t:'GDP — the economy\'s report card',b:'**Gross Domestic Product** = total value of everything a country produces. GDP = C + Ig + G + Xn. NOT included: used goods, stocks, underground activity. **Real GDP** adjusts for inflation — always use it to compare across years.'},{t:'Unemployment — not everyone counts',b:'You\'re only "unemployed" if actively looking. Stop looking → fall out of labor force → rate goes DOWN. Three types: **frictional** (between jobs), **structural** (skills mismatch), **cyclical** (recession). Natural rate = frictional + structural.'},{t:'Inflation — when your dollar buys less',b:'Inflation = general rise in price level. Main measure = **CPI**. **Borrowers win** — they repay with cheaper dollars. **Lenders and savers lose** — money loses purchasing power.'},{t:'The business cycle — boom and bust',b:'Economies expand, peak, contract, trough. **Recessionary gap** = output below potential. **Inflationary gap** = economy running hot. Where you are determines which policy tools make sense.'}],tip:'Unit 2 is 12–17% of the exam. FRQs love to ask you to calculate unemployment rate, inflation rate, or GDP deflator. Know your formulas cold.'},
  {id:3,tag:'What causes booms and busts — and what can the government do?',intro:'Unit 3 is the biggest, most tested unit. The AS/AD model shows how the whole economy works in one graph, and fiscal policy is what the government does when things go wrong.',secs:[{t:'The AS/AD model — the economy in one graph',b:'**AD** slopes down. **SRAS** slopes up. **LRAS** is vertical at potential output. Where AD meets SRAS = short-run equilibrium. Positive demand shock → ↑ output AND ↑ prices. Negative supply shock = **stagflation** — the worst combo.'},{t:'The multiplier — small changes, big effects',b:'Government spends $1 → becomes income → someone spends 80¢ → and so on. **Spending multiplier** = 1 ÷ MPS. **Tax multiplier** = −MPC ÷ MPS. Always 1 less in absolute value than the spending multiplier.'},{t:'Fiscal policy — the government\'s toolkit',b:'**Expansionary** (recession): ↑ spending, ↓ taxes → AD right. **Contractionary** (inflation): ↓ spending, ↑ taxes → AD left. **Automatic stabilizers** kick in without any new legislation.'},{t:'Long-run self-correction',b:'Recessionary gap → wages fall → SRAS right → full employment. Inflationary gap → wages rise → SRAS left → full employment. Takes time — that\'s why policymakers don\'t always wait.'}],tip:'Unit 3 is 17–27% of the exam. Draw the AS/AD model, show shifts, identify gaps, explain policy — all connected.'},
  {id:4,tag:'Where money comes from and how the Fed controls it.',intro:'Most of the money in the economy was created by banks through lending. Unit 4 explains how that works and why interest rates are the most-watched number in finance.',secs:[{t:'What is money, really?',b:'M1 = cash + checking accounts. M2 adds savings + money market funds. The monetary base is reserves + currency — the raw material banks use to create money.'},{t:'T-accounts — how banks see the world',b:'Assets on the left (cash, loans, reserves). Liabilities on the right (deposits). When you deposit $100: bank\'s assets ↑ $100, liabilities ↑ $100. **Assets = Liabilities + Equity. Always.**'},{t:'The money multiplier — how banks create money',b:'With 10% reserve requirement, $1,000 deposit → bank keeps $100, lends $900. Then $810, then $729… **Money Multiplier = 1 ÷ Reserve Requirement.** That $1,000 can support up to $10,000 in deposits.'},{t:'The Fed\'s toolkit',b:'Open market operations: buy bonds → ↑ money supply. Discount rate: lower it → banks borrow more. Reserve requirements: lower them → more lending. Today the Fed mainly uses **interest on reserves (IOR)** to set policy.'}],tip:'Unit 4 is 18–23% of the exam. Know T-accounts cold. The FRQ often gives you a deposit and asks you to trace through the banking system. Practice the loanable funds graph.'},
  {id:5,tag:'What happens in the long run when policy goes wrong — or right?',intro:'Unit 5 is where short-run thinking meets long-run reality. Policies that feel good today can have painful side effects later.',secs:[{t:'The Phillips Curve — inflation vs unemployment',b:'Short run: lower unemployment → higher inflation. **SRPC** is downward sloping. Long run: no trade-off — **LRPC is vertical** at the natural rate. The SRPC mirrors the SRAS — they shift together. Stagflation shifts both SRAS left and SRPC right.'},{t:'Crowding out — the dark side of deficit spending',b:'Government borrows → ↑ demand for loanable funds → real rates rise → private investment falls = **crowded out**. Budget surplus does the reverse: **crowding in** → lower rates → more investment.'},{t:'The Quantity Theory of Money',b:'**M × V = P × Y**. If M doubles and V, Y stay constant → P doubles → inflation. This is why excessive money printing causes inflation in the long run.'},{t:'Long-run economic growth',b:'Real growth = LRAS shifting right. Drivers: ↑ resources, ↑ technology, ↑ productivity. Government accelerates this with R&D, tax credits, education, deregulation. PPC shifts outward.'}],tip:'Unit 5 is 20–30% — highest weight of any unit. Know Phillips Curve shifts, crowding out in the loanable funds graph, and long-run policy consequences cold.'},
  {id:6,tag:'How countries trade, borrow, and set exchange rates.',intro:'Unit 6 zooms out to the global economy. When the Fed raises rates, what happens to the dollar? It shows up on every AP Macro exam.',secs:[{t:'The balance of payments',b:'**Current account**: trade in goods, services, income. **Capital & Financial account**: purchases of assets. Golden rule: **Current + Capital = 0**. A trade deficit → capital inflows.'},{t:'Exchange rates',b:'Dollar **appreciates** → imports cheaper, exports pricier abroad → net exports fall → AD shifts left. Dollar **depreciates** → exports boom → net exports rise → AD shifts right.'},{t:'The interest rate → exchange rate chain',b:'**Fed raises rates → US assets more attractive → demand for dollars ↑ → dollar appreciates → imports ↑, exports ↓ → net exports fall → AD shifts left.** Draw this chain for any Unit 6 FRQ.'}],tip:'Unit 6 is 10–13% but heavy in FRQs. The exchange rate / interest rate chain is almost guaranteed. Practice the forex market graph.'},
];

function detectUnit(s) {
  const tx = [s.title, s.summary, ...(s.studyGuide?.keyTakeaways || []),
    ...(s.studyGuide?.sections || []).map(x => x.title + ' ' + (x.cards || []).map(c => c.title).join(' '))
  ].join(' ').toLowerCase();
  let best = null, top = 0;
  for (const u of UNITS) {
    const sc = u.kw.filter(k => tx.includes(k)).length;
    if (sc > top) { top = sc; best = u; }
  }
  return best || UNITS[3];
}

async function callClaude(msgs, sys) {
  if (!state.apiKey) {
    // FIX C: route through render() instead of calling renderSetup() directly
    state.page     = 'setup';
    state._setupErr = 'Enter your API key to continue.';
    render();
    throw new Error('no-key');
  }
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'content-type':'application/json', 'x-api-key':state.apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body: JSON.stringify({ model:MODEL, max_tokens:4000, system:sys, messages:msgs })
  });
  if (r.status === 401) {
    localStorage.removeItem('apex-key');
    state.apiKey    = '';
    // FIX C: route through render() instead of calling renderSetup() directly
    state.page      = 'setup';
    state._setupErr = '❌ Invalid API key — please re-enter from console.anthropic.com';
    render();
    throw new Error('401');
  }
  if (!r.ok) throw new Error(`API ${r.status}: ${(await r.text()).slice(0, 200)}`);
  return (await r.json()).content.filter(b => b.type === 'text').map(b => b.text).join('');
}

async function doGen() {
  const tx = $('tx')?.value?.trim(); if (!tx) return;
  $('gb').disabled = true; $('gl').style.display = 'flex'; $('ge').textContent = '';
  try {
    const sys = `You are an expert AP Macroeconomics tutor. Given a lecture transcript, respond ONLY with valid JSON — no markdown fences:
{"title":"concise title","summary":"2-3 sentence plain-English summary","instructorGrade":{"score":85,"rationale":"2-3 honest sentences. Score 1-100: clarity (40pts), examples (20pts), AP coverage (20pts), engagement (20pts)."},"studyGuide":{"keyTakeaways":["...","...","...","..."],"sections":[{"title":"Section Title","cards":[{"label":"label","title":"Card Title","bullets":["point with **bold** terms"]},{"label":"label","title":"Card Title","text":"prose with **bold** terms"}],"formulas":[{"eq":"formula","label":"what it means"}]}],"formulas":[{"eq":"formula","label":"description"}]},"flashcards":[{"term":"...","definition":"...","example":"..."}],"quiz":[{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"answer":"A","explanation":"...","topic":"snake_case_topic"}],"resources":[{"name":"...","url":"...","why":"..."}]}
Rules: 2-3 sections, 2-3 cards each. 4 takeaways. 3-5 global formulas. 6 flashcards. 5 quiz questions (answer=single letter). 3 resources.`;
    const raw    = await callClaude([{ role:'user', content:`Transcript:\n${tx.slice(0,6000)}` }], sys);
    const parsed = JSON.parse(raw.replace(/^```json|^```|```$/gm,'').trim());
    const s      = { id:Date.now(), date:new Date().toISOString(), transcript:tx, ...parsed };
    s.unit = detectUnit(s);
    state.sessions.unshift(s);
    persistSessions();
    checkStreak();
    state.xp.sess++;
    persistXP(); // FIX E: persist sess count immediately
    addXP(50, 'New session!');
    launchConfetti();
    const todayCount = sessionsToday();
    if (todayCount >= 2) {
      setTimeout(() => axieSay(`⚡ ${todayCount} sessions today — momentum active. XP boosted.`), 900);
    } else {
      setTimeout(() => axieSay('🔥 New session unlocked — let\'s go!'), 400);
    }
    goStudy(0);
  } catch (err) {
    if (err.message !== '401' && err.message !== 'no-key') { $('ge').textContent = 'Error: ' + err.message; }
    $('gb').disabled = false; $('gl').style.display = 'none';
  }
}

function renderTab() {

  state.fcIdx = Math.min(state.fcIdx, (s.flashcards?.length || 1) - 1);
  if      (state.tab === 'visual')     el.innerHTML = renderVisual(s.studyGuide);

function pickQ(qi, l) {
  if (state.checked[qi]) return;
  state.picks[qi] = l;
  document.querySelectorAll(`[id^="op-${qi}-"]`).forEach((el,oi) => {
    const x = 'ABCD'[oi];
    el.style.background   = x===l ? 'rgba(79,195,247,.09)' : 'transparent';
    el.style.borderColor  = x===l ? '#4fc3f7' : 'var(--bdr)';
    el.style.color        = x===l ? '#4fc3f7' : 'var(--soft)';
  });
  const b=$(`cb-${qi}`); if(b) b.style.display='inline-block';
}

function checkQ(qi, correct, enc) {
  state.checked[qi] = true;
  const ch = state.picks[qi], ok = ch === correct;

  // ── TOPIC PERFORMANCE TRACKING ──
  const s   = cur();
  const uid = s?.unit?.id;
  if (uid != null) {
    if (!state.perf[uid]) state.perf[uid] = { correct:0, total:0, ignored:0, topics:{} };
    const p = state.perf[uid];
    p.total++; if (ok) p.correct++;
    const topic = normTopic(s.quiz?.[qi]?.topic);
    if (topic) {
      if (!p.topics[topic]) p.topics[topic] = { correct:0, total:0 };
      p.topics[topic].total++; if (ok) p.topics[topic].correct++;
    }
    persistPerf();
    // Reset ignored only on real demonstrated competence
    if (p.total >= 5 && (p.correct / p.total) > 0.7) { p.ignored = 0; persistPerf(); }
  }

  document.querySelectorAll(`[id^="op-${qi}-"]`).forEach((el,oi) => {
    const x = 'ABCD'[oi];
    if (x===correct)        { el.style.background='rgba(52,211,153,.09)'; el.style.borderColor='#34d399'; el.style.color='#34d399'; }
    else if (x===ch && !ok) { el.style.background='rgba(251,113,133,.09)'; el.style.borderColor='#fb7185'; el.style.color='#fb7185'; }
    el.classList.add('locked');
  });
  const b=$(`cb-${qi}`); if(b) b.style.display='none';
  const ex=$(`ex-${qi}`); if(ex){ ex.style.display='block'; ex.innerHTML=(ok?'✅ ':'❌ ')+e(decodeURIComponent(enc)); }
  if (ok) { state.qScore++; addXP(15,'Correct! 🎯'); } else addXP(5,'Good try!');
  const qs=$('qs'); if(qs) qs.textContent=`${state.qScore}/${Object.keys(state.checked).length} correct`;
  if (Object.keys(state.checked).length===state.qTotal) {
    state.xp.quizzes++; persistXP();
    setTimeout(()=>{
      if (state.qScore===state.qTotal) launchConfetti();
      else if (state.qScore>=state.qTotal*.8) axieSay(`${state.qScore}/${state.qTotal} — Nearly perfect! 🌟`);
      else axieSay(`${state.qScore}/${state.qTotal} — Review the missed ones! 💪`);
    },400);
  }
}

function togFRQ(id,btn) {
  const el=$(id); if(!el)return;
  const sh=el.style.display!=='none';
  el.style.display=sh?'none':'block';
  btn.textContent=sh?'Show Model Answer':'Hide Model Answer';
  if(!sh) addXP(10,'Model answer reviewed!');
}

function pickM(qi,l) {
  if(state.mcqP[qi+'_c'])return;
  state.mcqP[qi]=l;
  document.querySelectorAll(`[id^="mop-${qi}-"]`).forEach((el,oi)=>{
    const x='ABCD'[oi];
    el.style.background=x===l?'rgba(167,139,250,.09)':'transparent';
    el.style.borderColor=x===l?'#a78bfa':'var(--bdr)';
    el.style.color=x===l?'#a78bfa':'var(--soft)';
  });
  const b=$(`mcb-${qi}`); if(b)b.style.display='inline-block';
}

function checkM(qi,correct,enc) {
  state.mcqP[qi+'_c']=true;
  const ch=state.mcqP[qi], ok=ch===correct;
  document.querySelectorAll(`[id^="mop-${qi}-"]`).forEach((el,oi)=>{
    const x='ABCD'[oi];
    if(x===correct){el.style.background='rgba(52,211,153,.09)';el.style.borderColor='#34d399';el.style.color='#34d399';}
    else if(x===ch&&!ok){el.style.background='rgba(251,113,133,.09)';el.style.borderColor='#fb7185';el.style.color='#fb7185';}
    el.style.cursor='default';
  });
  const b=$(`mcb-${qi}`); if(b)b.style.display='none';
  const ex=$(`mex-${qi}`); if(ex){ex.style.display='block';ex.innerHTML=(ok?'✅ ':'❌ ')+e(decodeURIComponent(enc));}
  addXP(ok?15:5,ok?'AP MCQ correct! 🎯':'Keep going!');
}

async function genGaps() {
  $('gapl').style.display='block'; $('gape').textContent='';
  try {
    const sys=`You are an AP Macroeconomics exam expert. Analyze this session and respond ONLY with valid JSON:
{"gaps":[{"type":"missed|exam|review","title":"topic","description":"what and why it matters"}],"watchouts":["short specific exam watch-out"],"nextSession":"one sentence recommendation"}
2-4 gaps, 3-5 watchouts. Types: missed=not covered, exam=likely on AP exam, review=needs clarification. Be specific.`;
    const s=cur();
    const raw=await callClaude([{role:'user',content:`Session: ${s.title}\nSummary: ${s.summary}\nTopics: ${(s.studyGuide?.sections||[]).map(x=>x.title).join(', ')}\nTranscript: ${(s.transcript||'').slice(0,3000)}`}],sys);
    const parsed=JSON.parse(raw.replace(/^```json|^```|```$/gm,'').trim());

  }
}

async function genTargetedPractice(unitId, topic) {
  const u   = UNITS.find(u => u.id === unitId);
  const sys = `You are an AP Macroeconomics exam writer. Respond ONLY with valid JSON — no markdown:
{"questions":[{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"answer":"A","explanation":"...","topic":"${topic}"}]}
Write exactly 3 AP-style MCQs testing "${topic.replace(/_/g,' ')}" in ${u?.lbl}. Hard, real exam difficulty.`;
  const raw    = await callClaude([{ role:'user', content:`Topic: ${topic}\nUnit: ${u?.lbl}` }], sys);
  const parsed = JSON.parse(raw.replace(/^```json|^```|```$/gm,'').trim());
  return (parsed.questions || []).map(q => ({ ...q, topic: normTopic(q.topic) }));
}

function renderTargetedPractice(questions, topic, unitId) {
  const u   = UNITS.find(u => u.id === unitId);
  const lbl = topic.replace(/_/g,' ');
  return `
    <div style="background:${u?.col}10;border:1px solid ${u?.col}30;border-left:3px solid ${u?.col};border-radius:8px;padding:18px 20px;margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap">
        <span style="font-family:monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:${u?.col};background:${u?.col}18;border:1px solid ${u?.col}30;padding:2px 8px;border-radius:2px">Targeted Practice</span>
        <span style="font-size:13px;font-weight:600;color:var(--txt)">${lbl}</span>
      </div>
      <p style="font-size:12px;color:var(--soft);margin:0">3 questions on your weakest topic. Answer them all.</p>
    </div>
    ${questions.map((q,i) => `
      <div class="card fadein" style="border-left:3px solid ${u?.col};margin-bottom:13px;padding:16px 18px">
        <p style="font-weight:600;font-size:14px;color:var(--txt);line-height:1.55;margin-bottom:12px">${i+1}. ${e(q.question)}</p>
        <div>${(q.options||[]).map((opt,oi) =>
          `<div id="top-${i}-${oi}" class="qopt" onclick="tpickQ(${i},'${opt[0]}')">${e(opt)}</div>`
        ).join('')}</div>
        <button class="btn-hi" id="tcb-${i}" style="display:none;margin-top:10px;font-size:12px;padding:7px 18px"
          onclick="tcheckQ(${i},'${q.answer}','${encodeURIComponent(q.explanation||'')}','${normTopic(q.topic)||topic}',${unitId})">Check ✓</button>
        <div id="tex-${i}" style="display:none;font-size:12px;color:var(--soft);border-top:1px solid var(--bdr);padding-top:10px;margin-top:10px;line-height:1.75"></div>
      </div>`).join('')}
    <div id="tp-result" style="display:none"></div>`;
}

function tpickQ(qi, l) {
  if (window._tchecked?.[qi]) return;
  if (!window._tpicks) window._tpicks = {};
  window._tpicks[qi] = l;
  document.querySelectorAll(`[id^="top-${qi}-"]`).forEach((el,oi) => {
    const x = 'ABCD'[oi];
    el.style.background  = x===l ? 'rgba(79,195,247,.09)' : 'transparent';
    el.style.borderColor = x===l ? '#4fc3f7' : 'var(--bdr)';
    el.style.color       = x===l ? '#4fc3f7' : 'var(--soft)';
  });
  const b = $(`tcb-${qi}`); if (b) b.style.display = 'inline-block';
}

function tcheckQ(qi, correct, enc, topic, unitId) {
  if (!window._tchecked) window._tchecked = {};
  if (!window._tresults) window._tresults = {};
  // FIX: declare ch and ok before using them
  const ch = window._tpicks?.[qi];
  const ok = ch === correct;
  window._tchecked[qi] = true;
  window._tresults[qi] = ok;

  document.querySelectorAll(`[id^="top-${qi}-"]`).forEach((el,oi) => {
    const x = 'ABCD'[oi];
    if (x===correct)        { el.style.background='rgba(52,211,153,.09)'; el.style.borderColor='#34d399'; el.style.color='#34d399'; }
    else if (x===ch && !ok) { el.style.background='rgba(251,113,133,.09)'; el.style.borderColor='#fb7185'; el.style.color='#fb7185'; }
    el.style.cursor = 'default';
  });
  const b  = $(`tcb-${qi}`); if(b) b.style.display='none';
  const ex = $(`tex-${qi}`); if(ex){ ex.style.display='block'; ex.innerHTML=(ok?'✅ ':'❌ ')+e(decodeURIComponent(enc)); }

  // Write back into perf — same path as checkQ
  const nt = normTopic(topic);
  if (nt && unitId != null) {
    if (!state.perf[unitId]) state.perf[unitId] = { correct:0, total:0, ignored:0, topics:{} };
    const p = state.perf[unitId];
    p.total++; if (ok) p.correct++;
    if (!p.topics[nt]) p.topics[nt] = { correct:0, total:0 };
    p.topics[nt].total++; if (ok) p.topics[nt].correct++;
    persistPerf();
    if (p.total >= 5 && (p.correct / p.total) > 0.7) { p.ignored = 0; persistPerf(); }
  }

  addXP(ok ? 15 : 5, ok ? 'Targeted drill! 🎯' : 'Keep drilling!');

  // All 3 answered — show result using _tresults (not the current `correct`)
  if (Object.keys(window._tchecked).length >= 3) {
    const correct_count = Object.values(window._tresults).filter(Boolean).length;
    const pct = Math.round((correct_count / 3) * 100);
    const res = $('tp-result');
    if (res) {
      res.style.display = 'block';
      res.innerHTML = `<div class="tip-box" style="margin-top:8px">
        <div class="lbl" style="color:var(--c4);margin-bottom:6px">Drill complete</div>
        <p style="font-size:13px;color:var(--soft);margin:0;line-height:1.65">
          Scored <strong style="color:var(--accent)">${correct_count}/3</strong> on
          <strong style="color:var(--txt)">${topic.replace(/_/g,' ')}</strong>.
          ${pct >= 70 ? ' Pressure cleared. ✅' : ' Not there yet — keep going.'}
        </p>
      </div>`;
      if (pct >= 70) {
        setTimeout(() => axieSay(`✅ ${topic.replace(/_/g,' ')} — pressure cleared. Nice work.`), 400);
      } else {
        setTimeout(() => {
          axieEnqueue(`📌 Still below 70% on ${topic.replace(/_/g,' ')}.`);
          axieEnqueue('→ One more session will move this number.');
        }, 400);
      }
    }
  }
}

async function launchDrill(unitId, topic) {
  // Force navigation to gaps tab — don't rely on user being there
  state.tab = 'gaps';
  render();
  const tc = $('tc'); if (!tc) return;
  tc.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--soft)">
    <div class="spin" style="margin:0 auto 12px"></div>
    <div style="font-size:13px">Generating targeted questions on ${topic.replace(/_/g,' ')}…</div>
  </div>`;
  window._tpicks   = {};
  window._tchecked = {};
  window._tresults = {};
  try {
    const questions = await genTargetedPractice(unitId, topic);
    tc.innerHTML = renderTargetedPractice(questions, topic, unitId);
    axieEnqueue(`🎯 3 questions on ${topic.replace(/_/g,' ')}. Answer all of them.`);
  } catch (err) {
    tc.innerHTML = `<div class="err">Failed to generate drill: ${e(err.message)}</div>`;
  }
}

function renderChat() {
  state.chatH = [];
  return `<div class="lbl" style="margin-bottom:13px">🦉 Ask Axie Anything</div>
  <div id="cm" style="display:flex;flex-direction:column;gap:11px;min-height:80px;margin-bottom:14px">
    <div class="card fadein" style="border-left:3px solid var(--c3);padding:13px 16px">
      <p style="margin:0;font-size:13px;color:var(--soft);line-height:1.65">Ask me anything about this lecture or AP Macro! I'll keep answers short, clear, and useful. 🦉</p>
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <input id="ci" placeholder="Ask Axie a question…" onkeydown="if(event.key==='Enter')doChat()" style="flex:1;padding:11px 14px;font-size:13px;border-radius:6px;border:1px solid var(--bdr2);background:var(--surf);color:var(--txt);outline:none"/>
    <button class="btn-hi" onclick="doChat()" style="padding:11px 18px">Ask 🦉</button>
  </div>
  <div id="cb2" style="display:none;font-size:11px;color:var(--mut);font-style:italic;margin-top:7px">Axie is thinking…</div>`;
}

function fmtChat(t) {
  return t.split('\n').filter(l=>l.trim()).map(l=>{
    const b=l.trim().startsWith('-')||l.trim().startsWith('•')||l.trim().startsWith('*');
    return b
      ? `<div class="cbline"><span class="arr">▸</span><span style="font-size:13px;color:var(--mid);line-height:1.65">${e(l.replace(/^[-•*]\s*/,''))}</span></div>`
      : `<p style="margin:0 0 5px;font-size:13px;color:var(--mid);line-height:1.65">${e(l)}</p>`;
  }).join('');
}

async function doChat() {
  const inp=$('ci'); const msg=inp?.value?.trim(); if(!msg)return;
  inp.value='';
  state.chatH.push({role:'user',content:msg});
  const cm=$('cm');
  cm.innerHTML+=`<div style="display:flex;justify-content:flex-end"><div class="bubble-u fadein">${e(msg)}</div></div>`;
  const busy=$('cb2'); if(busy)busy.style.display='block';
  try {
    const sys=`You are Axie, a friendly AP Macro tutor owl 🦉 helping a high school student named CoCo. Give SHORT bullet-point answers — max 4 bullets, each under 15 words. One direct sentence first, then bullets. Plain English. Be warm and encouraging. Lecture: ${cur()?.summary}`;
    const rep=await callClaude(state.chatH,sys);
    state.chatH.push({role:'assistant',content:rep});
    cm.innerHTML+=`<div style="display:flex;justify-content:flex-start;gap:8px;align-items:flex-start">
      <span style="font-size:18px;flex-shrink:0;margin-top:2px">🦉</span>
      <div class="bubble-a fadein">${fmtChat(rep)}</div>
    </div>`;
    addXP(5,'Question asked!');
  } catch(err) { cm.innerHTML+=`<div style="color:var(--c5);font-size:12px">${e(err.message)}</div>`; }
  if(busy)busy.style.display='none';
  cm.scrollTop=cm.scrollHeight;
}

    gr ? `Instructor Grade: ${gr.score}/100 — ${gr.rationale}` : '',
    '','KEY TAKEAWAYS:', ...(s.studyGuide?.keyTakeaways||[]).map((t,i)=>`${i+1}. ${t}`),
    '','SECTIONS:', ...(s.studyGuide?.sections||[]).flatMap(sec=>[`## ${sec.title}`, ...(sec.cards||[]).map(c=>`- ${c.title}: ${c.bullets?.join('; ')||c.text||''}`), ...(sec.formulas||[]).map(f=>`Formula: ${f.eq} — ${f.label||''}`)]),
    '','FORMULAS:', ...(s.studyGuide?.formulas||[]).map(f=>`${f.eq} — ${f.label||''}`),
    '','FLASHCARDS:', ...(s.flashcards||[]).map((f,i)=>`${i+1}. ${f.term}: ${f.definition}`),
    '','QUIZ:', ...(s.quiz||[]).map((q,i)=>`${i+1}. ${q.question} [${q.answer}] ${q.explanation}`),
    '','RESOURCES:', ...(s.resources||[]).map(r=>`- ${r.name}: ${r.url} — ${r.why}`),
  ].filter(Boolean).join('\n');
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadState();
  renderHero();
  if (!state.apiKey) {
    state.page = 'setup';
    render();
  } else {
    checkStreak();
    render();
  }
  setInterval(renderHero, 60000);
  setTimeout(axieTap, 2400);
});
</script>
</body>
</html>
