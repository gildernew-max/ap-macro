<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Macro Lecture Trainer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surf:#111118;--card:#16161f;--bdr:#2a2a3a;
  --txt:#e8e8f0;--mut:#7070a0;--soft:#a0a0c0;
  --a0:#f0c040;--a1:#4fc3f7;--a2:#a78bfa;--a3:#34d399;--a4:#fb7185;--a5:#c084fc;
}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;min-height:100vh}
button,input,textarea{font-family:inherit}
button{cursor:pointer}
a{color:inherit;text-decoration:none}

.page{max-width:820px;margin:0 auto;padding:1.5rem 1rem}

.hero{max-width:820px;margin:0 auto;padding:2rem 1rem 1.5rem;border-bottom:1px solid var(--bdr)}
.hero-label{font-family:monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--a0);margin-bottom:10px}
.hero-title{font-family:monospace;font-size:clamp(26px,6vw,40px);font-weight:700;letter-spacing:2px;line-height:1}
.hero-title span{color:var(--a0)}
.hero-sub{margin-top:8px;font-size:13px;color:var(--mut)}

.btn{background:transparent;border:1px solid var(--bdr);border-radius:4px;padding:8px 16px;font-size:13px;color:var(--txt)}
.btn-pri{background:rgba(79,195,247,0.1);border:1px solid var(--a1);border-radius:4px;padding:10px 20px;font-size:14px;color:var(--a1);font-weight:500}
.btn-pri:disabled{opacity:.45;cursor:not-allowed}
.btn-full{display:block;width:100%;padding:12px;font-size:15px;margin-bottom:12px;text-align:center}
.btn-danger{color:var(--a4);border-color:rgba(251,113,133,0.3);font-size:12px;padding:4px 10px}
.btn-notion{color:var(--a2);border-color:rgba(167,139,250,0.4);font-size:12px;padding:7px 14px}

.card{background:var(--card);border:1px solid var(--bdr);border-radius:4px;padding:16px 18px}
.mono-label{font-family:monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--mut)}

.tabs{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:24px;overflow-x:auto}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:12px 14px;font-size:12px;font-weight:400;color:var(--mut);white-space:nowrap;font-family:monospace;letter-spacing:1px;text-transform:uppercase}
.tab.active{border-bottom-color:var(--a0);color:var(--a0);font-weight:600}

.grid{display:grid;gap:12px}
.grid-2{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}

.section-num{font-family:monospace;font-size:44px;line-height:1;opacity:.13;letter-spacing:2px}
.section-title{font-family:monospace;font-size:18px;letter-spacing:2px;font-weight:700}

.formula-box{background:#0d0d15;border:1px solid var(--bdr);border-radius:2px;padding:10px 16px;font-family:monospace;font-size:13px;letter-spacing:.5px;margin:6px 0}

ul.bullets{padding:0;list-style:none;margin:0}
ul.bullets li{padding:4px 0 4px 16px;position:relative;color:var(--soft);font-size:12px;line-height:1.6;border-bottom:1px solid rgba(255,255,255,.03)}
ul.bullets li::before{content:'→';position:absolute;left:0;color:var(--mut);font-size:10px}

.notion-export{background:#0d0d15;border:1px solid rgba(167,139,250,0.3);border-radius:4px;padding:10px;font-family:monospace;font-size:11px;color:var(--soft);width:100%;height:150px;resize:none;outline:none;margin-top:8px}

#loading{display:none;align-items:center;gap:10px;padding:10px 0;font-size:13px;color:var(--mut)}
.spinner{width:16px;height:16px;border:2px solid var(--bdr);border-top-color:var(--a1);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.status-err{color:var(--a4);font-size:13px;padding:8px 0}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-label">AP Exam Prep · CoCo's Study Tool</div>
  <div class="hero-title">LECTURE <span>TRAINER</span></div>
  <div class="hero-sub">Paste any lecture transcript — get a visual study guide, flashcards, quiz, and resources instantly.</div>
</div>

<div class="page" id="app"></div>

<script>
const MODEL = 'claude-sonnet-4-20250514';
let API_KEY = localStorage.getItem('ltt-apikey') || '';

const ACCENT = ['#f0c040','#4fc3f7','#a78bfa','#34d399','#fb7185','#c084fc'];

const UNITS = [
  { id:1, label:'Unit 1 — Basic Concepts',          color:'#f0c040', topics:['scarcity','opportunity cost','ppc','production possibilities','comparative advantage','supply','demand','trade'] },
  { id:2, label:'Unit 2 — Indicators & Business Cycle', color:'#4fc3f7', topics:['gdp','gross domestic product','unemployment','inflation','cpi','business cycle','recession','nominal','real','deflator','labor force'] },
  { id:3, label:'Unit 3 — AS/AD & Fiscal Policy',   color:'#a78bfa', topics:['aggregate demand','aggregate supply','fiscal','multiplier','mpc','mps','government spending','tax','recessionary gap','inflationary gap','sras','lras','ad'] },
  { id:4, label:'Unit 4 — Financial Sector',        color:'#34d399', topics:['money','banking','t-account','reserve','money multiplier','monetary policy','federal reserve','fed','interest rate','loanable funds','m1','m2','bond','open market','discount rate','fractional reserve','deposit'] },
  { id:5, label:'Unit 5 — Long-Run Policy',         color:'#fb7185', topics:['phillips curve','long run','crowding out','quantity theory','mv=py','stagflation','lrpc','srpc','natural rate','economic growth','lras shift'] },
  { id:6, label:'Unit 6 — Open Economy & Forex',    color:'#c084fc', topics:['foreign exchange','forex','exchange rate','balance of payments','current account','capital account','imports','exports','net exports','currency','appreciation','depreciation'] },
];

function detectUnit(session){
  const text = [session.title, session.summary, ...(session.studyGuide?.keyTakeaways||[]),
    ...(session.studyGuide?.sections||[]).map(s=>s.title+' '+(s.cards||[]).map(c=>c.title).join(' '))
  ].join(' ').toLowerCase();
  let best = null, bestScore = 0;
  for(const u of UNITS){
    const score = u.topics.filter(t=>text.includes(t)).length;
    if(score > bestScore){ bestScore=score; best=u; }
  }
  return best || UNITS[0];
}
const ac = i => ACCENT[i % ACCENT.length];

function loadSessions(){try{return JSON.parse(localStorage.getItem('ltt-gh')||'[]')}catch{return[]}}
function saveSessions(s){try{localStorage.setItem('ltt-gh',JSON.stringify(s))}catch{}}

let sessions = loadSessions();
let currentSession = null;
let currentTab = 'visual';
let flipped = {};
let picks = {};
let checked = {};

async function callClaude(messages, system){
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'content-type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:MODEL,max_tokens:4000,system,messages})
  });
  if(!res.ok) throw new Error(`API ${res.status}: ${(await res.text()).slice(0,200)}`);
  const j = await res.json();
  return j.content.filter(b=>b.type==='text').map(b=>b.text).join('');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function bold(s){return esc(s).replace(/\*\*(.*?)\*\*/g,'<strong style="color:#e8e8f0">$1</strong>')}

function render(html){ document.getElementById('app').innerHTML = html }

// ── HOME ─────────────────────────────────────────────────────────────────────
function showHome(){
  currentSession = null;
  // Group sessions by unit
  let rows = '';
  if(sessions.length === 0){
    rows = `<div class="card" style="text-align:center;padding:2.5rem;color:var(--mut)">No sessions yet — paste a lecture transcript to get started.</div>`;
  } else {
    for(const unit of UNITS){
      const unitSessions = sessions.map((s,i)=>({s,i})).filter(({s})=>s.unit?.id===unit.id);
      if(unitSessions.length===0) continue;
      rows += `
        <div style="margin-bottom:8px;margin-top:24px;display:flex;align-items:baseline;gap:12px;padding-bottom:8px;border-bottom:1px solid var(--bdr)">
          <span style="font-family:monospace;font-size:28px;font-weight:700;color:${unit.color};opacity:.15">0${unit.id}</span>
          <span style="font-family:monospace;font-size:12px;font-weight:700;letter-spacing:2px;color:${unit.color}">${unit.label.toUpperCase()}</span>
        </div>`;
      rows += unitSessions.map(({s,i})=>`
        <div class="card" style="border-left:3px solid ${unit.color};display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:12px 16px;cursor:pointer" onclick="openSession(${i})">
          <div>
            <div style="font-weight:600;font-size:14px;color:var(--txt)">${esc(s.title)}</div>
            <div style="font-size:11px;color:var(--mut);margin-top:3px">${esc(s.date)} · ${s.flashcards?.length||0} cards · ${s.quiz?.length||0} questions</div>
          </div>
          <button class="btn btn-danger" onclick="event.stopPropagation();deleteSession(${i})">Delete</button>
        </div>`).join('');
    }
    // Sessions without a unit (legacy)
    const untagged = sessions.map((s,i)=>({s,i})).filter(({s})=>!s.unit);
    if(untagged.length){
      rows += `<div style="margin-top:20px;margin-bottom:8px;font-family:monospace;font-size:10px;letter-spacing:2px;color:var(--mut)">UNTAGGED</div>`;
      rows += untagged.map(({s,i})=>`
        <div class="card" style="border-left:3px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:12px 16px;cursor:pointer" onclick="openSession(${i})">
          <div>
            <div style="font-weight:600;font-size:14px;color:var(--txt)">${esc(s.title)}</div>
            <div style="font-size:11px;color:var(--mut);margin-top:3px">${esc(s.date)} · ${s.flashcards?.length||0} cards · ${s.quiz?.length||0} questions</div>
          </div>
          <button class="btn btn-danger" onclick="event.stopPropagation();deleteSession(${i})">Delete</button>
        </div>`).join('');
    }
  }

  render(`
    <div style="padding-bottom:28px;margin-bottom:28px;border-bottom:1px solid var(--bdr)">
      <div class="mono-label" style="color:var(--a0);margin-bottom:10px">Study Tool · Lecture Trainer</div>
      <div style="font-family:monospace;font-size:32px;font-weight:700;letter-spacing:2px;line-height:1">LECTURE<span style="color:var(--a0)"> TRAINER</span></div>
    </div>
    <button class="btn btn-pri btn-full" onclick="showNew()">+ New Session</button>
    ${rows}
  `);
}

// ── NEW SESSION ───────────────────────────────────────────────────────────────
function showNew(){
  render(`
    <button class="btn" onclick="showHome()" style="margin-bottom:1.25rem">← Back</button>
    <div style="margin-bottom:16px">
      <div class="mono-label" style="color:var(--a1);margin-bottom:8px">New Session</div>
      <div style="font-family:monospace;font-size:20px;font-weight:700;letter-spacing:2px">PASTE TRANSCRIPT</div>
    </div>
    <textarea id="tx" placeholder="Paste your lecture text here..." style="width:100%;min-height:260px;padding:14px;font-size:14px;border-radius:4px;border:1px solid var(--bdr);background:var(--surf);color:var(--txt);resize:vertical;outline:none"></textarea>
    <div style="margin-top:12px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <button class="btn btn-pri" onclick="generate()">Generate Training Materials</button>
      <div id="loading"><div class="spinner"></div><span id="load-msg">Generating...</span></div>
      <div id="err" class="status-err"></div>
    </div>
  `);
}

async function generate(){
  const tx = document.getElementById('tx')?.value?.trim();
  if(!tx) return;
  document.querySelector('#app .btn-pri').disabled = true;
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('err').textContent = '';

  try{
    const sys = `You are an expert AP Macroeconomics tutor. Given a lecture transcript, respond ONLY with valid JSON — no markdown, no fences. Use this exact structure:
{"title":"short title","summary":"2-3 sentence summary","studyGuide":{"keyTakeaways":["...","...","...","..."],"sections":[{"title":"Section Title","cards":[{"label":"label","title":"Card Title","bullets":["bullet with **bold** terms","another"]},{"label":"label","title":"Card Title","text":"prose with **bold** terms"}],"formulas":[{"eq":"formula","label":"description"}]}],"formulas":[{"eq":"formula","label":"description"}]},"flashcards":[{"term":"...","definition":"...","example":"..."}],"quiz":[{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"answer":"A","explanation":"..."}],"resources":[{"name":"...","url":"...","why":"..."}]}
Rules: 2-3 sections, 2-3 cards each, 4 keyTakeaways, 3-5 global formulas, 6 flashcards, 5 quiz questions (answer=single letter), 3 resources.`;

    const raw = await callClaude([{role:'user',content:`Transcript:\n${tx.slice(0,6000)}`}], sys);
    const parsed = JSON.parse(raw.replace(/^```json|^```|```$/gm,'').trim());
    const s = {id:Date.now(), date:new Date().toLocaleDateString(), transcript:tx, ...parsed};
    s.unit = detectUnit(s);
    sessions.unshift(s);
    saveSessions(sessions);
    openSession(0);
  }catch(e){
    document.getElementById('err').textContent = 'Error: '+e.message;
    document.getElementById('loading').style.display = 'none';
    document.querySelector('#app .btn-pri').disabled = false;
  }
}

function deleteSession(i){
  sessions.splice(i,1);
  saveSessions(sessions);
  showHome();
}

// ── STUDY SESSION ─────────────────────────────────────────────────────────────
function openSession(i){
  currentSession = sessions[i];
  currentTab = 'visual';
  flipped = {}; picks = {}; checked = {};
  showStudy();
}

function showStudy(){
  const s = currentSession;
  const TABS = [['visual','Visual'],['flashcards','Flashcards'],['quiz','Quiz'],['chat','Q&A'],['resources','Resources']];

  const notionText = buildNotionText(s);

  render(`
    <button class="btn" onclick="showHome()" style="font-size:12px;margin-bottom:14px">← Sessions</button>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;padding-bottom:16px;border-bottom:1px solid var(--bdr)">
      <div style="flex:1">
        <div style="font-family:monospace;font-size:18px;font-weight:700;letter-spacing:1px;color:var(--txt)">${esc(s.title?.toUpperCase())}</div>
        <p style="margin-top:8px;font-size:13px;color:var(--soft);line-height:1.6">${esc(s.summary)}</p>
      </div>
      <div>
        <button class="btn btn-notion" onclick="toggleNotion()">N Export for Notion</button>
        <div id="notion-panel" style="display:none">
          <div style="font-size:11px;color:var(--a2);font-family:monospace;margin-top:6px">Click inside → Ctrl+A → Ctrl+C → paste in Claude chat</div>
          <textarea class="notion-export" onclick="this.select()" readonly>${esc(notionText)}</textarea>
        </div>
      </div>
    </div>

    <div class="tabs" style="margin-top:0">
      ${TABS.map(([id,label])=>`<button class="tab ${currentTab===id?'active':''}" onclick="switchTab('${id}')">${label}</button>`).join('')}
    </div>

    <div id="tab-content"></div>
    <div id="chat-history" style="display:none"></div>
  `);

  renderTab();
}

function toggleNotion(){
  const p = document.getElementById('notion-panel');
  p.style.display = p.style.display==='none'?'block':'none';
}

function switchTab(t){
  currentTab = t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b.textContent.trim().toLowerCase()===t||(t==='visual'&&b.textContent.trim()==='Visual')||(t==='chat'&&b.textContent.trim()==='Q&A')));
  // simpler: re-render tabs
  document.querySelectorAll('.tab').forEach((b,i)=>{
    const ids=['visual','flashcards','quiz','chat','resources'];
    b.classList.toggle('active', ids[i]===t);
  });
  renderTab();
}

function renderTab(){
  const s = currentSession;
  const el = document.getElementById('tab-content');
  if(!el) return;

  if(currentTab==='visual') el.innerHTML = renderVisual(s.studyGuide);
  else if(currentTab==='flashcards') el.innerHTML = renderFlashcards(s.flashcards);
  else if(currentTab==='quiz') el.innerHTML = renderQuiz(s.quiz);
  else if(currentTab==='chat') el.innerHTML = renderChat();
  else if(currentTab==='resources') el.innerHTML = renderResources(s.resources);
}

// ── VISUAL ────────────────────────────────────────────────────────────────────
function renderVisual(sg){
  if(!sg) return '<p style="color:var(--mut)">No study guide data.</p>';
  const {keyTakeaways=[],sections=[],formulas=[]} = sg;

  const takeaways = keyTakeaways.length ? `
    <div style="margin-bottom:28px">
      <div class="mono-label" style="margin-bottom:12px">Key Takeaways</div>
      <div class="grid grid-3">
        ${keyTakeaways.map((t,i)=>`
          <div class="card" style="border-top:2px solid ${ac(i)}">
            <div class="mono-label" style="color:${ac(i)};display:block;margin-bottom:5px">0${i+1}</div>
            <p style="font-size:13px;color:var(--soft);line-height:1.6;margin:0">${esc(t)}</p>
          </div>`).join('')}
      </div>
    </div>` : '';

  const secs = sections.map((sec,si)=>{
    const a = ac(si);
    const cards = (sec.cards||[]).map(card=>`
      <div class="card" style="border-top:2px solid ${a}">
        <div class="mono-label" style="color:${a};opacity:.8;margin-bottom:8px">${esc(card.label)}</div>
        <div style="font-size:14px;font-weight:600;color:var(--txt);margin-bottom:8px">${esc(card.title)}</div>
        ${card.bullets
          ? `<ul class="bullets">${card.bullets.map(b=>`<li><span>${bold(b)}</span></li>`).join('')}</ul>`
          : `<p style="font-size:12px;color:var(--soft);line-height:1.65;margin:0">${bold(card.text)}</p>`}
      </div>`).join('');

    const fmls = (sec.formulas||[]).map(f=>`
      <div class="formula-box" style="border-left:3px solid ${a};color:${a}">
        ${esc(f.eq)}${f.label?`<span style="color:var(--mut);font-size:11px"> — ${esc(f.label)}</span>`:''}
      </div>`).join('');

    return `
      <div style="margin-bottom:32px">
        <div style="display:flex;align-items:baseline;gap:16px;padding-bottom:12px;border-bottom:1px solid var(--bdr);margin-bottom:16px">
          <span class="section-num" style="color:${a}">${String(si+1).padStart(2,'0')}</span>
          <span class="section-title" style="color:${a}">${esc(sec.title?.toUpperCase())}</span>
        </div>
        <div class="grid grid-2" style="margin-bottom:${sec.formulas?.length?'12px':'0'}">${cards}</div>
        ${fmls}
      </div>`;
  }).join('');

  const cheatsheet = formulas.length ? `
    <div style="margin-top:8px;padding-top:28px;border-top:2px solid var(--bdr)">
      <div style="font-family:monospace;font-size:18px;font-weight:700;letter-spacing:3px;color:var(--a0);margin-bottom:16px">FORMULA CHEAT SHEET</div>
      <div class="grid grid-2">
        ${formulas.map((f,i)=>`
          <div class="formula-box" style="border-left:3px solid ${ac(i)};color:${ac(i)}">
            ${esc(f.eq)}${f.label?`<span style="color:var(--mut);font-size:10px;display:block;margin-top:3px">${esc(f.label)}</span>`:''}
          </div>`).join('')}
      </div>
    </div>` : '';

  return takeaways + secs + cheatsheet;
}

// ── FLASHCARDS ────────────────────────────────────────────────────────────────
function renderFlashcards(cards){
  return `
    <div class="mono-label" style="margin-bottom:14px">${cards?.length} Cards · Click to Flip</div>
    <div class="grid grid-2">
      ${(cards||[]).map((fc,i)=>`
        <div onclick="flipCard(${i})" id="fc-${i}" style="background:var(--card);border:1px solid var(--bdr);border-top:2px solid ${ac(i)};border-radius:4px;padding:16px 18px;min-height:120px;cursor:pointer;display:flex;flex-direction:column;justify-content:center">
          <div id="fc-front-${i}">
            <p style="font-weight:600;font-size:15px;color:var(--txt);margin:0">${esc(fc.term)}</p>
            <p style="font-size:11px;color:var(--mut);margin:6px 0 0">Click to reveal →</p>
          </div>
          <div id="fc-back-${i}" style="display:none">
            <div class="mono-label" style="color:${ac(i)};margin-bottom:6px">${esc(fc.term)}</div>
            <p style="font-size:13px;color:var(--soft);line-height:1.6;margin:0">${esc(fc.definition)}</p>
            ${fc.example?`<p style="font-size:12px;color:var(--mut);margin:8px 0 0;font-style:italic">${esc(fc.example)}</p>`:''}
          </div>
        </div>`).join('')}
    </div>`;
}

function flipCard(i){
  const front = document.getElementById(`fc-front-${i}`);
  const back = document.getElementById(`fc-back-${i}`);
  const card = document.getElementById(`fc-${i}`);
  if(!front||!back) return;
  const isFlipped = back.style.display !== 'none';
  front.style.display = isFlipped ? 'block' : 'none';
  back.style.display = isFlipped ? 'none' : 'block';
  card.style.background = isFlipped ? 'var(--card)' : 'rgba(79,195,247,0.06)';
}

// ── QUIZ ──────────────────────────────────────────────────────────────────────
function renderQuiz(quiz){
  return `
    <div class="mono-label" style="margin-bottom:14px">${quiz?.length} Questions</div>
    ${(quiz||[]).map((q,i)=>`
      <div class="card" style="border-left:3px solid ${ac(i)};margin-bottom:16px;padding:18px 20px">
        <p style="font-weight:600;font-size:14px;color:var(--txt);line-height:1.5;margin-bottom:14px">${i+1}. ${esc(q.question)}</p>
        <div id="opts-${i}">
          ${(q.options||[]).map((opt,oi)=>`
            <div onclick="pickOpt(${i},'${opt[0]}')" id="opt-${i}-${oi}" style="padding:10px 14px;border-radius:4px;border:1px solid var(--bdr);background:transparent;cursor:pointer;font-size:13px;color:var(--soft);margin-bottom:8px">
              ${esc(opt)}
            </div>`).join('')}
        </div>
        <div id="check-btn-${i}">
          <button class="btn btn-pri" style="border-color:#34d399;color:#34d399;font-size:12px;padding:6px 16px;margin-top:4px;display:none" onclick="checkAnswer(${i},'${q.answer}','${esc(q.explanation).replace(/'/g,"\\'")}')">Check Answer</button>
        </div>
        <div id="explanation-${i}" style="display:none;font-size:12px;color:var(--soft);border-top:1px solid var(--bdr);padding-top:10px;margin-top:12px;line-height:1.6"></div>
      </div>`).join('')}`;
}

function pickOpt(qi, letter){
  if(checked[qi]) return;
  picks[qi] = letter;
  // reset all options in this question
  document.querySelectorAll(`#opts-${qi} div`).forEach(el=>{
    el.style.background='transparent';
    el.style.border='1px solid var(--bdr)';
    el.style.color='var(--soft)';
  });
  // highlight chosen
  const chosen = document.getElementById(`opt-${qi}-${'ABCD'.indexOf(letter)}`);
  if(chosen){chosen.style.background='rgba(79,195,247,0.1)';chosen.style.border='1px solid #4fc3f7';chosen.style.color='#4fc3f7';}
  // show check button
  const btn = document.querySelector(`#check-btn-${qi} button`);
  if(btn) btn.style.display='inline-block';
}

function checkAnswer(qi, correct, explanation){
  checked[qi]=true;
  const chosen = picks[qi];
  document.querySelectorAll(`#opts-${qi} div`).forEach((el,oi)=>{
    const ltr='ABCD'[oi];
    if(ltr===correct){el.style.background='rgba(52,211,153,0.1)';el.style.border='1px solid #34d399';el.style.color='#34d399';}
    else if(ltr===chosen&&ltr!==correct){el.style.background='rgba(251,113,133,0.1)';el.style.border='1px solid #fb7185';el.style.color='#fb7185';}
    el.style.cursor='default';
  });
  const btn = document.querySelector(`#check-btn-${qi} button`);
  if(btn) btn.style.display='none';
  const exp = document.getElementById(`explanation-${qi}`);
  if(exp){exp.style.display='block';exp.textContent=decodeURIComponent(explanation);}
}

// ── CHAT ──────────────────────────────────────────────────────────────────────
let chatHistory = [];

function renderChat(){
  chatHistory = [];
  return `
    <div class="mono-label" style="margin-bottom:14px">Q&A — Ask Anything About This Lecture</div>
    <div id="chat-messages" style="display:flex;flex-direction:column;gap:12px;min-height:120px;margin-bottom:16px">
      <div class="card" style="border-left:3px solid var(--a2)">
        <p style="margin:0;font-size:13px;color:var(--soft)">Ask anything about this lecture or AP Macro generally. I'll draw on the lecture content and resources like Khan Academy and College Board.</p>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <input id="chat-input" placeholder="Ask a question..." onkeydown="if(event.key==='Enter')sendChat()"
        style="flex:1;padding:10px 14px;font-size:13px;border-radius:4px;border:1px solid var(--bdr);background:var(--surf);color:var(--txt);outline:none"/>
      <button class="btn btn-pri" onclick="sendChat()">Send</button>
    </div>
    <div id="chat-typing" style="display:none;font-size:12px;color:var(--mut);font-style:italic;margin-top:8px">Thinking...</div>`;
}

async function sendChat(){
  const input = document.getElementById('chat-input');
  const msg = input?.value?.trim();
  if(!msg) return;
  input.value='';

  chatHistory.push({role:'user',content:msg});

  const msgs = document.getElementById('chat-messages');
  msgs.innerHTML += `<div style="display:flex;justify-content:flex-end"><div style="max-width:78%;padding:10px 14px;border-radius:4px;background:rgba(79,195,247,0.1);border:1px solid rgba(79,195,247,0.3);color:#4fc3f7;font-size:13px;line-height:1.7">${esc(msg)}</div></div>`;

  const typing = document.getElementById('chat-typing');
  if(typing) typing.style.display='block';

  try{
    const sys = `You are an expert AP Macroeconomics tutor. Lecture summary: ${currentSession.summary}. Answer clearly in under 150 words, referencing the lecture and AP Macro resources (Khan Academy, College Board, MRU) as relevant.`;
    const reply = await callClaude(chatHistory, sys);
    chatHistory.push({role:'assistant',content:reply});
    msgs.innerHTML += `<div style="display:flex;justify-content:flex-start"><div style="max-width:78%;padding:10px 14px;border-radius:4px;background:var(--card);border:1px solid var(--bdr);color:var(--soft);font-size:13px;line-height:1.7">${esc(reply)}</div></div>`;
  }catch(e){
    msgs.innerHTML += `<div style="color:var(--a4);font-size:12px;padding:8px 0">Error: ${esc(e.message)}</div>`;
  }
  if(typing) typing.style.display='none';
  msgs.scrollTop = msgs.scrollHeight;
}

// ── RESOURCES ─────────────────────────────────────────────────────────────────
function renderResources(resources){
  return `
    <div class="mono-label" style="margin-bottom:14px">Curated Resources</div>
    ${(resources||[]).map((r,i)=>`
      <div class="card" style="border-left:3px solid ${ac(i)};margin-bottom:12px">
        <a href="${esc(r.url)}" target="_blank" style="font-weight:600;font-size:15px;color:${ac(i)};letter-spacing:.3px">${esc(r.name)}</a>
        <p style="margin:6px 0 4px;font-size:13px;color:var(--soft);line-height:1.6">${esc(r.why)}</p>
        <p style="margin:0;font-size:11px;color:var(--mut);font-family:monospace">${esc(r.url)}</p>
      </div>`).join('')}`;
}

// ── NOTION EXPORT ─────────────────────────────────────────────────────────────
function buildNotionText(s){
  return [
    `Please save this study session to Notion as a structured page.`,
    `Title: ${s.title} — AP Macro [${s.date}]`,
    `Summary: ${s.summary}`,
    ``,`KEY TAKEAWAYS:`,
    ...(s.studyGuide?.keyTakeaways||[]).map((t,i)=>`${i+1}. ${t}`),
    ``,`SECTIONS:`,
    ...(s.studyGuide?.sections||[]).flatMap(sec=>[
      `## ${sec.title}`,
      ...(sec.cards||[]).map(c=>`- ${c.title}: ${c.bullets?.join('; ')||c.text||''}`),
      ...(sec.formulas||[]).map(f=>`Formula: ${f.eq} — ${f.label||''}`),
    ]),
    ``,`FORMULAS:`,
    ...(s.studyGuide?.formulas||[]).map(f=>`${f.eq} — ${f.label||''}`),
    ``,`FLASHCARDS:`,
    ...(s.flashcards||[]).map((f,i)=>`${i+1}. ${f.term}: ${f.definition}`),
    ``,`QUIZ:`,
    ...(s.quiz||[]).map((q,i)=>`${i+1}. ${q.question} [${q.answer}] ${q.explanation}`),
    ``,`RESOURCES:`,
    ...(s.resources||[]).map(r=>`- ${r.name}: ${r.url} — ${r.why}`),
  ].join('\n');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
if(!API_KEY) showSetup(); else showHome();

function showSetup(){
  render(`
    <div style="max-width:480px;margin:3rem auto">
      <div class="mono-label" style="color:var(--a0);margin-bottom:10px">One-time setup</div>
      <div style="font-family:monospace;font-size:22px;font-weight:700;letter-spacing:2px;margin-bottom:16px">ADD API KEY</div>
      <p style="font-size:13px;color:var(--soft);line-height:1.7;margin-bottom:20px">
        This app needs an Anthropic API key to generate study materials.<br>
        Your key is saved <strong style="color:var(--txt)">only on this device</strong> — it never appears in the code or on GitHub.
      </p>
      <div style="margin-bottom:8px">
        <div class="mono-label" style="margin-bottom:6px">Anthropic API Key</div>
        <input id="key-input" type="password" placeholder="sk-ant-..." style="width:100%;padding:10px 14px;font-size:13px;border-radius:4px;border:1px solid var(--bdr);background:var(--surf);color:var(--txt);outline:none;font-family:monospace"/>
      </div>
      <p style="font-size:11px;color:var(--mut);margin-bottom:16px">
        Get your key at <a href="https://console.anthropic.com" target="_blank" style="color:var(--a1)">console.anthropic.com</a> → API Keys → Create Key
      </p>
      <button class="btn btn-pri" onclick="saveKey()">Save & Continue</button>
      <div id="key-err" class="status-err" style="margin-top:8px"></div>
    </div>
  `);
}

function saveKey(){
  const k = document.getElementById('key-input')?.value?.trim();
  if(!k || !k.startsWith('sk-ant-')){
    document.getElementById('key-err').textContent = 'Please enter a valid Anthropic API key (starts with sk-ant-)';
    return;
  }
  API_KEY = k;
  localStorage.setItem('ltt-apikey', k);
  showHome();
}
</script>
