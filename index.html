<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX — Your AP Exam Edge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070d;--surf:#0f0f1a;--card:#141420;--card2:#1a1a28;--bdr:#252535;--bdr2:#32324a;
  --txt:#eeeef5;--mut:#5a5a7a;--soft:#9090b8;
  --accent:#f0c040;
  --a0:#f0c040;--a1:#4fc3f7;--a2:#a78bfa;--a3:#34d399;--a4:#fb7185;--a5:#c084fc;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;min-height:100vh;overflow-x:hidden}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer}
a{color:inherit;text-decoration:none}

/* ── HERO ── */
.hero{position:relative;padding:2rem 1.5rem 1.5rem;background:linear-gradient(160deg,#0a0a18 0%,#0f0f20 60%,#070712 100%);border-bottom:1px solid var(--bdr);overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;left:-60px;width:400px;height:400px;background:radial-gradient(circle,rgba(240,192,64,0.07) 0%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-40px;right:-40px;width:300px;height:300px;background:radial-gradient(circle,rgba(79,195,247,0.05) 0%,transparent 70%);pointer-events:none}
.hero-inner{max-width:820px;margin:0 auto;position:relative;z-index:1}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hero-badge{display:inline-block;font-family:monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);background:rgba(240,192,64,0.1);border:1px solid rgba(240,192,64,0.25);border-radius:2px;padding:4px 10px;margin-bottom:12px}
.hero-title{font-family:monospace;font-size:clamp(32px,7vw,56px);font-weight:900;letter-spacing:-1px;line-height:0.95;color:var(--txt)}
.hero-title .apex{color:var(--accent)}
.hero-sub{margin-top:10px;font-size:14px;color:var(--soft);max-width:400px;line-height:1.6}

/* ── AXIE MASCOT ── */
.axie-wrap{position:relative;flex-shrink:0;cursor:pointer}
.axie-wrap:hover .axie-svg{transform:rotate(-5deg) scale(1.05)}
.axie-svg{transition:transform .3s;width:80px;height:80px}
.axie-bubble{position:absolute;right:88px;top:0;background:var(--card2);border:1px solid var(--bdr2);border-radius:12px 12px 0 12px;padding:8px 12px;font-size:12px;color:var(--soft);white-space:nowrap;max-width:200px;white-space:normal;line-height:1.5;opacity:0;transform:scale(.8);transition:all .2s;pointer-events:none;z-index:10}
.axie-bubble.show{opacity:1;transform:scale(1)}
.axie-bubble::after{content:'';position:absolute;right:-8px;top:10px;border:4px solid transparent;border-left-color:var(--bdr2)}

/* ── STATS BAR ── */
.stats-bar{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:20px;padding:6px 12px;font-size:12px;color:var(--soft)}
.stat-pill .val{font-family:monospace;font-weight:700;font-size:13px;color:var(--txt)}
.stat-pill .icon{font-size:14px}

/* ── COUNTDOWN ── */
.countdown{background:linear-gradient(135deg,rgba(240,192,64,0.08),rgba(240,192,64,0.04));border:1px solid rgba(240,192,64,0.25);border-radius:8px;padding:14px 18px;margin-top:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.cd-num{font-family:monospace;font-size:32px;font-weight:900;color:var(--accent);line-height:1}
.cd-label{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:2px;font-family:monospace}
.cd-divider{width:1px;height:36px;background:var(--bdr2)}
.cd-msg{font-size:13px;color:var(--soft);line-height:1.5}

/* ── XP BAR ── */
.xp-bar-wrap{margin-top:12px}
.xp-bar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.xp-bar{height:6px;background:var(--bdr);border-radius:3px;overflow:hidden}
.xp-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),#ff9f40);transition:width .6s cubic-bezier(.34,1.56,.64,1)}

/* ── LAYOUT ── */
#app{max-width:820px;margin:0 auto}
.tab-bar{display:flex;border-bottom:1px solid var(--bdr);padding:0 1rem;overflow-x:auto;background:var(--surf);position:sticky;top:0;z-index:50}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:13px 14px;font-size:11px;font-family:monospace;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);white-space:nowrap;transition:color .15s}
.tab.active{border-bottom-color:var(--accent);color:var(--accent);font-weight:700}
.tab:hover:not(.active){color:var(--soft)}
.content{padding:1.5rem 1rem}

/* ── BUTTONS ── */
.btn{background:transparent;border:1px solid var(--bdr2);border-radius:4px;padding:9px 18px;font-size:13px;color:var(--txt);transition:all .15s}
.btn:hover{border-color:var(--soft);background:rgba(255,255,255,.04)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-accent{background:linear-gradient(135deg,rgba(240,192,64,0.15),rgba(240,192,64,0.08));border:1px solid rgba(240,192,64,0.4);color:var(--accent);font-weight:600;font-size:14px;padding:12px 24px;border-radius:6px;transition:all .2s}
.btn-accent:hover{background:linear-gradient(135deg,rgba(240,192,64,0.25),rgba(240,192,64,0.15));border-color:var(--accent)}
.btn-accent:disabled{opacity:.35;cursor:not-allowed}
.btn-full{display:block;width:100%;text-align:center}
.btn-danger{color:var(--a4);border-color:rgba(251,113,133,0.25);font-size:12px;padding:5px 12px}
.btn-notion{color:var(--a2);border-color:rgba(167,139,250,0.35);font-size:12px;padding:8px 14px;display:flex;align-items:center;gap:6px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:16px 20px}
.session-card{border-left:3px solid;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:14px 18px;cursor:pointer;border-radius:6px;transition:background .15s}
.session-card:hover{background:var(--card2)}

/* ── UNIT TILES ── */
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:8px}
.unit-tile{border:1px solid var(--bdr);border-radius:8px;padding:18px;cursor:pointer;position:relative;overflow:hidden;transition:all .2s;background:var(--card)}
.unit-tile:hover{border-color:var(--bdr2);background:var(--card2);transform:translateY(-2px)}
.unit-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.unit-tile-num{font-family:monospace;font-size:48px;font-weight:900;line-height:1;opacity:.08;position:absolute;top:8px;right:12px;letter-spacing:-2px}
.unit-tile-sessions{font-family:monospace;font-size:9px;letter-spacing:1px;margin-top:8px;display:inline-block;padding:2px 8px;border-radius:2px}

/* ── PROGRESS RING ── */
.ring-wrap{position:relative;width:40px;height:40px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:monospace;font-size:9px;font-weight:700;line-height:1}

/* ── SECTION HEADERS ── */
.section-header{display:flex;align-items:baseline;gap:12px;padding-bottom:10px;border-bottom:1px solid var(--bdr);margin:24px 0 12px}
.section-num{font-family:monospace;font-size:36px;font-weight:900;opacity:.1;line-height:1}
.section-name{font-family:monospace;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase}

/* ── FORMULA BOXES ── */
.formula{background:#0a0a14;border:1px solid var(--bdr);border-radius:2px;padding:10px 16px;font-family:monospace;font-size:13px;letter-spacing:.5px;margin:6px 0}
.formula span{color:var(--mut);font-size:11px}

/* ── LABELS ── */
.mono-label{font-family:monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--mut)}

/* ── FLASHCARD ── */
.fc-big{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:40px 28px;min-height:220px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;transition:all .2s;position:relative;overflow:hidden}
.fc-big:hover{background:var(--card2);transform:translateY(-1px)}
.fc-big::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}

/* ── QUIZ OPTS ── */
.quiz-opt{padding:11px 16px;border-radius:4px;border:1px solid var(--bdr);cursor:pointer;font-size:13px;color:var(--soft);transition:all .15s;margin-bottom:8px}
.quiz-opt:hover:not(.locked){background:rgba(255,255,255,.03);border-color:var(--bdr2)}

/* ── CHAT ── */
.chat-bubble-user{background:rgba(79,195,247,0.1);border:1px solid rgba(79,195,247,0.25);color:#4fc3f7;padding:11px 16px;border-radius:6px;font-size:13px;line-height:1.7;max-width:78%}
.chat-bubble-ai{background:var(--card);border:1px solid var(--bdr);color:var(--soft);padding:12px 16px;border-radius:6px;font-size:13px;line-height:1.8;max-width:82%}

/* ── SETUP ── */
.setup-box{max-width:460px;margin:3rem auto;padding:0 1rem}
.setup-steps{background:rgba(79,195,247,0.05);border:1px solid rgba(79,195,247,0.2);border-radius:6px;padding:14px 18px;margin-bottom:18px;font-size:12px;color:var(--soft);line-height:1.9}

/* ── MISC ── */
.status-err{color:var(--a4);font-size:13px;padding:6px 0}
.spinner{width:16px;height:16px;border:2px solid var(--bdr2);border-top-color:var(--a1);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
ul.bullets{padding:0;list-style:none;margin:0}
ul.bullets li{padding:4px 0 4px 18px;position:relative;color:var(--soft);font-size:12px;line-height:1.65;border-bottom:1px solid rgba(255,255,255,.025)}
ul.bullets li::before{content:'→';position:absolute;left:0;color:var(--mut);font-size:10px;top:5px}
.notion-export{background:#08080f;border:1px solid rgba(167,139,250,0.25);border-radius:4px;padding:10px;font-family:monospace;font-size:11px;color:var(--soft);width:100%;height:140px;resize:none;outline:none;margin-top:8px}
.exam-tip{background:rgba(240,192,64,0.05);border:1px solid rgba(240,192,64,0.2);border-left:3px solid var(--a0);border-radius:4px;padding:14px 18px}
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}

/* ── UNIT NAV BAR ── */
.unit-nav-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(7,7,13,0.96);border-top:1px solid var(--bdr2);display:flex;justify-content:center;z-index:100;backdrop-filter:blur(12px)}
.unit-nav-btn{background:none;border:none;border-top:2px solid transparent;padding:8px 0;flex:1;max-width:110px;font-family:monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.unit-nav-btn:hover{color:var(--soft);background:rgba(255,255,255,.02)}
.unit-nav-btn.active{border-top-color:var(--accent);color:var(--accent)}
.unit-nav-num{font-size:18px;font-weight:900;font-family:monospace;line-height:1}
.has-unit-nav{padding-bottom:60px}

/* ── CONFETTI ── */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:9999;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* ── XP TOAST ── */
.xp-toast{position:fixed;top:20px;right:20px;background:rgba(240,192,64,0.15);border:1px solid rgba(240,192,64,0.4);border-radius:6px;padding:10px 16px;font-family:monospace;font-size:13px;color:var(--accent);z-index:9998;animation:toastIn .3s ease,toastOut .3s ease 1.7s forwards;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(20px)}}

/* ── COLOR PICKER ── */
.color-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0}
.color-swatch.active{border-color:var(--txt);transform:scale(1.15)}

/* ── GRADE BADGE ── */
.grade-badge{background:var(--card);border-radius:6px;padding:12px 16px;min-width:140px;text-align:center}
.grade-score{font-family:monospace;font-size:32px;font-weight:900;line-height:1}
.grade-bar{height:4px;border-radius:2px;margin-top:8px;overflow:hidden;background:var(--bdr)}
.grade-bar-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.34,1.56,.64,1)}
</style>
</head>
<body>

<div class="hero" id="hero-section">
  <div class="hero-inner">
    <div class="hero-top">
      <div>
        <div class="hero-badge">AP Exam Prep · CoCo's Study Tool</div>
        <div class="hero-title"><span class="apex">APEX</span></div>
        <div class="hero-sub">Turn any lecture into a complete study system.</div>
      </div>
      <!-- AXIE MASCOT -->
      <div class="axie-wrap" onclick="axieSpeak()" id="axie">
        <svg class="axie-svg" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
          <!-- Body -->
          <ellipse cx="40" cy="50" rx="22" ry="20" fill="#1a1a30" stroke="#f0c040" stroke-width="1.5"/>
          <!-- Head -->
          <ellipse cx="40" cy="28" rx="18" ry="17" fill="#1a1a30" stroke="#f0c040" stroke-width="1.5"/>
          <!-- Ear tufts -->
          <polygon points="26,14 22,4 30,12" fill="#f0c040" opacity=".9"/>
          <polygon points="54,14 58,4 50,12" fill="#f0c040" opacity=".9"/>
          <!-- Eyes -->
          <circle cx="33" cy="26" r="6" fill="#0a0a18" stroke="#4fc3f7" stroke-width="1.5"/>
          <circle cx="47" cy="26" r="6" fill="#0a0a18" stroke="#4fc3f7" stroke-width="1.5"/>
          <circle cx="34" cy="25" r="3" fill="#4fc3f7"/>
          <circle cx="48" cy="25" r="3" fill="#4fc3f7"/>
          <circle cx="35" cy="24" r="1" fill="white" opacity=".8"/>
          <circle cx="49" cy="24" r="1" fill="white" opacity=".8"/>
          <!-- Beak -->
          <polygon points="40,32 37,36 43,36" fill="#f0c040"/>
          <!-- Graduation cap -->
          <rect x="24" y="12" width="32" height="5" rx="1" fill="#f0c040"/>
          <rect x="37" y="8" width="6" height="5" rx="1" fill="#f0c040"/>
          <line x1="56" y1="14" x2="60" y2="20" stroke="#f0c040" stroke-width="2"/>
          <circle cx="60" cy="21" r="2" fill="#f0c040"/>
          <!-- Wings -->
          <ellipse cx="20" cy="52" rx="8" ry="12" fill="#f0c040" opacity=".2" transform="rotate(-15 20 52)"/>
          <ellipse cx="60" cy="52" rx="8" ry="12" fill="#f0c040" opacity=".2" transform="rotate(15 60 52)"/>
          <!-- Feet -->
          <line x1="33" y1="68" x2="28" y2="74" stroke="#f0c040" stroke-width="2"/>
          <line x1="33" y1="68" x2="33" y2="75" stroke="#f0c040" stroke-width="2"/>
          <line x1="33" y1="68" x2="38" y2="74" stroke="#f0c040" stroke-width="2"/>
          <line x1="47" y1="68" x2="42" y2="74" stroke="#f0c040" stroke-width="2"/>
          <line x1="47" y1="68" x2="47" y2="75" stroke="#f0c040" stroke-width="2"/>
          <line x1="47" y1="68" x2="52" y2="74" stroke="#f0c040" stroke-width="2"/>
        </svg>
        <div class="axie-bubble" id="axie-bubble">Hoot! Let's ace this exam 🎓</div>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- Countdown -->
    <div class="countdown" id="countdown"></div>

    <!-- XP bar -->
    <div class="xp-bar-wrap" id="xp-bar-wrap"></div>
  </div>
</div>

<div id="app"></div>

<script>
const MODEL='claude-sonnet-4-20250514';
let API_KEY=localStorage.getItem('apex-key')||'';

// ── THEME ──────────────────────────────────────────────────────────────────
const THEMES=['#f0c040','#4fc3f7','#a78bfa','#34d399','#fb7185','#c084fc','#ff7849'];
let accentColor=localStorage.getItem('apex-accent')||'#f0c040';
function setAccent(c){accentColor=c;localStorage.setItem('apex-accent',c);document.documentElement.style.setProperty('--accent',c);document.documentElement.style.setProperty('--a0',c);}
setAccent(accentColor);

// ── XP & STREAK ───────────────────────────────────────────────────────────
let xpData=JSON.parse(localStorage.getItem('apex-xp')||'{"xp":0,"level":1,"streak":0,"lastDate":"","sessions":0,"cardsReviewed":0,"quizzesTaken":0}');
function saveXP(){localStorage.setItem('apex-xp',JSON.stringify(xpData));}
function xpForLevel(l){return l*100;}
function addXP(pts,label){
  xpData.xp+=pts;
  while(xpData.xp>=xpForLevel(xpData.level)){xpData.xp-=xpForLevel(xpData.level);xpData.level++;}
  saveXP();showXPToast(`+${pts} XP — ${label}`);updateHeroStats();
}
function checkStreak(){
  const today=new Date().toDateString();
  if(xpData.lastDate===today)return;
  const yesterday=new Date(Date.now()-86400000).toDateString();
  xpData.streak=xpData.lastDate===yesterday?xpData.streak+1:1;
  xpData.lastDate=today;saveXP();
}
function showXPToast(msg){
  const t=document.createElement('div');t.className='xp-toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2200);
}

// ── COUNTDOWN ─────────────────────────────────────────────────────────────
function getCountdown(){
  const exam=new Date('2026-05-07T08:00:00');
  const now=new Date();
  const diff=exam-now;
  if(diff<=0)return{days:0,hours:0,done:true};
  return{days:Math.floor(diff/86400000),hours:Math.floor((diff%86400000)/3600000),done:false};
}
function updateHeroStats(){
  const cd=getCountdown();
  const pct=Math.min(100,Math.round((xpData.xp/xpForLevel(xpData.level))*100));
  const cdEl=document.getElementById('countdown');
  if(cdEl){
    if(cd.done){cdEl.innerHTML=`<div class="cd-msg" style="color:var(--accent);font-weight:700">🎉 AP Exam day! You've got this, CoCo!</div>`;}
    else{
      const urgency=cd.days<7?'var(--a4)':cd.days<30?'var(--a0)':'var(--a3)';
      cdEl.innerHTML=`
        <div><div class="cd-num" style="color:${urgency}">${cd.days}</div><div class="cd-label">days</div></div>
        <div class="cd-divider"></div>
        <div><div class="cd-num" style="color:${urgency};font-size:20px">${cd.hours}h</div><div class="cd-label">hours</div></div>
        <div class="cd-divider"></div>
        <div class="cd-msg">until AP Macro Exam<br><span style="color:var(--mut);font-size:11px">May 7, 2026 · 8:00 AM</span></div>
        <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
          ${THEMES.map(c=>`<div class="color-swatch ${c===accentColor?'active':''}" style="background:${c}" onclick="setAccent('${c}');updateHeroStats()" title="Change color"></div>`).join('')}
        </div>`;
    }
  }
  const sbEl=document.getElementById('stats-bar');
  if(sbEl){sbEl.innerHTML=`
    <div class="stat-pill"><span class="icon">🔥</span><span>${xpData.streak} day streak</span></div>
    <div class="stat-pill"><span class="icon">⭐</span><span>Level <span class="val">${xpData.level}</span></span></div>
    <div class="stat-pill"><span class="icon">📚</span><span><span class="val">${sessions.length}</span> sessions</span></div>
    <div class="stat-pill"><span class="icon">🃏</span><span><span class="val">${xpData.cardsReviewed}</span> cards</span></div>`;}
  const xpEl=document.getElementById('xp-bar-wrap');
  if(xpEl){xpEl.innerHTML=`
    <div class="xp-bar-top">
      <span class="mono-label">XP — Level ${xpData.level}</span>
      <span class="mono-label" style="color:var(--accent)">${xpData.xp} / ${xpForLevel(xpData.level)}</span>
    </div>
    <div class="xp-bar"><div class="xp-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${accentColor},#ff9f40)"></div></div>`;}
}

// ── AXIE ──────────────────────────────────────────────────────────────────
const AXIE_PHRASES=[
  'Hoot! You\'re on a roll 🎓','Keep it up! The AP exam is waiting 📝','Owl always believe in you! 🦉','Every session = more XP. Let\'s go! ⚡','History is made by those who show up 💪','You\'re smarter than yesterday 🧠','AP 5 incoming! 🏆','Hoot hoot! Economics is actually fun 🤓'];
let axiePhraseIdx=0;
function axieSpeak(){
  const bubble=document.getElementById('axie-bubble');
  if(!bubble)return;
  bubble.textContent=AXIE_PHRASES[axiePhraseIdx%AXIE_PHRASES.length];
  axiePhraseIdx++;
  bubble.classList.add('show');
  clearTimeout(window._axieTmo);

const UNIT_OVERVIEWS=[
  {id:1,tagline:'The foundation everything else is built on.',intro:'Before you can understand why the stock market moves or what the Fed does, you need to get comfortable with a few big ideas. Unit 1 is all about those fundamentals — and once these click, the rest of AP Macro starts to make a lot more sense.',sections:[{title:'Scarcity — the reason economics exists',body:'Here\'s the core problem: people want more than they can have. Resources — time, money, land, labor — are limited. Wants are not. That gap is called **scarcity**, and it\'s why every decision has a cost. Even choosing to watch Netflix instead of studying has a cost.'},{title:'Opportunity cost — the real price of everything',body:'Every time you choose one thing, you give up another. That thing you give up is your **opportunity cost**. The true cost of any decision isn\'t just what you paid — it\'s what you didn\'t do instead.'},{title:'The PPC — a picture of what\'s possible',body:'The **Production Possibilities Curve** shows the maximum output a country can produce. On the curve = efficient. Inside = wasting resources. Outside = impossible. Outward shift = economic growth.'},{title:'Comparative advantage — why trade makes everyone richer',body:'Even if one country is better at everything, it still makes sense to trade. Focus on what you\'re **relatively** better at — your comparative advantage. Everyone ends up with more.'},{title:'Supply & demand — how markets find their price',body:'When price goes up, buyers want less and sellers want more. When they meet, you get **equilibrium**. Master the shifters and you can predict what happens in almost any market.'}],examTip:'Unit 1 is 5–10% of the exam but runs through everything. Opportunity cost, PPC shifts, and comparative advantage appear in FRQs constantly.'},
  {id:2,tagline:'How do we know if the economy is healthy?',intro:'You can\'t fix what you can\'t measure. Unit 2 is about the scoreboard — the tools economists use to take the economy\'s temperature. These are the numbers policymakers obsess over every day.',sections:[{title:'GDP — the economy\'s report card',body:'**Gross Domestic Product** = total value of everything a country produces. GDP = C + Ig + G + Xn. NOT included: used goods, stocks, underground activity. Real GDP adjusts for inflation — always use it to compare across years.'},{title:'Unemployment — not everyone counts',body:'You\'re only "unemployed" if actively looking. Stop looking = fall out of labor force = rate goes DOWN. Three types: **frictional** (between jobs), **structural** (skills mismatch), **cyclical** (recession). Natural rate = frictional + structural.'},{title:'Inflation — when your dollar buys less',body:'Inflation = general rise in price level. Main measure = **CPI**. Winners: **borrowers** (repay with cheaper dollars). Losers: lenders and savers (money loses purchasing power).'},{title:'The business cycle — boom and bust',body:'Economies expand, peak, contract, trough. **Recessionary gap** = output below potential. **Inflationary gap** = economy running hot. Where you are determines which policy tools make sense.'}],examTip:'Unit 2 is 12–17% of the exam. FRQs love unemployment rate, inflation rate, and GDP deflator calculations. Know your formulas cold.'},
  {id:3,tagline:'What causes booms and busts — and what can the government do?',intro:'Unit 3 is the biggest, most tested unit. The AS/AD model shows how the whole economy works in one graph. Master this and you\'re in great shape.',sections:[{title:'The AS/AD model — the economy in one graph',body:'**AD** slopes down. **SRAS** slopes up. **LRAS** is vertical. Where AD meets SRAS = short-run equilibrium. Positive demand shock → higher output AND prices. Negative supply shock = **stagflation** — the worst combination.'},{title:'The multiplier — small changes, big effects',body:'Government spends $1 → that becomes income → someone spends 80¢ → and so on. **Spending multiplier** = 1 ÷ MPS. **Tax multiplier** = −MPC ÷ MPS. Always one less than spending multiplier.'},{title:'Fiscal policy — the government\'s toolkit',body:'**Expansionary** (recession): ↑ spending, ↓ taxes → AD right. **Contractionary** (inflation): ↓ spending, ↑ taxes → AD left. **Automatic stabilizers** kick in without legislation.'},{title:'Long-run self-correction',body:'Recessionary gap → wages fall → SRAS right → full employment. Inflationary gap → wages rise → SRAS left → full employment. Takes time — that\'s why policymakers don\'t always wait.'}],examTip:'Unit 3 is 17–27% of the exam and the heart of every FRQ. Draw the AS/AD model, show shifts, identify gaps, explain policy — all connected.'},

  {id:5,tagline:'What happens in the long run when policy goes wrong — or right?',intro:'Unit 5 is where short-run thinking meets long-run reality. Policies that feel good today can have painful side effects later.',sections:[{title:'The Phillips Curve — inflation vs unemployment',body:'Short run: lower unemployment → higher inflation. **SRPC** is downward sloping. Long run: no tradeoff — **LRPC is vertical** at the natural rate. The SRPC mirrors the SRAS — they shift together.'},{title:'Crowding out — the dark side of deficit spending',body:'Government borrows → ↑ demand for loanable funds → real rates rise → private investment falls = **crowded out**. Budget surplus does the reverse: **crowding in**.'},{title:'The Quantity Theory of Money',body:'**M × V = P × Y**. If M doubles and V, Y stay constant → P doubles → inflation. This is why excessive money printing causes inflation.'},{title:'Long-run economic growth',body:'Real growth = LRAS shifting right. Drivers: more resources, better tech, improved productivity. Government can help with R&D, tax credits, education, deregulation.'}],examTip:'Unit 5 is 20–30% — the highest weight. Know Phillips Curve shifts, crowding out in the loanable funds graph, and long-run policy consequences.'},

function detectUnit(s){
  const text=[s.title,s.summary,...(s.studyGuide?.keyTakeaways||[]),...(s.studyGuide?.sections||[]).map(x=>x.title+' '+(x.cards||[]).map(c=>c.title).join(' '))].join(' ').toLowerCase();

}

  return`<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 36 36">
      <circle cx="18" cy="18" r="${r}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="3"/>
      <circle cx="18" cy="18" r="${r}" fill="none" stroke="${color}" stroke-width="3" stroke-dasharray="${dash} ${gap}" stroke-linecap="round"/>

async function generate(){
  const tx=document.getElementById('tx')?.value?.trim();
  if(!tx)return;
  document.getElementById('gen-btn').disabled=true;
  document.getElementById('loading').style.display='flex';
  document.getElementById('gen-err').textContent='';
  try{
    const sys=`You are an expert AP Macroeconomics tutor. Given a lecture transcript, respond ONLY with valid JSON — no markdown, no fences:
{"title":"short title","summary":"2-3 sentence summary","instructorGrade":{"score":85,"rationale":"2-3 sentence honest assessment. Score 1-100 based on: clarity of explanations (40pts), use of examples (20pts), coverage of key concepts (20pts), student engagement (20pts)."},"studyGuide":{"keyTakeaways":["...","...","...","..."],"sections":[{"title":"Section Title","cards":[{"label":"label","title":"Card Title","bullets":["bullet with **bold** terms"]},{"label":"label","title":"Card Title","text":"prose with **bold** terms"}],"formulas":[{"eq":"formula","label":"description"}]}],"formulas":[{"eq":"formula","label":"description"}]},"flashcards":[{"term":"...","definition":"...","example":"..."}],"quiz":[{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"answer":"A","explanation":"..."}],"resources":[{"name":"...","url":"...","why":"..."}]}
Rules: 2-3 sections, 2-3 cards each, 4 keyTakeaways, 3-5 global formulas, 6 flashcards, 5 quiz questions (answer=single letter), 3 resources. Be honest in instructor grade.`;
    const raw=await callClaude([{role:'user',content:`Transcript:\n${tx.slice(0,6000)}`}],sys);
    const parsed=JSON.parse(raw.replace(/^```json|^```|```$/gm,'').trim());
    const s={id:Date.now(),date:new Date().toLocaleDateString(),transcript:tx,...parsed};
    s.unit=detectUnit(s);
    sessions.unshift(s);saveSessions(sessions);
    checkStreak();xpData.sessions++;addXP(50,'New session created!');
    axieSay('Hoot! New session ready — let\'s study! 🦉');
    openSession(0);
  }catch(e){
    if(e.message!=='401'&&e.message!=='No key'){document.getElementById('gen-err').textContent='Error: '+e.message;}
    document.getElementById('gen-btn').disabled=false;

function switchStudyTab(t){

function toggleNotion(){

}

function renderStudyTab(){
  const el=document.getElementById('study-content');if(!el)return;
  const s=currentSession;
  if(currentTab==='visual')el.innerHTML=renderVisual(s.studyGuide);
  else if(currentTab==='flashcards')el.innerHTML=renderFlashcards(s.flashcards);
  else if(currentTab==='quiz')el.innerHTML=renderQuiz(s.quiz);
  else if(currentTab==='apexam')el.innerHTML=renderAPExam(s);
  else if(currentTab==='gaps')el.innerHTML=renderGaps(s);
  else if(currentTab==='chat')el.innerHTML=renderChat();
  else if(currentTab==='resources')el.innerHTML=renderResources(s.resources);
}

// ── FLASHCARDS ─────────────────────────────────────────────────────────────

    <div style="margin-bottom:20px">

        <div class="mono-label">Card ${fcIndex+1} of ${cards.length}</div>

        <div style="margin-top:16px;font-size:28px">🤔</div>

      <div id="fc-back" style="display:none">
        <div class="mono-label" style="color:${a};margin-bottom:10px">${esc(fc.term)}</div>
        <p style="font-size:16px;color:var(--soft);line-height:1.7;margin:0">${esc(fc.definition)}</p>
        ${fc.example?`<p style="font-size:12px;color:var(--mut);font-style:italic;margin-top:14px;border-top:1px solid var(--bdr);padding-top:12px">💡 ${esc(fc.example)}</p>`:''}

      <button class="btn" onclick="prevCard()" ${fcIndex===0?'disabled':''} style="flex:1;padding:13px;font-size:16px">←</button>

function flipMainCard(){
  const f=document.getElementById('fc-front'),b=document.getElementById('fc-back'),c=document.getElementById('fc-main');
  if(!f||!b)return;
  const on=b.style.display!=='none';
  f.style.display=on?'flex':'none';b.style.display=on?'none':'flex';
  if(!on){xpData.cardsReviewed++;addXP(5,'Card reviewed!');}
  c.style.background=on?'var(--card)':'rgba(79,195,247,0.05)';
}
function nextCard(){fcIndex=Math.min(fcIndex+1,currentSession.flashcards.length-1);renderStudyTab();}
function prevCard(){fcIndex=Math.max(fcIndex-1,0);renderStudyTab();}
function goToCard(i){fcIndex=i;renderStudyTab();}
function shuffleCards(){currentSession.flashcards.sort(()=>Math.random()-.5);fcIndex=0;renderStudyTab();axieSay('Shuffled! Mix it up 🦉');}

// ── QUIZ ───────────────────────────────────────────────────────────────────
let quizScore=0,quizTotal=0;
function renderQuiz(quiz){
  quizScore=0;quizTotal=quiz?.length||0;
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div class="mono-label">${quiz?.length} Questions 📝</div>
    <div id="quiz-score-display" class="mono-label" style="color:var(--accent)"></div>
  </div>
  ${(quiz||[]).map((q,i)=>`
    <div class="card" style="border-left:3px solid ${ac(i)};margin-bottom:14px;padding:18px 20px">
      <p style="font-weight:600;font-size:14px;color:var(--txt);line-height:1.55;margin-bottom:14px">${i+1}. ${esc(q.question)}</p>
      <div>${(q.options||[]).map((opt,oi)=>`<div id="opt-${i}-${oi}" class="quiz-opt" onclick="pickOpt(${i},'${opt[0]}')">${esc(opt)}</div>`).join('')}</div>
      <button class="btn-accent" id="cbtn-${i}" style="display:none;margin-top:10px;font-size:12px;padding:7px 18px" onclick="checkAnswer(${i},'${q.answer}','${encodeURIComponent(q.explanation)}')">Check Answer ✓</button>
      <div id="exp-${i}" style="display:none;font-size:12px;color:var(--soft);border-top:1px solid var(--bdr);padding-top:12px;margin-top:12px;line-height:1.7"></div>
    </div>`).join('')}`;
}

function pickOpt(qi,letter){
  if(checked[qi])return;
  picks[qi]=letter;
  document.querySelectorAll(`[id^="opt-${qi}-"]`).forEach((el,oi)=>{
    const l='ABCD'[oi];
    el.style.background=l===letter?'rgba(79,195,247,0.1)':'transparent';
    el.style.borderColor=l===letter?'#4fc3f7':'var(--bdr)';
    el.style.color=l===letter?'#4fc3f7':'var(--soft)';
  });
  const btn=document.getElementById(`cbtn-${qi}`);if(btn)btn.style.display='inline-block';
}

function checkAnswer(qi,correct,expEnc){
  checked[qi]=true;const chosen=picks[qi];
  const isCorrect=chosen===correct;
  document.querySelectorAll(`[id^="opt-${qi}-"]`).forEach((el,oi)=>{
    const l='ABCD'[oi];
    if(l===correct){el.style.background='rgba(52,211,153,0.1)';el.style.borderColor='#34d399';el.style.color='#34d399';}
    else if(l===chosen&&!isCorrect){el.style.background='rgba(251,113,133,0.1)';el.style.borderColor='#fb7185';el.style.color='#fb7185';}
    el.classList.add('locked');el.style.cursor='default';
  });
  const btn=document.getElementById(`cbtn-${qi}`);if(btn)btn.style.display='none';
  const exp=document.getElementById(`exp-${qi}`);
  if(exp){exp.style.display='block';exp.innerHTML=(isCorrect?'✅ ':'❌ ')+esc(decodeURIComponent(expEnc));}
  if(isCorrect){quizScore++;addXP(15,'Correct answer!');}
  else{addXP(5,'Nice try — keep going!');}
  const sd=document.getElementById('quiz-score-display');
  if(sd)sd.textContent=`${quizScore}/${Object.keys(checked).length} correct`;
  // Check if all answered
  if(Object.keys(checked).length===quizTotal){
    setTimeout(()=>{
      if(quizScore===quizTotal){launchConfetti();axieSay('PERFECT SCORE! You\'re incredible! 🏆');}
      else if(quizScore>=quizTotal*0.8){axieSay(`${quizScore}/${quizTotal} — Great job! Almost perfect! 🌟`);}
      else{axieSay(`${quizScore}/${quizTotal} — Review the ones you missed! You\'ve got this 💪`);}
    },500);
    xpData.quizzesTaken++;saveXP();
  }
}

      </div>
      ${frq.context?`<div style="background:rgba(255,255,255,.03);border-left:2px solid var(--bdr2);padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--soft);line-height:1.6;font-style:italic">${esc(frq.context)}</div>`:''}

        return`<div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--bdr)">

            <div style="flex:1">
              <p style="font-size:13px;font-weight:600;color:var(--txt);margin:0 0 6px;line-height:1.5">${esc(p.question)}</p>
              <div style="display:flex;gap:6px;flex-wrap:wrap">
                <span style="font-family:monospace;font-size:9px;color:${sc};background:${sc}18;border:1px solid ${sc}30;padding:2px 8px;border-radius:2px">${p.skill}</span>
                <span class="mono-label">${p.points} pt${p.points>1?'s':''}</span>
              </div>
            </div>
          </div>
          <div id="frq-ans-${fi}-${pi}" style="display:none;margin-left:32px">
            <div style="background:rgba(52,211,153,0.05);border:1px solid rgba(52,211,153,0.2);border-radius:4px;padding:12px 14px;margin-bottom:8px">
              <div class="mono-label" style="color:#34d399;margin-bottom:6px">✅ Model Answer</div>
              <p style="font-size:13px;color:var(--soft);line-height:1.7;margin:0">${esc(p.modelAnswer)}</p>
            </div>
            <div style="background:rgba(240,192,64,0.05);border:1px solid rgba(240,192,64,0.2);border-radius:4px;padding:10px 14px">
              <div class="mono-label" style="color:var(--accent);margin-bottom:4px">📋 AP Rubric Hint</div>
              <p style="font-size:12px;color:var(--soft);line-height:1.6;margin:0">${esc(p.rubric)}</p>
            </div>
          </div>
          <button class="btn" onclick="toggleFRQAnswer('frq-ans-${fi}-${pi}',this)" style="margin-top:8px;margin-left:32px;font-size:11px;color:var(--mut)">Show Model Answer</button>
        </div>`;
      }).join('')}
    </div>`).join('');

  const mcqs=(data.mcqs||[]).map((q,i)=>{
    const sc=skillColor[q.skill]||'#888';
    return`<div class="card" style="border-left:3px solid var(--a2);margin-bottom:12px;padding:16px 20px">
      <div style="display:flex;gap:10px;margin-bottom:12px">
        <span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--a2);min-width:24px">${i+1}.</span>
        <div style="flex:1">
          <p style="font-size:14px;font-weight:600;color:var(--txt);margin:0 0 8px;line-height:1.5">${esc(q.question)}</p>
          <span style="font-family:monospace;font-size:9px;color:${sc};background:${sc}18;border:1px solid ${sc}30;padding:2px 8px;border-radius:2px">${q.skill}</span>
        </div>
      </div>
      <div>${(q.options||[]).map((opt,oi)=>`<div id="mcq-opt-${i}-${oi}" class="quiz-opt" onclick="pickMCQ(${i},'${opt[0]}')" style="margin-left:24px">${esc(opt)}</div>`).join('')}</div>
      <div style="margin-left:24px;margin-top:8px"><button id="mcq-cbtn-${i}" class="btn-accent" style="display:none;font-size:11px;padding:6px 14px" onclick="checkMCQ(${i},'${q.answer}','${encodeURIComponent(q.explanation)}')">Check ✓</button></div>
      <div id="mcq-exp-${i}" style="display:none;margin-top:10px;margin-left:24px;font-size:12px;color:var(--soft);border-top:1px solid var(--bdr);padding-top:10px;line-height:1.7"></div>
    </div>`;
  }).join('');

  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px">
    <div>
      <div class="mono-label" style="color:var(--accent);margin-bottom:4px">Free Response Questions 📝</div>
      <p style="font-size:12px;color:var(--mut)">Write your answer first, then reveal the model answer</p>
    </div>
    <button class="btn" onclick="currentSession.apExam=null;renderStudyTab()" style="font-size:11px;color:var(--mut)">🔄 Regenerate</button>
  </div>
  ${frqs}
  <div class="mono-label" style="color:var(--a2);margin:20px 0 12px">Multiple Choice Questions</div>
  ${mcqs}`;
}

function toggleFRQAnswer(id,btn){
  const el=document.getElementById(id);if(!el)return;
  const showing=el.style.display!=='none';
  el.style.display=showing?'none':'block';
  btn.textContent=showing?'Show Model Answer':'Hide Model Answer';
  if(!showing)addXP(10,'Reviewed model answer!');
}

function pickMCQ(qi,letter){
  if(mcqPicks[qi+'_c'])return;
  mcqPicks[qi]=letter;
  document.querySelectorAll(`[id^="mcq-opt-${qi}-"]`).forEach((el,oi)=>{
    const l='ABCD'[oi];
    el.style.background=l===letter?'rgba(167,139,250,0.1)':'transparent';
    el.style.borderColor=l===letter?'#a78bfa':'var(--bdr)';
    el.style.color=l===letter?'#a78bfa':'var(--soft)';
  });
  const btn=document.getElementById(`mcq-cbtn-${qi}`);if(btn)btn.style.display='inline-block';
}

function checkMCQ(qi,correct,expEnc){
  mcqPicks[qi+'_c']=true;const chosen=mcqPicks[qi];const ok=chosen===correct;
  document.querySelectorAll(`[id^="mcq-opt-${qi}-"]`).forEach((el,oi)=>{
    const l='ABCD'[oi];
    if(l===correct){el.style.background='rgba(52,211,153,0.1)';el.style.borderColor='#34d399';el.style.color='#34d399';}
    else if(l===chosen&&!ok){el.style.background='rgba(251,113,133,0.1)';el.style.borderColor='#fb7185';el.style.color='#fb7185';}
    el.style.cursor='default';
  });
  const btn=document.getElementById(`mcq-cbtn-${qi}`);if(btn)btn.style.display='none';
  const exp=document.getElementById(`mcq-exp-${qi}`);
  if(exp){exp.style.display='block';exp.innerHTML=(ok?'✅ ':'❌ ')+esc(decodeURIComponent(expEnc));}
  addXP(ok?15:5,ok?'AP MCQ correct! 🎯':'Keep practicing!');
}

// ── GAPS & WATCH-OUTS ──────────────────────────────────────────────────────
function renderGaps(session){
  if(session.gaps)return renderGapsContent(session.gaps);
  return`<div style="text-align:center;padding:2.5rem 1rem">
    <div style="font-size:48px;margin-bottom:12px">🔍</div>
    <div class="mono-label" style="color:var(--a4);margin-bottom:8px;font-size:12px">Gap Analysis</div>
    <p style="font-size:13px;color:var(--soft);max-width:380px;margin:0 auto 20px;line-height:1.7">Axie will analyze this session and flag what was missed, what's likely on the AP exam, and what to review next.</p>
    <button class="btn-accent" onclick="generateGaps()">Analyze Gaps 🔍</button>
    <div id="gap-loading" style="display:none;margin-top:16px;font-size:13px;color:var(--mut)">Axie is analyzing...</div>
    <div id="gap-err" class="status-err" style="margin-top:8px"></div>
  </div>`;
}

async function generateGaps(){
  document.getElementById('gap-loading').style.display='block';
  document.getElementById('gap-err').textContent='';
  const s=currentSession;
  try{
    const sys=`You are an AP Macroeconomics exam expert. Analyze this study session. Respond ONLY with valid JSON:
{"gaps":[{"type":"missed","title":"Topic title","description":"What was missed and why it matters"},{"type":"exam","title":"AP exam topic","description":"Likely on exam but not covered"},{"type":"review","title":"Concept","description":"Mentioned but not fully explained"}],"watchouts":["Short specific exam watch-out"],"nextSession":"One sentence: what to cover next"}
Provide 2-4 gaps, 3-5 watchouts. Be specific and honest.`;
    const raw=await callClaude([{role:'user',content:`Session: ${s.title}\nSummary: ${s.summary}\nTopics: ${(s.studyGuide?.sections||[]).map(x=>x.title).join(', ')}\nTranscript: ${(s.transcript||'').slice(0,3000)}`}],sys);
    const parsed=JSON.parse(raw.replace(/^```json|^```|```$/gm,'').trim());
    currentSession.gaps=parsed;sessions=sessions.map(x=>x.id===s.id?currentSession:x);saveSessions(sessions);
    document.getElementById('study-content').innerHTML=renderGapsContent(parsed);
    addXP(15,'Gap analysis complete!');
  }catch(e){
    if(e.message!=='401'&&e.message!=='No key'){document.getElementById('gap-err').textContent='Error: '+e.message;}
    document.getElementById('gap-loading').style.display='none';
  }
}

function renderGapsContent(data){
  const typeStyle={
    missed:{color:'#fb7185',bg:'rgba(251,113,133,0.08)',label:'❌ Not Covered'},
    exam:{color:'#f0c040',bg:'rgba(240,192,64,0.08)',label:'⚡ AP Exam Topic'},
    review:{color:'#4fc3f7',bg:'rgba(79,195,247,0.08)',label:'📖 Needs Clarification'},
  };
  return`<div style="margin-bottom:24px">
    <div class="mono-label" style="margin-bottom:14px">Gaps & Missing Coverage</div>
    ${(data.gaps||[]).map(g=>{const ts=typeStyle[g.type]||typeStyle.review;
      return`<div class="card" style="border-left:3px solid ${ts.color};margin-bottom:10px;padding:14px 18px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="font-family:monospace;font-size:9px;color:${ts.color};background:${ts.color}15;border:1px solid ${ts.color}30;padding:2px 8px;border-radius:2px">${ts.label}</span>
          <span style="font-size:14px;font-weight:600;color:var(--txt)">${esc(g.title)}</span>
        </div>
        <p style="font-size:13px;color:var(--soft);margin:0;line-height:1.6">${esc(g.description)}</p>
      </div>`;
    }).join('')}
  </div>
  <div style="margin-bottom:24px">
    <div class="mono-label" style="margin-bottom:12px">⚠️ Watch-Outs Before the Exam</div>
    ${(data.watchouts||[]).map((w,i)=>`<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr)">
      <span style="font-family:monospace;font-size:11px;color:var(--accent);min-width:20px;padding-top:1px">${i+1}</span>
      <p style="font-size:13px;color:var(--soft);margin:0;line-height:1.6">${esc(w)}</p>
    </div>`).join('')}
  </div>
  ${data.nextSession?`<div class="exam-tip"><div class="mono-label" style="color:var(--a3);margin-bottom:6px">🦉 Axie's Next Session Recommendation</div><p style="font-size:13px;color:var(--soft);line-height:1.6;margin:0">${esc(data.nextSession)}</p></div>`:''}
  <button class="btn" onclick="currentSession.gaps=null;renderStudyTab()" style="margin-top:14px;font-size:12px;color:var(--mut)">Re-analyze</button>`;
}

// ── CHAT ───────────────────────────────────────────────────────────────────
function renderChat(){
  chatHistory=[];
  return`<div class="mono-label" style="margin-bottom:14px">🦉 Ask Axie Anything</div>
  <div id="chat-msgs" style="display:flex;flex-direction:column;gap:12px;min-height:100px;margin-bottom:14px">
    <div class="card" style="border-left:3px solid var(--a2)"><p style="margin:0;font-size:13px;color:var(--soft)">Ask me anything about this lecture or AP Macro! I'll give you short, clear answers you can actually use. 🦉</p></div>
  </div>
  <div style="display:flex;gap:8px">
    <input id="chat-in" placeholder="Ask Axie a question..." onkeydown="if(event.key==='Enter')sendChat()" style="flex:1;padding:11px 14px;font-size:13px;border-radius:4px;border:1px solid var(--bdr2);background:var(--surf);color:var(--txt);outline:none"/>
    <button class="btn-accent" onclick="sendChat()" style="padding:11px 20px">Ask 🦉</button>
  </div>
  <div id="chat-busy" style="display:none;font-size:12px;color:var(--mut);font-style:italic;margin-top:8px">Axie is thinking...</div>`;
}

function formatChatReply(text){
  const lines=text.split('\n').filter(l=>l.trim());
  return lines.map(l=>{
    const isBullet=l.trim().startsWith('-')||l.trim().startsWith('•')||l.trim().startsWith('*');
    if(isBullet)return`<div style="display:flex;gap:8px;padding:4px 0"><span style="color:var(--accent);font-size:10px;padding-top:4px;flex-shrink:0">▸</span><span style="font-size:13px;color:var(--soft);line-height:1.6">${esc(l.replace(/^[-•*]\s*/,''))}</span></div>`;
    return`<p style="margin:0 0 6px;font-size:13px;color:var(--soft);line-height:1.6">${esc(l)}</p>`;
  }).join('');
}

async function sendChat(){
  const input=document.getElementById('chat-in');
  const msg=input?.value?.trim();if(!msg)return;input.value='';
  chatHistory.push({role:'user',content:msg});
  const msgs=document.getElementById('chat-msgs');
  msgs.innerHTML+=`<div style="display:flex;justify-content:flex-end"><div class="chat-bubble-user">${esc(msg)}</div></div>`;
  const busy=document.getElementById('chat-busy');if(busy)busy.style.display='block';
  try{
    const sys=`You are Axie, a friendly AP Macro tutor owl 🦉 helping a high school student. Answer in plain English using SHORT bullet points — max 4 bullets, each under 15 words. Start with the direct answer in one sentence. No jargon without a simple explanation. Be encouraging. Lecture: ${currentSession.summary}`;
    const reply=await callClaude(chatHistory,sys);
    chatHistory.push({role:'assistant',content:reply});
    msgs.innerHTML+=`<div style="display:flex;justify-content:flex-start"><div class="chat-bubble-ai"><span style="font-size:14px;margin-right:6px">🦉</span>${formatChatReply(reply)}</div></div>`;
    addXP(5,'Question asked!');
  }catch(e){msgs.innerHTML+=`<div style="color:var(--a4);font-size:12px">${esc(e.message)}</div>`;}
  if(busy)busy.style.display='none';
  msgs.scrollTop=msgs.scrollHeight;
}

// ── RESOURCES ──────────────────────────────────────────────────────────────
function renderResources(resources){
  return`<div class="mono-label" style="margin-bottom:14px">📚 Curated Resources</div>
  ${(resources||[]).map((r,i)=>`<div class="card" style="border-left:3px solid ${ac(i)};margin-bottom:12px">
    <a href="${esc(r.url)}" target="_blank" style="font-weight:600;font-size:15px;color:${ac(i)}">${esc(r.name)}</a>
    <p style="margin:6px 0 4px;font-size:13px;color:var(--soft);line-height:1.6">${esc(r.why)}</p>
    <p style="margin:0;font-size:11px;color:var(--mut);font-family:monospace">${esc(r.url)}</p>
  </div>`).join('')}`;
}

// ── TRANSCRIPT ─────────────────────────────────────────────────────────────
function showTranscript(){
  const s=currentSession;if(!s?.transcript)return;
  render(`
    <div class="tab-bar"><button class="tab active">📄 Transcript</button></div>
    <div class="content has-unit-nav">
      <button class="btn" onclick="showStudy()" style="font-size:11px;margin-bottom:16px">← Back to Session</button>
      <div style="font-family:monospace;font-size:16px;font-weight:800;letter-spacing:1px;color:var(--txt);margin-bottom:16px">${esc(s.title?.toUpperCase())}</div>
      <div style="background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:20px;font-size:13px;color:var(--soft);line-height:1.9;white-space:pre-wrap;font-family:monospace;max-height:70vh;overflow-y:auto">${esc(s.transcript)}</div>
    </div>
    ${unitNavBar(s.unit?.id)}`);
}

// ── UNIT NAV ───────────────────────────────────────────────────────────────
function jumpToUnit(id){
  const s=sessions.find(x=>x.unit?.id===id);
  if(s){openSession(sessions.indexOf(s));}else{showUnitOverview(id);}
}

// ── NOTION ─────────────────────────────────────────────────────────────────
function toggleNotion(){
  const p=document.getElementById('notion-panel');
  if(p)p.style.display=p.style.display==='none'?'block':'none';
}

function buildNotionText(s){
  const grade=s.instructorGrade;
  return['Please save this study session to Notion as a structured page.',
    `Title: ${s.title} — AP Macro [${s.date}]`,
    `Unit: Unit ${s.unit?.id} — ${s.unit?.label}`,
    `Summary: ${s.summary}`,
    grade?`Instructor Grade: ${grade.score}/100 — ${grade.rationale}`:'',
    '','KEY TAKEAWAYS:',...(s.studyGuide?.keyTakeaways||[]).map((t,i)=>`${i+1}. ${t}`),
    '','SECTIONS:',...(s.studyGuide?.sections||[]).flatMap(sec=>[`## ${sec.title}`,...(sec.cards||[]).map(c=>`- ${c.title}: ${c.bullets?.join('; ')||c.text||''}`),...(sec.formulas||[]).map(f=>`Formula: ${f.eq} — ${f.label||''}`)]),
    '','FORMULAS:',...(s.studyGuide?.formulas||[]).map(f=>`${f.eq} — ${f.label||''}`),
    '','FLASHCARDS:',...(s.flashcards||[]).map((f,i)=>`${i+1}. ${f.term}: ${f.definition}`),
    '','QUIZ:',...(s.quiz||[]).map((q,i)=>`${i+1}. ${q.question} [${q.answer}] ${q.explanation}`),
    '','RESOURCES:',...(s.resources||[]).map(r=>`- ${r.name}: ${r.url} — ${r.why}`),
  ].filter(Boolean).join('\n');
}

// ── INIT ────────────────────────────────────────────────────────────────────
updateHeroStats();
setInterval(updateHeroStats,60000);
setTimeout(()=>axieSpeak(),2000);
if(!API_KEY)showSetup();else{checkStreak();showHome();}
</script>
</body>
</html>
