<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spanish Flashcards Pro</title>

<style>
body {
  font-family: system-ui;
  background: #f8f4ef;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

.card {
  width:300px;
  height:200px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.5rem;
  margin:20px;
  background:white;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  cursor:pointer;
}

button {
  margin:6px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.correct { background:#2a9d8f; color:white; }
.wrong { background:#e63946; color:white; }
</style>
</head>

<body>

<h2>Spanish Flashcards (Madrigal Engine)</h2>

<div class="card" id="card">Loading...</div>

<div>
  <button onclick="App.flip()">Reveal</button>
  <button onclick="App.mark(true)" class="correct">Got it</button>
  <button onclick="App.mark(false)" class="wrong">Missed</button>
  <button onclick="App.speak()">🔊</button>
</div>

<script>
const App = (() => {

let state = {
  cards: [],
  current: null,
  revealed: false
};

/* ─────────────────────────────
   BASE VOCAB
──────────────────────────── */
const BASE = [
  { spanish:"el actor", english:"actor" },
  { spanish:"la acción", english:"action" },
  { spanish:"la actividad", english:"activity" },
  { spanish:"el doctor", english:"doctor" },
];

/* ─────────────────────────────
   RULE ENGINE (Madrigal)
──────────────────────────── */
const RULES = [
  {
    pattern: /tion$/,
    transform: w => w.replace("tion","ción"),
    tip: "tion → ción"
  },
  {
    pattern: /ty$/,
    transform: w => w.replace("ty","dad"),
    tip: "ty → dad"
  },
  {
    pattern: /ous$/,
    transform: w => w.replace("ous","oso"),
    tip: "ous → oso"
  }
];

const SEED_WORDS = [
  "action","activity","curiosity","famous","dangerous"
];

function generateCards() {
  return SEED_WORDS.map(w => {
    const rule = RULES.find(r => r.pattern.test(w));
    if (!rule) return null;

    return createCard({
      spanish: rule.transform(w),
      english: w,
      tip: rule.tip
    });
  }).filter(Boolean);
}

/* ─────────────────────────────
   CARD FACTORY
──────────────────────────── */
function createCard(data) {
  return {
    id: crypto.randomUUID(),
    spanish: data.spanish,
    english: data.english,
    tip: data.tip || "",
    attempts: 0,
    correct: 0,
    nextReview: Date.now()
  };
}

/* ─────────────────────────────
   INIT
──────────────────────────── */
function init() {
  const saved = localStorage.getItem("cards");

  if (saved) {
    state.cards = JSON.parse(saved);
  } else {
    state.cards = [
      ...BASE.map(createCard),
      ...generateCards()
    ];
  }

  next();
}

/* ─────────────────────────────
   NEXT CARD (priority)
──────────────────────────── */
function next() {
  const now = Date.now();

  const available = state.cards
    .filter(c => c.nextReview <= now)
    .sort((a,b)=>a.nextReview-b.nextReview);

  state.current = available[0] || state.cards[0];
  state.revealed = false;

  render();
}

/* ─────────────────────────────
   RENDER
──────────────────────────── */
function render() {
  const el = document.getElementById("card");

  if (!state.current) return;

  el.innerText = state.revealed
    ? state.current.english
    : state.current.spanish;
}

/* ─────────────────────────────
   FLIP
──────────────────────────── */
function flip() {
  state.revealed = !state.revealed;
  render();
}

/* ─────────────────────────────
   MARK + SPACED REP
──────────────────────────── */
function mark(correct) {
  const c = state.current;

  c.attempts++;

  if (correct) {
    c.correct++;

    const success = c.correct / c.attempts;

    let delay = 5000;

    if (success > 0.8) delay = 60000;
    if (success > 0.9) delay = 300000;

    c.nextReview = Date.now() + delay;
  } else {
    c.nextReview = Date.now() + 4000;
  }

  save();
  next();
}

/* ─────────────────────────────
   AUDIO
──────────────────────────── */
function speak() {
  const utter = new SpeechSynthesisUtterance(state.current.spanish);
  utter.lang = "es-ES";
  speechSynthesis.speak(utter);
}

/* ─────────────────────────────
   STORAGE
──────────────────────────── */
function save() {
  localStorage.setItem("cards", JSON.stringify(state.cards));
}

/* ───────────────────────────── */
return {
  init,
  flip,
  mark,
  speak
};

})();

/* START */
App.init();
</script>

</body>
</html>
