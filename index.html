<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX — Your AP Exam Edge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1c1710;--surf:#221e14;--card:#2a2318;--card2:#322b1e;
  --bdr:#3d3428;--bdr2:#4a3f30;
  --txt:#f0e8d8;--mut:#6b5e48;--soft:#9a8a72;--mid:#c8b898;
  --accent:#f0c040;
  --c1:#f0c040;--c2:#4fc3f7;--c3:#c084fc;--c4:#34d399;--c5:#fb7185;--c6:#f59e0b;--c7:#ff8c42;
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer}
a{color:inherit;text-decoration:none}
::selection{background:rgba(232,160,32,.2);color:var(--txt)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

.hero{position:relative;padding:2rem 1.5rem 1.75rem;overflow:hidden;border-bottom:1px solid var(--bdr)}
.hero::before{content:'';position:absolute;top:-80px;left:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(232,160,32,.07) 0%,transparent 65%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-60px;right:-60px;width:400px;height:400px;background:radial-gradient(circle,rgba(79,195,247,.04) 0%,transparent 65%);pointer-events:none}
.hero-inner{max-width:860px;margin:0 auto;position:relative;z-index:1}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-family:monospace;letter-spacing:3px;text-transform:uppercase;color:var(--accent);background:rgba(232,160,32,.09);border:1px solid rgba(232,160,32,.28);border-radius:2px;padding:4px 10px;margin-bottom:14px}
.hero-title{font-family:monospace;font-size:clamp(38px,8vw,62px);font-weight:900;letter-spacing:-1px;line-height:.95;color:var(--txt);margin-bottom:10px}
.hero-title .a{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--soft);line-height:1.65;max-width:420px}

.axie{flex-shrink:0;cursor:pointer;position:relative;user-select:none}
.axie svg{transition:transform .35s cubic-bezier(.34,1.56,.64,1);display:block}
.axie:hover svg{transform:rotate(-8deg) scale(1.08) translateY(-3px)}
.axie:active svg{transform:scale(.95)}
.axie-msg{position:absolute;right:90px;top:-4px;background:var(--card2);border:1px solid var(--bdr2);border-radius:10px 10px 0 10px;padding:9px 13px;font-size:12px;color:var(--mid);line-height:1.5;max-width:200px;opacity:0;transform:scale(.85) translateY(4px);transition:all .22s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.axie-msg.on{opacity:1;transform:scale(1) translateY(0)}
.axie-msg::after{content:'';position:absolute;right:-7px;top:10px;border:4px solid transparent;border-left-color:var(--bdr2)}

.stats{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.035);border:1px solid var(--bdr);border-radius:20px;padding:5px 11px;font-size:12px;color:var(--soft)}
.stat b{color:var(--txt);font-weight:600}

.cd{background:linear-gradient(135deg,rgba(240,192,64,.07),rgba(240,192,64,.03));border:1px solid rgba(240,192,64,.18);border-radius:8px;padding:14px 18px;margin-top:14px;display:flex;align-items:center;flex-wrap:wrap;min-height:0}
.cd:empty{display:none}
.cd-block{display:flex;flex-direction:column;align-items:center;padding:0 16px}
.cd-num{font-family:monospace;font-size:30px;font-weight:900;line-height:1;color:var(--accent)}
.cd-lbl{font-size:9px;font-family:monospace;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-top:2px}
.cd-div{width:1px;height:32px;background:var(--bdr2)}
.cd-info{flex:1;min-width:160px;padding-left:18px;font-size:13px;color:var(--soft);line-height:1.55}

.xp-wrap{margin-top:12px}
.xp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-family:monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--mut)}
.xp-top span{color:var(--accent)}
.xp-track{height:5px;background:var(--bdr);border-radius:3px;overflow:hidden}
.xp-fill{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.34,1.56,.64,1)}

#app{max-width:860px;margin:0 auto}
.page{padding:1.25rem 1rem 5rem}

.tabbar{display:flex;border-bottom:1px solid var(--bdr);overflow-x:auto;background:var(--surf);position:sticky;top:0;z-index:40;scrollbar-width:none}
.tabbar::-webkit-scrollbar{display:none}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:12px 14px;font-size:10px;font-family:monospace;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);white-space:nowrap;transition:color .15s;flex-shrink:0}
.tab.on{border-bottom-color:var(--accent);color:var(--accent);font-weight:700}
.tab:hover:not(.on){color:var(--soft)}

.btn{background:transparent;border:1px solid var(--bdr2);border-radius:4px;padding:8px 16px;font-size:13px;color:var(--mid);transition:all .15s}
.btn:hover{border-color:var(--soft);color:var(--txt);background:rgba(255,255,255,.03)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.btn-hi{background:rgba(232,160,32,.10);border:1px solid rgba(232,160,32,.38);border-radius:6px;padding:11px 22px;font-size:14px;font-weight:600;color:var(--accent);transition:all .2s}
.btn-hi:hover{background:rgba(232,160,32,.18);border-color:rgba(232,160,32,.6);transform:translateY(-1px);box-shadow:0 4px 16px rgba(240,192,64,.15)}
.btn-hi:active{transform:scale(.98) translateY(0)}
.btn-hi:disabled{opacity:.35;cursor:not-allowed;pointer-events:none;transform:none}
.btn-full{display:block;width:100%;text-align:center}
.btn-del{color:var(--c5);border-color:rgba(251,113,133,.2);font-size:11px;padding:4px 10px}
.btn-del:hover{background:rgba(251,113,133,.08);border-color:rgba(251,113,133,.4)}
.btn-notion{color:var(--c3);border-color:rgba(167,139,250,.3);font-size:12px;padding:7px 13px;display:flex;align-items:center;gap:5px}

.card{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:16px 18px}
.card-hi{border-top:2px solid}
.scard{border-left:3px solid;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;padding:13px 16px;cursor:pointer;border-radius:6px;transition:background .15s,transform .15s}
.scard:hover{background:var(--card2);transform:translateX(2px)}

.ugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-top:8px}
.utile{border:1px solid var(--bdr);border-radius:8px;padding:18px 16px;cursor:pointer;position:relative;overflow:hidden;transition:all .2s;background:var(--card)}
.utile:hover{border-color:var(--bdr2);background:var(--card2);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.utile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.utile-ghost{font-family:monospace;font-size:44px;font-weight:900;line-height:1;opacity:.07;position:absolute;top:6px;right:10px;letter-spacing:-2px;user-select:none}

.ring{position:relative;flex-shrink:0}
.ring svg{transform:rotate(-90deg);display:block}
.ring-n{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:monospace;font-size:9px;font-weight:700;line-height:1;text-align:center}

.sh{display:flex;align-items:baseline;gap:12px;padding-bottom:9px;border-bottom:1px solid var(--bdr);margin:26px 0 12px}
.sh-n{font-family:monospace;font-size:34px;font-weight:900;opacity:.08;line-height:1;flex-shrink:0}
.sh-t{font-family:monospace;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}

.formula{background:rgba(0,0,0,.3);border:1px solid var(--bdr);border-radius:3px;padding:9px 15px;font-family:monospace;font-size:13px;letter-spacing:.5px;margin:5px 0;border-left:3px solid}
.formula .fl{font-size:10px;color:var(--mut)}

.lbl{font-family:monospace;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mut)}

.g2{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:11px}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:9px}

.fc-scene{perspective:900px;cursor:pointer;margin-bottom:16px}
.fc-inner{position:relative;min-height:220px;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1px solid var(--bdr);border-radius:8px;padding:32px 24px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:var(--card)}
.fc-face:hover{border-color:var(--bdr2)}
.fc-back{transform:rotateY(180deg);background:var(--card2)}

.qopt{padding:10px 14px;border-radius:4px;border:1px solid var(--bdr);cursor:pointer;font-size:13px;color:var(--soft);transition:all .15s;margin-bottom:7px;line-height:1.5}
.qopt:hover:not(.locked){background:rgba(255,255,255,.03);border-color:var(--bdr2);color:var(--mid)}
.qopt.locked{cursor:default}

.bubble-u{background:rgba(79,195,247,.09);border:1px solid rgba(79,195,247,.22);color:#6ed4f8;padding:10px 15px;border-radius:10px 10px 2px 10px;font-size:13px;line-height:1.65;max-width:78%}
.bubble-a{background:var(--card);border:1px solid var(--bdr);color:var(--mid);padding:12px 15px;border-radius:10px 10px 10px 2px;font-size:13px;line-height:1.75;max-width:82%}
.cbline{display:flex;gap:7px;padding:3px 0;align-items:flex-start}
.cbline .arr{color:var(--accent);font-size:10px;padding-top:4px;flex-shrink:0}

.setup{max-width:440px;margin:3rem auto;padding:0 1rem}
.setup-steps{background:rgba(79,195,247,.05);border:1px solid rgba(79,195,247,.18);border-radius:6px;padding:14px 18px;font-size:12px;color:var(--soft);line-height:1.95;margin-bottom:18px}

.grade-badge{background:var(--card);border-radius:8px;padding:12px 16px;min-width:148px}
.grade-n{font-family:monospace;font-size:30px;font-weight:900;line-height:1}
.grade-bar{height:3px;border-radius:2px;background:var(--bdr);margin-top:8px;overflow:hidden}
.grade-fill{height:100%;border-radius:2px;transition:width .9s cubic-bezier(.34,1.56,.64,1)}
.tip-box{background:rgba(240,192,64,.05);border:1px solid rgba(240,192,64,.18);border-left:3px solid var(--accent);border-radius:4px;padding:13px 17px}

ul.blist{padding:0;list-style:none;margin:0}
ul.blist li{padding:4px 0 4px 16px;position:relative;color:var(--soft);font-size:12px;line-height:1.65;border-bottom:1px solid rgba(255,255,255,.025)}
ul.blist li::before{content:'›';position:absolute;left:0;color:var(--mut)}

.notion-ta{background:#060610;border:1px solid rgba(167,139,250,.22);border-radius:4px;padding:10px;font-family:monospace;font-size:11px;color:var(--soft);width:100%;height:130px;resize:none;outline:none;margin-top:8px;line-height:1.6}

.unav{position:fixed;bottom:0;left:0;right:0;background:rgba(26,23,16,.97);border-top:1px solid var(--bdr);display:flex;justify-content:center;z-index:100;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.unav-btn{background:none;border:none;border-top:2px solid transparent;padding:7px 0;flex:1;max-width:100px;font-family:monospace;font-size:8px;letter-spacing:.5px;text-transform:uppercase;color:var(--mut);transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.unav-btn:hover{color:var(--soft)}
.unav-btn.on{border-top-color:var(--accent);color:var(--accent)}
.unav-n{font-size:17px;font-weight:900;font-family:monospace;line-height:1}
.has-unav{padding-bottom:58px}

.cf{position:fixed;width:7px;height:7px;border-radius:2px;pointer-events:none;z-index:9999;animation:cffall linear forwards}
@keyframes cffall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(760deg);opacity:0}}

.toast{position:fixed;top:18px;right:18px;background:rgba(232,160,32,.13);border:1px solid rgba(232,160,32,.4);border-radius:6px;padding:9px 15px;font-family:monospace;font-size:12px;color:var(--accent);z-index:9998;animation:tin .25s ease,tout .25s ease 1.75s forwards;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.4)}
@keyframes tin{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes tout{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(16px)}}

.qfoot{border-top:1px solid var(--bdr);padding:22px 24px;background:linear-gradient(180deg,transparent,rgba(240,192,64,.025));max-width:860px;margin:0 auto}
.qfoot-q{font-size:13px;color:var(--soft);line-height:1.8;font-style:italic;margin-bottom:8px}
.qfoot-a{font-family:monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mut)}
.qfoot-a span{color:var(--accent)}
.qfoot-btn{background:none;border:none;font-family:monospace;font-size:9px;letter-spacing:1px;color:var(--mut);cursor:pointer;padding:0;margin-top:5px;text-transform:uppercase;transition:color .15s;display:block}
.qfoot-btn:hover{color:var(--soft)}

.err{color:var(--c5);font-size:12px;padding:6px 0;font-family:monospace}
.spin{width:15px;height:15px;border:2px solid var(--bdr2);border-top-color:var(--c2);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.fadein{animation:fadein .3s ease both}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.scalein{animation:scalein .25s cubic-bezier(.34,1.56,.64,1) both}
@keyframes scalein{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}

@media(max-width:540px){
  .hero{padding:1.5rem 1rem 1.25rem}
  .hero-title{font-size:clamp(32px,9vw,48px)}
  .ugrid,.g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr}
  .grade-badge{min-width:120px}
}

/* ═══════════════════════════════════════════════════
   TRAIL — Warm dark · Gentle snake · v4
   Premium notebook aesthetic: espresso + amber gold
   ═══════════════════════════════════════════════════ */

/* ── Outer container ── */
.trail-outer{
  max-width:480px;
  margin:0 auto;
  padding:0 1rem 7rem;
  position:relative;
  /* overflow:visible so labels can extend into padding zone */
  overflow:visible;
}


/* Node label — positioned OUTSIDE the circle, away from path */
.trail-node-label-ext{
  line-height:1.35;
}

/* ── SVG snake path (absolute, behind everything) ── */
.trail-svg{
  position:absolute;
  top:0; left:0; right:0;
  width:100%;
  pointer-events:none;
  z-index:0;
  overflow:visible;
}

/* ── Node layer (absolutely positioned HTML on top of SVG) ── */
.trail-nodes-layer{
  position:relative;
  width:100%;
}

/* ════════════════════════════════
   UNIT NODE BUBBLE
   ════════════════════════════════ */
.trail-node-bubble{
  position:absolute;
  display:flex;
  flex-direction:column;
  align-items:center;
  transform:translateX(-50%);
  z-index:10;
}

.trail-node-circle{
  width:86px; height:86px;
  border-radius:50%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  position:relative;
  cursor:pointer;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),
             box-shadow .22s ease;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.trail-node-circle:active{ transform:scale(.91)!important }

/* DONE — solid fill, warm gold inner glow */
.trail-node-circle.done{
  box-shadow:
    0 0 0 5px var(--uc,#e8a020)28,
    0 0 0 11px var(--uc,#e8a020)10,
    0 6px 26px var(--uc,#e8a020)50,
    inset 0 2px 5px rgba(255,255,255,.22),
    inset 0 -2px 5px rgba(0,0,0,.18);
}
.trail-node-circle.done:hover{ transform:scale(1.06) translateY(-3px) }

/* ACTIVE — warm card bg, amber border, soft pulse */
.trail-node-circle.active{
  background:var(--card);
  border:3px solid var(--uc,#e8a020);
  box-shadow:
    0 0 0 7px var(--uc,#e8a020)20,
    0 6px 22px var(--uc,#e8a020)35;
  animation:node-breathe 2.2s ease-in-out infinite;
}
.trail-node-circle.active:hover{ transform:scale(1.05) translateY(-2px) }
@keyframes node-breathe{
  0%,100%{ box-shadow:0 0 0 7px var(--uc,#e8a020)20, 0 6px 22px var(--uc,#e8a020)35 }
  50%{     box-shadow:0 0 0 13px var(--uc,#e8a020)10, 0 6px 32px var(--uc,#e8a020)55 }
}

/* LOCKED — muted, grey-brown */
.trail-node-circle.locked{
  background:var(--surf);
  border:3px solid var(--bdr);
  box-shadow:inset 0 2px 4px rgba(0,0,0,.25);
  cursor:pointer;
  opacity:.55;
}

/* Emoji + unit label inside node */
.trail-node-em{
  font-size:30px; line-height:1;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,.4));
}
.trail-node-unit{
  font-family:monospace; font-size:9px; font-weight:800;
  letter-spacing:1.5px; text-transform:uppercase; margin-top:1px;
}
.trail-node-circle.done   .trail-node-unit{ color:rgba(0,0,0,.55) }
.trail-node-circle.active .trail-node-unit{ color:var(--uc,#e8a020) }
.trail-node-circle.locked .trail-node-unit{ color:var(--mut) }
.trail-node-circle.locked:hover{ transform:scale(1.04) translateY(-2px) }

/* Check badge */
.trail-badge{
  position:absolute; top:-3px; right:-3px;
  width:23px; height:23px; border-radius:50%;
  border:3px solid var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:900; color:#fff;
}
.trail-badge.check{ background:#34d399; box-shadow:0 2px 8px rgba(52,211,153,.45) }
.trail-badge.lock { background:var(--bdr2); font-size:9px }

/* ════════════════════════════════
   UNIT LABEL (below bubble)
   ════════════════════════════════ */
.trail-node-label{
  /* replaced by .trail-node-label-ext — this rule kept for safety */
  display:none;
}
.trail-node-name{
  font-family:monospace; font-size:13px; font-weight:800;
  letter-spacing:.3px; text-transform:uppercase; line-height:1.35;
}
.trail-node-weight{
  font-size:11px; color:var(--mut); margin-top:3px; font-family:monospace;
}

/* You-are-here badge */
.trail-yah{
  display:inline-flex; align-items:center; gap:5px;
  margin-top:8px;
  background:var(--uc,#e8a020);
  border-radius:20px;
  padding:5px 13px 5px 9px;
  font-family:monospace; font-size:12px; font-weight:800;
  letter-spacing:.3px; color:#fff;
  box-shadow:0 4px 14px var(--uc,#e8a020)45;
  animation:yah-bounce .75s ease-in-out infinite alternate;
}
@keyframes yah-bounce{
  from{ transform:translateY(0) }
  to  { transform:translateY(-5px) }
}

/* Session dots */
.trail-dots{
  display:flex; gap:5px; justify-content:center;
  margin-top:7px; flex-wrap:wrap;
}
.trail-dot{
  width:9px; height:9px; border-radius:50%;
  cursor:pointer;
  transition:transform .15s, box-shadow .15s;
}
.trail-dot:hover{
  transform:scale(1.6);
  box-shadow:0 0 8px var(--uc,#e8a020);
}

/* ════════════════════════════════
   TOPIC WAYPOINT DOTS (on curve)
   ════════════════════════════════ */
.trail-wp-dot{
  position:absolute;
  transform:translate(-50%,-50%);
  z-index:8;
  display:flex; flex-direction:column; align-items:center;
  pointer-events:none;
  overflow:visible;  /* allow label to extend outside dot bounds */
}
.trail-wp-circle{
  width:24px; height:24px; border-radius:50%;
  border:3px solid transparent;
  display:flex; align-items:center; justify-content:center;
  font-size:10px;
  box-shadow:0 2px 6px rgba(0,0,0,.25);
}
.trail-wp-circle.done{
  box-shadow:0 0 10px var(--uc,#e8a020)70, 0 2px 6px rgba(0,0,0,.2);
}
.trail-wp-circle.active{
  background:var(--card);
  border-color:var(--uc,#e8a020);
  animation:wp-pulse 1.6s ease infinite;
}
@keyframes wp-pulse{
  0%,100%{ box-shadow:0 0 0 0 var(--uc,#e8a020)50, 0 2px 6px rgba(0,0,0,.25) }

}
.trail-wp-circle.locked{
  background:var(--surf); border-color:var(--bdr); opacity:.4;
}
.trail-wp-lbl{
  font-size:12px; font-family:monospace; font-weight:600;
  line-height:1.2; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;
  max-width:140px; position:absolute;
  top:50%; transform:translateY(-50%);
  pointer-events:none;
  letter-spacing:.2px;
}

/* ════════════════════════════════
   SESSION PANEL popup
   ════════════════════════════════ */
.trail-panel{
  position:absolute;
  z-index:30;
  width:264px;
  background:var(--card);
  border-radius:12px;
  border:1px solid var(--bdr2);
  box-shadow:
    0 12px 48px rgba(0,0,0,.55),
    0 4px 16px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,255,255,.06);
  padding:14px;
  animation:panel-pop .2s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes panel-pop{
  from{ opacity:0; transform:scale(.9) translateY(10px) }
  to  { opacity:1; transform:scale(1) translateY(0) }
}
/* Pointer arrow — warm card color */
.trail-panel::before{
  content:'';
  position:absolute; bottom:100%; left:50%;
  transform:translateX(-50%);
  border:9px solid transparent;
  border-bottom-color:var(--bdr2);
}
.trail-panel::after{
  content:'';
  position:absolute; bottom:calc(100% - 1px); left:50%;
  transform:translateX(-50%);
  border:9px solid transparent;
  border-bottom-color:var(--card);
}
.trail-panel-title{
  font-family:monospace; font-size:10px; font-weight:800;
  letter-spacing:1px; text-transform:uppercase;
  margin-bottom:9px; padding-bottom:7px;
  border-bottom:1px solid var(--bdr);
}
.trail-panel-card{
  display:flex; align-items:center; gap:8px;
  padding:8px 10px; border-radius:7px;
  cursor:pointer; margin-bottom:5px;
  background:var(--card2);
  border:1px solid var(--bdr);
  transition:background .12s, transform .12s, border-color .12s;
}
.trail-panel-card:hover{
  background:var(--bdr); border-color:var(--bdr2);
  transform:translateX(2px);
}
.trail-panel-add{
  width:100%; margin-top:7px; padding:9px;
  border-radius:8px;
  background:var(--uc,#e8a020)14;
  border:1.5px dashed var(--uc,#e8a020)70;
  font-family:monospace; font-size:10px; font-weight:800;
  letter-spacing:1px; text-transform:uppercase;
  color:var(--uc,#e8a020); cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:background .12s, border-color .12s;
}
.trail-panel-add:hover{
  background:var(--uc,#e8a020)22;
  border-color:var(--uc,#e8a020);
}
.trail-panel-close{
  position:absolute; top:10px; right:10px;
  background:var(--bdr); border:none;
  border-radius:50%; width:20px; height:20px;
  font-size:11px; color:var(--soft); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .12s;
}
.trail-panel-close:hover{ background:var(--bdr2); color:var(--txt) }

/* ════════════════════════════════
   PROGRESS BAR
   ════════════════════════════════ */
.trail-progress-bar{
  background:var(--card);
  border:1px solid var(--bdr);
  border-radius:10px;
  padding:14px 18px;
  margin-bottom:28px;
  display:flex; gap:14px; align-items:center; flex-wrap:wrap;
  box-shadow:0 4px 18px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.04);
}
.trail-progress-stat{
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.trail-progress-stat-n{
  font-family:monospace; font-size:24px; font-weight:900; line-height:1;
}
.trail-progress-stat-l{
  font-family:monospace; font-size:8px; letter-spacing:2px;
  text-transform:uppercase; color:var(--mut);
}
.trail-progress-divider{ width:1px; height:32px; background:var(--bdr2) }
.trail-progress-pct{ flex:1; min-width:100px }
.trail-progress-pct-label{
  font-size:10px; color:var(--soft); margin-bottom:6px;
}
.trail-progress-pct-track{
  height:9px; background:var(--surf); border-radius:5px; overflow:hidden;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.35);
}
.trail-progress-pct-fill{
  height:100%; border-radius:5px;
  background:linear-gradient(90deg, #c27a10, var(--accent), #f0c040);
  transition:width 1.1s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 0 8px rgba(232,160,32,.4);
}

/* ════════════════════════════════
   FINISH NODE
   ════════════════════════════════ */
.trail-finish-node{
  position:absolute;
  transform:translateX(-50%);
  z-index:10;
  display:flex; flex-direction:column; align-items:center;
}
.trail-finish-circle{
  width:68px; height:68px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:28px;
  background:var(--surf); border:3px solid var(--bdr);
  box-shadow:inset 0 2px 6px rgba(0,0,0,.3);
  transition:all .5s;
}
.trail-finish-circle.done{
  background:var(--accent); border-color:var(--accent);
  box-shadow:0 0 40px rgba(232,160,32,.5), inset 0 2px 4px rgba(255,255,255,.2);
  animation:node-breathe 2.4s ease infinite;
  --uc:#e8a020;
}
.trail-finish-lbl{
  font-family:monospace; font-size:9px; letter-spacing:2px;
  text-transform:uppercase; margin-top:8px; text-align:center;
}

const axieQ = { msgs: [], busy: false, _at: null };

function axieEnqueue(msg) {
  axieQ.msgs.push(msg);
  axieFlush();
}

function axieFlush() {
  if (axieQ.busy || !axieQ.msgs.length) return;
  axieQ.busy = true;
  axieSay(axieQ.msgs.shift());
  setTimeout(() => { axieQ.busy = false; axieFlush(); }, AXIE_DURATION); // same duration, no drift
}

function axieAfterQueue(cb) {
  const check = () => {
    if (!axieQ.busy && axieQ.msgs.length === 0) cb();
    else setTimeout(check, 100);
  };
  setTimeout(check, 100);
}

// ─────────────────────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────────────────────

// These are always available; CoCo's pasted sessions are added on top.
// ─────────────────────────────────────────────────────────────────────────────
const DEFAULT_CURRICULUM = [{"id":2001,"isDefault":true,"date":"2024-01-01T08:00:00.000Z","title":"1.1 \u2014 Scarcity, Trade-offs & Opportunity Cost","summary":"Every economic decision has a cost \u2014 the thing you gave up. This session builds the foundation: why scarcity exists, what opportunity cost really means, and why there is no such thing as a free lunch.","studyGuide":{"keyTakeaways":["Scarcity is the core economic problem: unlimited wants vs. limited resources.","Every choice involves an opportunity cost \u2014 the highest-valued alternative you gave up.","Rational decision-making compares marginal benefits to marginal costs.","Trade-offs are unavoidable \u2014 producing more of X always means less of something else."],"sections":[{"title":"Scarcity & the Economic Problem","cards":[{"label":"Definition","title":"Why Scarcity Exists","bullets":["**Scarcity**: unlimited human wants exceed finite resources \u2014 always, everywhere.","Resources (factors of production): **Land**, **Labor**, **Capital**, **Entrepreneurship**.","Scarcity forces **choice** \u2014 every society must answer: WHAT to produce, HOW, and FOR WHOM."]},{"label":"The Real Cost","title":"Opportunity Cost","bullets":["**Opportunity cost**: the value of the next-best alternative foregone.","It's NOT the money price \u2014 it's what you actually give up.","Example: attending college costs tuition PLUS the salary you didn't earn.","**Sunk costs** are irrelevant to future decisions \u2014 only future costs/benefits matter."]}],"formulas":[{"eq":"OC of choice A = value of best alternative B given up","label":"Opportunity cost"}]},{"title":"Trade-offs & Marginal Analysis","cards":[{"label":"Key Principle","title":"Thinking at the Margin","bullets":["Rational agents compare **marginal benefit** (MB) vs. **marginal cost** (MC) of one more unit.","Act when MB \u2265 MC; stop when MB < MC.","All trade-offs exist at the margin \u2014 the last unit is what determines behavior."]},{"label":"AP Exam Tip","title":"Recognizing Opportunity Cost Questions","text":"AP FRQs often require you to compute opportunity costs from a table. Key: always express OC in terms of the **other good**. If you give up 4 units of Y to get 2 units of X, OC of 1X = 2Y. Work through the ratio, not the absolute numbers."}],"formulas":[{"eq":"Act if MB \u2265 MC; stop if MB < MC","label":"Marginal decision rule"}]}],"formulas":[{"eq":"OC of X = Units of Y given up \u00f7 Units of X gained","label":"Opportunity cost formula"},{"eq":"MB \u2265 MC \u2192 rational to proceed","label":"Marginal rule"}]},"quiz":[{"question":"A student can spend her evening studying economics or working a 4-hour shift at $15/hour. She chooses to study. What is the opportunity cost of studying?","options":["A) $0 \u2014 studying is free","B) $60 in forgone wages","C) The cost of her textbooks","D) The marginal cost of tuition"],"answer":"B","explanation":"Opportunity cost = the value of the best alternative forgone. She gives up $60 in wages (4 hours \u00d7 $15). Sunk costs like textbooks are irrelevant to this decision.","topic":"scarcity_opportunity"},{"question":"Which of the following best illustrates the concept of scarcity?","options":["A) A government raises taxes","B) A firm reduces prices to increase sales","C) A hospital must decide how to allocate limited surgical suites","D) A consumer buys a product on sale"],"answer":"C","explanation":"Scarcity arises when wants exceed available resources. The hospital has limited surgical suites (resource) and unlimited potential need (want) \u2014 it must make a choice.","topic":"scarcity_opportunity"},{"question":"Marginal analysis suggests a student should study one more hour if:","options":["A) Total benefit from studying exceeds total cost","B) The marginal benefit of that hour exceeds its marginal cost","C) They have already studied for at least two hours","D) The average benefit of studying is maximized"],"answer":"B","explanation":"Marginal analysis compares the benefit of ONE MORE unit to its cost. Rational choice requires MB \u2265 MC at the margin \u2014 not comparisons of totals or averages.","topic":"scarcity_opportunity"},{"question":"A sunk cost is best defined as:","options":["A) A cost that increases with output","B) A cost that has already been incurred and cannot be recovered","C) The opportunity cost of a future decision","D) A variable cost that changes with production level"],"answer":"B","explanation":"Sunk costs are irrelevant to rational decision-making because they cannot be recovered regardless of future choices. Only future costs and benefits should influence decisions.","topic":"scarcity_opportunity"},{"question":"Country A can produce 10 bicycles or 50 loaves of bread per day. Country B can produce 4 bicycles or 40 loaves of bread per day. What is Country B's opportunity cost of producing one bicycle?","options":["A) 4 loaves of bread","B) 8 loaves of bread","C) 10 loaves of bread","D) 40 loaves of bread"],"answer":"C","explanation":"OC for Country B of 1 bicycle = 40 loaves \u00f7 4 bicycles = 10 loaves of bread. Compare to Country A: 50\u00f710 = 5 loaves. Country A has lower OC \u2192 comparative advantage in bicycles.","topic":"opportunity_cost"}],"unit":{"id":1,"lbl":"Basic Concepts","col":"#f0c040","ex":"5\u201310%","em":"\ud83e\udde9"}},{"id":2002,"isDefault":true,"date":"2024-01-01T09:00:00.000Z","title":"1.2 \u2014 Production Possibilities & Economic Growth","summary":"The PPC is economics in one picture. It shows trade-offs, efficiency, and what growth actually means \u2014 and the AP exam uses it constantly in both MCQs and FRQs.","studyGuide":{"keyTakeaways":["Points on the PPC = productively efficient; inside = inefficient; outside = unattainable now.","The concave shape reflects increasing opportunity costs as resources are reallocated.","Economic growth shifts the PPC outward \u2014 driven by more resources or better technology.","A straight-line PPC means constant opportunity costs (perfect resource substitutability)."],"sections":[{"title":"Reading the PPC","cards":[{"label":"The Graph","title":"Three Zones of the PPC","bullets":["**On the curve**: all resources fully and efficiently employed \u2014 productive efficiency.","**Inside the curve**: unemployment or inefficient resource use (e.g., during a recession).","**Outside the curve**: currently impossible \u2014 requires economic growth to reach.","Movement **along** the curve = trade-off (more of one good means less of another)."]},{"label":"Shape","title":"Why the PPC Curves Outward","bullets":["**Concave (bowed-out)**: increasing opportunity costs \u2014 resources not equally suited to all uses.","As you transfer workers from bread to guns, you first transfer the worst gun-makers (small OC increase), then the better ones (larger OC increase).","**Straight-line PPC**: constant opportunity costs \u2014 resources are perfectly interchangeable (rare in practice)."]}],"formulas":[]},{"title":"Economic Growth & PPC Shifts","cards":[{"label":"Outward Shift","title":"What Causes Growth","bullets":["\u2191 **Technology**: same resources \u2192 more output.","\u2191 **Physical capital**: more machinery and factories.","\u2191 **Human capital**: education, training, better-skilled workforce.","\u2191 **Natural resources**: discovery of new oil fields, fertile land.","\u2191 **Labor force**: population growth or more workers entering the market."]},{"label":"Watch Out","title":"One-Good vs. Both-Good Shifts","text":"If technology improves for **one good only**, the PPC rotates outward from the intercept of the other good \u2014 not a parallel shift. If both goods benefit equally, the whole curve shifts outward. AP FRQs love testing whether you can draw the correct rotation vs. shift."}],"formulas":[{"eq":"Outward shift = economic growth (\u2191 resources or \u2191 technology)","label":""},{"eq":"Inward shift = economic decline (war, natural disaster, resource depletion)","label":""}]}],"formulas":[{"eq":"Points inside PPC \u2192 unemployment or inefficiency","label":""},{"eq":"Points outside PPC \u2192 unattainable (goal of growth)","label":""},{"eq":"Outward PPC shift = economic growth","label":""}]},"quiz":[{"question":"An economy is operating at a point inside its PPC. This most likely indicates:","options":["A) The economy is producing at maximum efficiency","B) The economy has experienced economic growth","C) Resources are unemployed or misallocated","D) The economy is operating outside its potential"],"answer":"C","explanation":"A point inside the PPC means the economy is NOT using all its resources efficiently \u2014 there is unemployment or misallocation. The PPC represents the maximum possible output.","topic":"ppc"},{"question":"Which of the following would cause the PPC to shift OUTWARD for all goods?","options":["A) An increase in the unemployment rate","B) A technological improvement that benefits all industries equally","C) A shift in consumer preferences toward one good","D) An increase in government spending on one sector"],"answer":"B","explanation":"An equal improvement in technology across all industries increases productive capacity for all goods, shifting the entire PPC outward. Demand-side changes don't shift the PPC.","topic":"ppc_growth"},{"question":"A concave (bowed-out) PPC reflects:","options":["A) Constant opportunity costs as production changes","B) Decreasing opportunity costs as more of a good is produced","C) Increasing opportunity costs as resources are reallocated","D) Perfectly substitutable resources between industries"],"answer":"C","explanation":"The concave shape shows that as you produce more of Good X, each additional unit requires giving up increasing amounts of Good Y \u2014 because resources aren't equally productive in all uses.","topic":"ppc"},{"question":"If a country increases investment in capital goods (like machinery) at the expense of consumer goods, what happens in the long run?","options":["A) The PPC shifts inward as consumer welfare falls","B) The PPC shifts outward as productive capacity grows","C) The PPC becomes flatter, showing constant trade-offs","D) No change \u2014 the PPC only reflects current resource use"],"answer":"B","explanation":"Investing in capital goods builds productive capacity. Though consumer goods fall today, future output potential rises \u2014 shifting the PPC outward. This is the investment-growth trade-off.","topic":"ppc_growth"},{"question":"New agricultural technology dramatically increases crop yields but has no effect on manufacturing. On a PPC diagram (food vs. manufactured goods), this is shown as:","options":["A) A parallel outward shift of the entire PPC","B) An inward rotation toward the manufactured goods axis","C) An outward rotation from the manufactured goods axis intercept","D) A movement along the existing PPC toward more food"],"answer":"C","explanation":"If only food production improves, the food intercept moves outward while the manufactured goods intercept stays fixed \u2014 creating an outward rotation from the manufactured goods axis. The PPC is no longer parallel to the original.","topic":"ppc_growth"}],"unit":{"id":1,"lbl":"Basic Concepts","col":"#f0c040","ex":"5\u201310%","em":"\ud83e\udde9"}},{"id":2003,"isDefault":true,"date":"2024-01-01T10:00:00.000Z","title":"1.3 \u2014 Comparative Advantage & Markets","summary":"Comparative advantage explains why trade benefits everyone \u2014 even countries that are better at everything. Supply and demand then explains how markets actually set prices and allocate goods.","studyGuide":{"keyTakeaways":["Comparative advantage (lower OC) \u2014 not absolute advantage \u2014 determines specialization and trade.","Both parties benefit from trade when they specialize in their comparative advantage.","Supply and demand interact to find equilibrium \u2014 the price that clears the market.","Shifters (not price changes) move the curves: TRIBE for demand, SPENT for supply."],"sections":[{"title":"Comparative Advantage & Trade","cards":[{"label":"The Core Insight","title":"Absolute vs. Comparative Advantage","bullets":["**Absolute advantage**: produce more output with same inputs \u2014 NOT what drives trade.","**Comparative advantage**: lower opportunity cost \u2014 THIS determines who produces what.","Even if Country A is better at everything, both gain by specializing in their comparative advantage.","**Terms of trade** must fall between both countries' opportunity costs to benefit both."]},{"label":"Finding CA","title":"Step-by-Step Method","text":"Step 1: Build the OC table \u2014 for each country, OC of X = units of Y given up per unit of X. Step 2: Compare: whoever has the **lower OC for X** has comparative advantage in X (and the other has CA in Y). Step 3: Identify terms of trade that benefit both. Remember: you can't have CA in both goods."}],"formulas":[{"eq":"OC of X (Country A) = Y given up \u00f7 X gained","label":""},{"eq":"CA in X \u2192 lower OC than other country","label":""}]},{"title":"Supply, Demand & Equilibrium","cards":[{"label":"The Laws","title":"Demand & Supply Curves","bullets":["**Law of demand**: price \u2191 \u2192 Qd \u2193 (inverse) \u2014 movement ALONG the curve.","**Law of supply**: price \u2191 \u2192 Qs \u2191 (direct) \u2014 movement ALONG the curve.","**Demand shifters (TRIBE)**: Tastes, Related prices, Income, Buyers, Expectations.","**Supply shifters (SPENT)**: Subsidies/taxes, Prices of inputs, Expectations, Number of sellers, Technology."]},{"label":"Market Outcomes","title":"Surplus & Shortage","bullets":["**Surplus** (excess supply): price > equilibrium \u2192 Qs > Qd \u2192 price falls.","**Shortage** (excess demand): price < equilibrium \u2192 Qd > Qs \u2192 price rises.","**Equilibrium**: Qs = Qd \u2014 no pressure to change price.","Price controls: **price ceiling** (below eq.) creates shortage; **price floor** (above eq.) creates surplus."]}],"formulas":[{"eq":"Surplus \u2192 price falls to equilibrium","label":""},{"eq":"Shortage \u2192 price rises to equilibrium","label":""},{"eq":"Price ceiling below Peq \u2192 shortage","label":""},{"eq":"Price floor above Peq \u2192 surplus","label":""}]}],"formulas":[{"eq":"CA in X: lower OC than trading partner","label":""},{"eq":"Terms of trade: between both countries' OCs","label":""},{"eq":"Surplus (Qs > Qd) \u2192 P\u2193; Shortage (Qd > Qs) \u2192 P\u2191","label":""}]},"quiz":[{"question":"Country X can produce 8 units of wheat or 4 units of steel per worker. Country Y can produce 6 units of wheat or 6 units of steel. Which country has the comparative advantage in steel?","options":["A) Country X, because it produces more wheat","B) Country Y, because its OC of steel is 1 unit of wheat","C) Country X, because its OC of steel is 2 units of wheat","D) Country Y, because it can produce the same amount of both goods"],"answer":"B","explanation":"OC of 1 steel: Country X = 8/4 = 2 wheat; Country Y = 6/6 = 1 wheat. Country Y gives up fewer units of wheat per unit of steel \u2192 lower OC \u2192 comparative advantage in steel.","topic":"comparative_advantage"},{"question":"An increase in the price of coffee would most likely cause which of the following in the market for tea (a substitute)?","options":["A) The supply of tea to increase","B) The demand for tea to decrease","C) The demand for tea to increase","D) The equilibrium price of tea to fall"],"answer":"C","explanation":"Coffee and tea are substitutes. When coffee becomes more expensive, consumers switch to tea, increasing demand. The demand curve for tea shifts right \u2192 equilibrium price and quantity of tea both rise.","topic":"supply_demand"},{"question":"A price ceiling is set below the market equilibrium price. The most likely result is:","options":["A) A surplus, as producers supply more than consumers demand","B) A shortage, as quantity demanded exceeds quantity supplied","C) No effect on the market, since ceiling prices are rarely enforced","D) An increase in the equilibrium price over time"],"answer":"B","explanation":"A price ceiling below equilibrium keeps prices artificially low \u2192 Qd > Qs \u2192 persistent shortage. Producers aren't incentivized to supply enough at the lower price.","topic":"supply_demand"},{"question":"Which of the following would cause the SUPPLY curve for smartphones to shift to the right?","options":["A) An increase in consumer income","B) A rise in the price of semiconductors used in production","C) A technological improvement in smartphone manufacturing","D) An increase in the price of smartphones"],"answer":"C","explanation":"Better production technology reduces costs \u2192 supply increases (shifts right). Price changes cause movements along the supply curve, not shifts. Input price increases shift supply left.","topic":"supply_demand"},{"question":"If two countries each have a comparative advantage in different goods and they trade, the result is:","options":["A) Only the country with absolute advantage benefits","B) Both countries can consume beyond their individual PPCs","C) Total world output remains unchanged but distribution improves","D) The country with the lower opportunity cost in both goods gains nothing from trade"],"answer":"B","explanation":"When countries specialize according to comparative advantage and trade, both can consume combinations that were outside their individual PPCs. Total world output increases \u2014 the gains from trade.","topic":"comparative_advantage"}],"unit":{"id":1,"lbl":"Basic Concepts","col":"#f0c040","ex":"5\u201310%","em":"\ud83e\udde9"}},{"id":2004,"isDefault":true,"date":"2024-01-02T08:00:00.000Z","title":"2.1 \u2014 GDP: Measuring the Economy","summary":"GDP is the economy's report card. This session covers how to calculate it, what's included (and excluded), and why Real GDP is what actually matters for comparing performance across time.","studyGuide":{"keyTakeaways":["GDP = C + Ig + G + Xn \u2014 the expenditure approach. Know all four components cold.","Excluded: used goods, financial transactions, transfer payments, intermediate goods.","Real GDP adjusts for inflation \u2014 use it when comparing GDP across years.","GDP deflator = (Nominal GDP / Real GDP) \u00d7 100."],"sections":[{"title":"Calculating GDP","cards":[{"label":"The Formula","title":"GDP = C + Ig + G + Xn","bullets":["**C (Consumption)**: households \u2014 largest share (~70% US), includes durable/non-durable goods + services.","**Ig (Gross Investment)**: business spending on capital + residential construction + \u0394inventory.","**G (Government purchases)**: federal + state + local spending on goods/services \u2014 NOT transfers.","**Xn (Net Exports)**: Exports \u2212 Imports. Negative if trade deficit (imports > exports)."]},{"label":"Exclusions","title":"What Does NOT Count in GDP","bullets":["**Used goods**: a used car sale \u2014 counted when new, not again.","**Transfer payments**: Social Security, welfare \u2014 no new production.","**Purely financial transactions**: buying stocks or bonds.","**Intermediate goods**: the steel in a car \u2014 count the car, not the steel (avoid double-counting).","**Underground/illegal activity**: unreported production."]}],"formulas":[{"eq":"GDP = C + Ig + G + Xn","label":"Expenditure approach"},{"eq":"Xn = Exports \u2212 Imports","label":"Net exports"}]},{"title":"Real vs. Nominal GDP","cards":[{"label":"The Key Difference","title":"Why Real GDP Matters","bullets":["**Nominal GDP**: output valued at current prices \u2014 rises with inflation even if output is unchanged.","**Real GDP**: output valued at base-year prices \u2014 removes inflation, shows true growth.","**GDP Deflator**: measures the price level relative to base year. Deflator > 100 \u2192 prices rose.","Always use Real GDP to compare living standards or growth across years."]},{"label":"Formula","title":"Converting Nominal to Real","text":"Real GDP = (Nominal GDP \u00f7 GDP Deflator) \u00d7 100. Example: Nominal GDP = $500B, deflator = 125 \u2192 Real GDP = ($500 \u00f7 125) \u00d7 100 = $400B. The deflator of 125 means prices are 25% higher than base year."}],"formulas":[{"eq":"Real GDP = (Nominal GDP \u00f7 GDP Deflator) \u00d7 100","label":""},{"eq":"GDP Deflator = (Nominal GDP \u00f7 Real GDP) \u00d7 100","label":""}]}],"formulas":[{"eq":"GDP = C + Ig + G + (X \u2212 M)","label":""},{"eq":"Real GDP = Nominal GDP / GDP Deflator \u00d7 100","label":""},{"eq":"GDP Deflator = Nominal / Real \u00d7 100","label":""}]},"quiz":[{"question":"Which of the following is INCLUDED in GDP?","options":["A) A family purchases a 10-year-old house from a neighbor","B) Ford Motor Company purchases steel to manufacture cars","C) The federal government builds a new highway","D) A retiree receives a Social Security check"],"answer":"C","explanation":"Government purchases (G) are part of GDP. Used home sales, intermediate goods (steel going into cars), and transfer payments are all excluded from GDP calculations.","topic":"gdp"},{"question":"If net exports are negative ($50B), consumer spending is $400B, investment is $80B, and government spending is $120B, what is GDP?","options":["A) $550B","B) $600B","C) $650B","D) $550B"],"answer":"A","explanation":"GDP = C + Ig + G + Xn = $400 + $80 + $120 + (\u2212$50) = $550B. Don't forget that a trade deficit makes Xn negative, which reduces GDP.","topic":"gdp"},{"question":"Nominal GDP rose from $800B to $880B. The GDP deflator rose from 100 to 110. Real GDP:","options":["A) Rose, because nominal GDP increased","B) Stayed the same, because the real increase was cancelled by inflation","C) Fell, because prices rose faster than output","D) Increased by less than nominal GDP, reflecting real growth"],"answer":"B","explanation":"Real GDP = (Nominal / Deflator) \u00d7 100. Year 1: ($800/100)\u00d7100 = $800B. Year 2: ($880/110)\u00d7100 = $800B. Real GDP is unchanged \u2014 the entire nominal increase was due to inflation, not real output growth.","topic":"gdp"},{"question":"Which component of GDP is most sensitive to changes in interest rates?","options":["A) Government spending (G)","B) Consumer non-durable spending (C)","C) Gross private domestic investment (Ig)","D) Net exports (Xn)"],"answer":"C","explanation":"Investment (Ig) is highly sensitive to interest rates \u2014 businesses borrow to fund capital projects. When rates rise, borrowing costs increase and investment falls. This is a key transmission mechanism for monetary policy.","topic":"gdp"},{"question":"The GDP deflator is 80 in the current year. This means:","options":["A) Prices are 80% higher than in the base year","B) Prices are 20% lower than in the base year","C) Real GDP equals 80% of nominal GDP","D) Inflation has been 80% since the base year"],"answer":"B","explanation":"A deflator of 80 means the price level is 80% of the base year level \u2014 prices have fallen 20% since the base year. Deflator < 100 indicates deflation relative to base year.","topic":"gdp"}],"unit":{"id":2,"lbl":"Economic Indicators","col":"#4fc3f7","ex":"12\u201317%","em":"\ud83d\udcca"}},{"id":2005,"isDefault":true,"date":"2024-01-02T09:00:00.000Z","title":"2.2 \u2014 Unemployment & the Labor Market","summary":"The unemployment rate doesn't tell the whole story. This session covers all three types of unemployment, how the rate is calculated, its limitations, and what full employment actually means.","studyGuide":{"keyTakeaways":["Unemployment rate = unemployed \u00f7 labor force \u00d7 100. Only those actively seeking work count.","Three types: frictional (between jobs), structural (skills mismatch), cyclical (recession-caused).","Natural rate of unemployment (NRU) = frictional + structural. Target for policy.","Discouraged workers leave the labor force \u2192 measured rate understates true unemployment."],"sections":[{"title":"Measuring Unemployment","cards":[{"label":"Who Counts","title":"The Labor Force","bullets":["**Labor Force** = employed + unemployed (actively seeking work).","**NOT in labor force**: full-time students, retirees, stay-at-home parents, **discouraged workers**.","**Discouraged workers**: gave up job searching \u2014 not counted as unemployed \u2192 rate is understated.","**Underemployed**: working part-time involuntarily or in jobs below skill level \u2014 not counted as unemployed."]},{"label":"The Formula","title":"Unemployment Rate Calculation","text":"Unemployment Rate = (Unemployed \u00f7 Labor Force) \u00d7 100. Labor Force Participation Rate = (Labor Force \u00f7 Adult Non-Institutional Population) \u00d7 100. When discouraged workers re-enter the labor force and start searching, the measured unemployment rate can RISE even if the economy is improving \u2014 because the labor force grows."}],"formulas":[{"eq":"Unemployment Rate = Unemployed \u00f7 Labor Force \u00d7 100","label":""},{"eq":"Labor Force Participation Rate = Labor Force \u00f7 Adult Population \u00d7 100","label":""}]},{"title":"Types of Unemployment","cards":[{"label":"The Three Types","title":"Frictional, Structural, Cyclical","bullets":["**Frictional**: normal job-searching time between positions. Healthy \u2014 exists even at full employment.","**Structural**: skills mismatch (technology changes, industry declines). Requires retraining.","**Cyclical**: caused by recessions \u2014 the target of fiscal and monetary policy.","**Natural Rate (NRU)** = frictional + structural. No cyclical unemployment at NRU.","**Full employment** \u2260 0% unemployment \u2014 it means 0% cyclical unemployment (NRU only)."]},{"label":"Output Gap","title":"Connecting to GDP","bullets":["**Recessionary gap**: actual GDP < potential GDP \u2192 cyclical unemployment exists.","**Inflationary gap**: actual GDP > potential GDP \u2192 economy overheating, labor scarce.","**Okun's Law (concept)**: for every 1% cyclical unemployment, output is ~2% below potential.","Closing the gap = eliminating cyclical unemployment = returning to NRU."]}],"formulas":[{"eq":"NRU = Frictional + Structural (no cyclical)","label":"Natural rate"},{"eq":"Recessionary gap: Actual GDP < Potential GDP","label":""}]}],"formulas":[{"eq":"Unemployment Rate = Unemployed / Labor Force \u00d7 100","label":""},{"eq":"NRU = Frictional + Structural","label":""},{"eq":"Full employment: cyclical = 0, total = NRU","label":""}]},"quiz":[{"question":"A worker who has given up looking for a job is classified as:","options":["A) Structurally unemployed","B) Frictionally unemployed","C) A discouraged worker, not in the labor force","D) Cyclically unemployed"],"answer":"C","explanation":"Discouraged workers have stopped actively seeking work and are removed from the labor force entirely. They are NOT counted as unemployed, which understates the official unemployment rate.","topic":"unemployment"},{"question":"If 5 million people are unemployed and the labor force is 100 million, the unemployment rate is:","options":["A) 0.5%","B) 5%","C) 50%","D) 5.5%"],"answer":"B","explanation":"Unemployment Rate = 5M / 100M \u00d7 100 = 5%. Straightforward formula application \u2014 make sure to divide unemployed by the labor force, not total population.","topic":"unemployment"},{"question":"A steelworker loses her job because a new technology has made her skills obsolete. This is an example of:","options":["A) Frictional unemployment","B) Structural unemployment","C) Cyclical unemployment","D) Seasonal unemployment"],"answer":"B","explanation":"Structural unemployment results from a mismatch between workers' skills and available jobs due to technology changes or industry shifts. It requires retraining \u2014 not just job searching.","topic":"unemployment"},{"question":"The natural rate of unemployment includes which types of unemployment?","options":["A) Cyclical and seasonal only","B) Frictional and structural only","C) Cyclical and structural only","D) Frictional, structural, and cyclical"],"answer":"B","explanation":"The NRU includes frictional (job searching) and structural (skills mismatch) unemployment \u2014 both exist even in a healthy economy. Cyclical unemployment (recession-related) is NOT part of the natural rate.","topic":"unemployment"},{"question":"During a severe recession, which of the following changes would most likely occur simultaneously?","options":["A) Frictional unemployment rises, structural falls","B) Cyclical unemployment rises, labor force participation falls","C) The NRU rises, real GDP increases","D) Structural unemployment rises, frictional unemployment falls"],"answer":"B","explanation":"In a recession, cyclical unemployment surges. Simultaneously, discouraged workers leave the labor force, reducing LFPR. This means the measured unemployment rate may understate the severity of the downturn.","topic":"unemployment"}],"unit":{"id":2,"lbl":"Economic Indicators","col":"#4fc3f7","ex":"12\u201317%","em":"\ud83d\udcca"}},{"id":2006,"isDefault":true,"date":"2024-01-02T10:00:00.000Z","title":"2.3 \u2014 Inflation, CPI & the Business Cycle","summary":"Inflation erodes purchasing power and redistributes wealth between borrowers and lenders. This session covers how we measure inflation, who wins and loses, and how the business cycle connects everything.","studyGuide":{"keyTakeaways":["CPI measures the cost of a fixed basket of consumer goods over time.","Inflation rate = (CPI\u2082 \u2212 CPI\u2081) / CPI\u2081 \u00d7 100.","Borrowers gain from unexpected inflation; lenders and savers lose.","Real interest rate = nominal rate \u2212 inflation rate (Fisher equation)."],"sections":[{"title":"Measuring Inflation","cards":[{"label":"CPI","title":"Consumer Price Index","bullets":["Measures change in the price of a **fixed basket** of goods and services for a typical consumer.","**Inflation rate** = (CPI current year \u2212 CPI prior year) / CPI prior year \u00d7 100.","**GDP Deflator** vs. CPI: deflator covers all domestic production; CPI covers consumer basket only.","**Core CPI**: excludes volatile food and energy prices \u2014 better for long-term trend analysis."]},{"label":"Winners & Losers","title":"Who Inflation Hurts and Helps","bullets":["**Borrowers win**: repay fixed debts with cheaper dollars (real debt burden falls).","**Lenders lose**: receive repayments worth less in real terms.","**Fixed-income earners lose**: purchasing power erodes (retirees on fixed pensions).","**Savers lose** (if nominal rates don't keep up with inflation): real return negative.","**Asset holders can win**: real assets (real estate, stocks) often rise with inflation."]}],"formulas":[{"eq":"Inflation Rate = (CPI\u2082 \u2212 CPI\u2081) / CPI\u2081 \u00d7 100","label":""},{"eq":"Real Interest Rate = Nominal Rate \u2212 Inflation Rate","label":"Fisher equation"}]},{"title":"The Business Cycle","cards":[{"label":"The Cycle","title":"Phases of the Business Cycle","bullets":["**Expansion**: rising real GDP, falling unemployment, rising prices.","**Peak**: highest point \u2014 may trigger inflationary pressures.","**Contraction/Recession**: falling real GDP (2+ consecutive quarters), rising unemployment.","**Trough**: lowest point \u2014 economy begins recovery.","**Leading indicators**: stock prices, building permits, predict future activity.","**Lagging indicators**: unemployment rate \u2014 confirms what already happened."]},{"label":"Output Gaps","title":"Recessionary vs. Inflationary Gaps","bullets":["**Recessionary gap**: actual output below potential \u2192 cyclical unemployment, low inflation.","**Inflationary gap**: actual output above potential \u2192 low unemployment, rising inflation.","The AS/AD model shows these gaps \u2014 and how policy closes them."]}],"formulas":[{"eq":"Recession: \u22652 quarters of declining Real GDP","label":""},{"eq":"Real Return = Nominal Return \u2212 Inflation","label":""}]}],"formulas":[{"eq":"Inflation Rate = (CPI\u2082 \u2212 CPI\u2081) / CPI\u2081 \u00d7 100","label":""},{"eq":"Real Interest Rate = Nominal \u2212 Inflation","label":"Fisher"},{"eq":"Recessionary gap: Actual < Potential GDP","label":""},{"eq":"Inflationary gap: Actual > Potential GDP","label":""}]},"quiz":[{"question":"The CPI in Year 1 is 120 and in Year 2 is 132. The inflation rate is:","options":["A) 8%","B) 10%","C) 12%","D) 20%"],"answer":"B","explanation":"Inflation rate = (132 \u2212 120) / 120 \u00d7 100 = 12/120 \u00d7 100 = 10%. Always divide the change by the EARLIER year's CPI, not the later one.","topic":"inflation_cpi"},{"question":"If the nominal interest rate is 6% and the inflation rate is 4%, the real interest rate is:","options":["A) 1.5%","B) 2%","C) 4%","D) 10%"],"answer":"B","explanation":"Real interest rate = nominal \u2212 inflation = 6% \u2212 4% = 2%. The Fisher equation shows the true return adjusted for purchasing power loss.","topic":"inflation_cpi"},{"question":"Who benefits most from unexpected inflation?","options":["A) Retired workers on fixed pensions","B) Banks that made fixed-rate loans","C) Borrowers with fixed-rate mortgages","D) Holders of savings accounts with low interest rates"],"answer":"C","explanation":"Fixed-rate borrowers repay their loans with dollars that are worth less \u2014 the real value of their debt shrinks. Lenders, fixed-income recipients, and savers all lose from unexpected inflation.","topic":"inflation_cpi"},{"question":"Which of the following is a LEADING economic indicator?","options":["A) The unemployment rate","B) New building permits issued","C) Average duration of unemployment","D) Outstanding commercial loans"],"answer":"B","explanation":"Building permits are a leading indicator \u2014 they predict future construction activity and economic expansion. Unemployment rate and loan data are lagging indicators \u2014 they confirm what already happened.","topic":"business_cycle"},{"question":"An economy enters a recessionary gap. Which combination of conditions is most likely present?","options":["A) Rising unemployment and accelerating inflation","B) Low unemployment and falling real GDP","C) Cyclical unemployment and output below potential","D) Expanding real GDP and a falling price level"],"answer":"C","explanation":"A recessionary gap means actual output is below potential GDP \u2014 cyclical unemployment exists. The price level is typically below what it would be at full employment. This is the classic recession condition.","topic":"business_cycle"}],"unit":{"id":2,"lbl":"Economic Indicators","col":"#4fc3f7","ex":"12\u201317%","em":"\ud83d\udcca"}},{"id":2007,"isDefault":true,"date":"2024-01-03T08:00:00.000Z","title":"3.1 \u2014 The AS/AD Model & Output Gaps","summary":"The AS/AD model is the central framework of AP Macro. Master this graph and you can explain booms, busts, policy effects, and supply shocks \u2014 which covers roughly a third of the entire exam.","studyGuide":{"keyTakeaways":["AD slopes down (wealth, interest rate, net export effects); SRAS slopes up; LRAS is vertical.","AD shifts: C, Ig, G, Xn components change \u2014 NOT price level changes.","SRAS shifts: input prices change (wages, energy) \u2014 NOT output price changes.","Recessionary gap \u2192 AD/SRAS left of LRAS; Inflationary gap \u2192 right of LRAS."],"sections":[{"title":"The Three Curves","cards":[{"label":"Aggregate Demand","title":"Why AD Slopes Downward","bullets":["**Wealth effect**: higher price level \u2192 real wealth falls \u2192 spending falls.","**Interest rate effect**: higher price level \u2192 more money demand \u2192 rates rise \u2192 investment falls.","**Net export effect**: higher price level \u2192 exports pricier \u2192 imports cheaper \u2192 Xn falls.","AD **shifts** when C, Ig, G, or Xn change for non-price reasons (policy, expectations, income)."]},{"label":"Aggregate Supply","title":"SRAS vs. LRAS","bullets":["**SRAS** slopes up: firms produce more when prices rise (input prices sticky in SR).","**SRAS shifts**: \u2191 input costs (wages, oil) \u2192 left; \u2193 input costs or \u2191 productivity \u2192 right.","**LRAS** is vertical at potential output \u2014 all prices flexible in the long run.","**LRAS shifts**: \u2191 resources, \u2191 technology, \u2191 capital stock \u2192 right (economic growth)."]}],"formulas":[]},{"title":"Output Gaps","cards":[{"label":"Gap Analysis","title":"Reading Equilibrium Position","bullets":["**Short-run equilibrium**: where AD intersects SRAS \u2014 may be above or below potential.","**Recessionary gap**: AD meets SRAS to the LEFT of LRAS \u2192 output below potential \u2192 cyclical unemployment.","**Inflationary gap**: AD meets SRAS to the RIGHT of LRAS \u2192 output above potential \u2192 inflation pressure.","**Long-run equilibrium**: all three curves intersect \u2014 output equals potential, stable prices."]},{"label":"Supply Shocks","title":"Stagflation","bullets":["**Negative supply shock** (oil price spike): SRAS shifts LEFT \u2192 output falls AND prices rise = stagflation.","Stagflation = the worst combination \u2014 normal policy tools can't fix both simultaneously.","**Positive supply shock**: SRAS shifts right \u2192 output rises AND prices fall (rare but great).","Stagflation mirrors: on the Phillips Curve \u2192 SRPC shifts right."]}],"formulas":[{"eq":"Recessionary gap: AD\u2229SRAS is LEFT of LRAS","label":""},{"eq":"Inflationary gap: AD\u2229SRAS is RIGHT of LRAS","label":""},{"eq":"Stagflation: SRAS left \u2192 \u2193Y and \u2191P","label":""}]}],"formulas":[{"eq":"AD down-slope: wealth + interest rate + net export effects","label":""},{"eq":"SRAS left shift: \u2191 input prices (wages, oil)","label":""},{"eq":"LRAS right shift: \u2191 resources or technology","label":""},{"eq":"Recessionary gap \u2192 expansionary policy needed","label":""}]},"quiz":[{"question":"Which of the following would cause the Aggregate Demand (AD) curve to shift to the RIGHT?","options":["A) An increase in the price level","B) A cut in corporate income taxes that boosts investment","C) A rise in interest rates engineered by the Fed","D) A decrease in government transfer payments"],"answer":"B","explanation":"A tax cut on corporate income increases investment (Ig), shifting AD right. Price level changes cause movement ALONG AD \u2014 they don't shift it. Higher interest rates reduce investment (AD left); lower transfers reduce consumption (AD left).","topic":"asad_model"},{"question":"A sudden increase in oil prices would most likely:","options":["A) Shift AD to the right and increase real output","B) Shift SRAS to the left, causing stagflation","C) Shift LRAS to the right and reduce inflation","D) Shift AD to the left and decrease the price level"],"answer":"B","explanation":"Oil is a major input cost \u2014 a price spike raises production costs \u2192 SRAS shifts left. This creates stagflation: output falls AND price level rises simultaneously. This is why supply shocks are uniquely difficult for policymakers.","topic":"asad_model"},{"question":"An economy's short-run equilibrium is to the LEFT of its LRAS. This indicates:","options":["A) An inflationary gap with output above potential","B) A recessionary gap with cyclical unemployment","C) The economy is at full employment","D) Aggregate supply has increased beyond capacity"],"answer":"B","explanation":"When the AD-SRAS intersection is to the left of LRAS, actual output is below potential \u2192 the economy is in a recessionary gap with cyclical unemployment and output below what it could sustainably produce.","topic":"asad_model"},{"question":"Which of the following would shift the Short-Run Aggregate Supply (SRAS) curve to the RIGHT?","options":["A) An increase in the price level","B) A fall in worker wages","C) An increase in government spending","D) Higher consumer confidence"],"answer":"B","explanation":"SRAS shifts right when input costs fall. Lower wages reduce production costs \u2192 firms willing to supply more at every price level \u2192 SRAS right. Price level changes move us ALONG SRAS; government spending and consumer confidence affect AD.","topic":"asad_model"},{"question":"Stagflation is best characterized by:","options":["A) Rising real GDP and falling unemployment","B) Falling prices and rising output simultaneously","C) Rising prices and falling real output simultaneously","D) Falling prices and rising unemployment"],"answer":"C","explanation":"Stagflation = simultaneous inflation (rising prices) + stagnation (falling output/rising unemployment). It is caused by a leftward SRAS shift (supply shock) and is the worst combination for policymakers because standard tools can't address both problems at once.","topic":"asad_model"}],"unit":{"id":3,"lbl":"AS/AD & Fiscal","col":"#c084fc","ex":"17\u201327%","em":"\ud83d\udcc9"}},{"id":2008,"isDefault":true,"date":"2024-01-03T09:00:00.000Z","title":"3.2 \u2014 Fiscal Policy & Multipliers","summary":"When the economy needs help, Congress reaches for the fiscal toolkit. This session covers how government spending and taxes shift AD, and why the multiplier makes small changes into big ones \u2014 or doesn't.","studyGuide":{"keyTakeaways":["Expansionary fiscal policy (\u2191G or \u2193T) shifts AD right \u2014 used in recessions.","Contractionary fiscal policy (\u2193G or \u2191T) shifts AD left \u2014 used against inflation.","Spending multiplier = 1/MPS; tax multiplier = \u2212MPC/MPS (one less in absolute value).","Budget deficits can crowd out private investment by raising real interest rates."],"sections":[{"title":"Fiscal Policy Tools","cards":[{"label":"Expansionary","title":"Fighting Recessions","bullets":["**\u2191 Government spending (G)**: directly injects into AD \u2014 most powerful tool.","**\u2193 Taxes**: increases household disposable income \u2192 \u2191C \u2192 AD shifts right.","**\u2191 Transfer payments**: indirectly boosts AD through increased household income.","Used when economy is in a **recessionary gap** (actual output < potential)."]},{"label":"Contractionary","title":"Fighting Inflation","bullets":["**\u2193 Government spending**: removes demand directly from the economy.","**\u2191 Taxes**: reduces household disposable income \u2192 \u2193C \u2192 AD shifts left.","Used when economy is in an **inflationary gap** (actual output > potential).","Politically difficult \u2014 rarely done proactively."]}],"formulas":[]},{"title":"The Multipliers","cards":[{"label":"How It Works","title":"The Spending Multiplier","bullets":["Government spends $100 \u2192 becomes income for workers \u2192 they spend MPC \u00d7 $100 \u2192 ...","Chain continues until all income is saved. Total effect = 1/MPS \u00d7 initial spending.","**Spending Multiplier = 1/MPS = 1/(1\u2212MPC)**.","A higher MPC \u2192 bigger multiplier \u2192 more stimulus per dollar of spending."]},{"label":"Tax Multiplier","title":"Why Taxes Hit Less Hard","text":"Tax Multiplier = \u2212MPC/MPS. Always negative (tax \u2193 \u2192 spending \u2191) and always ONE LESS in absolute value than the spending multiplier. Why? A tax cut first passes through households, who save MPS of it. Government spending goes directly into the economy \u2014 no saving leakage at the first step. Balanced-budget multiplier = 1: equal increases in G and T raise GDP by the amount of the increase."}],"formulas":[{"eq":"Spending Multiplier = 1 / MPS","label":""},{"eq":"Tax Multiplier = \u2212MPC / MPS","label":"Always 1 less in absolute value"},{"eq":"MPC + MPS = 1","label":""},{"eq":"\u0394GDP = Multiplier \u00d7 \u0394Spending","label":""},{"eq":"Balanced-budget multiplier = 1","label":""}]}],"formulas":[{"eq":"Spending Multiplier = 1/MPS","label":""},{"eq":"Tax Multiplier = \u2212MPC/MPS","label":""},{"eq":"\u0394GDP = Spending Mult \u00d7 \u0394G","label":""},{"eq":"\u0394GDP = Tax Mult \u00d7 \u0394T","label":""},{"eq":"Balanced budget mult = 1","label":""}]},"quiz":[{"question":"MPC = 0.8. The government increases spending by $200 billion. By how much does GDP increase (maximum)?","options":["A) $160B","B) $200B","C) $800B","D) $1,000B"],"answer":"D","explanation":"MPS = 1 \u2212 0.8 = 0.2. Spending multiplier = 1/0.2 = 5. \u0394GDP = 5 \u00d7 $200B = $1,000B. The multiplier amplifies the initial injection through rounds of spending.","topic":"multiplier_effect"},{"question":"If MPS = 0.25, the tax multiplier is:","options":["A) \u22123","B) \u22124","C) 4","D) 3"],"answer":"A","explanation":"Tax multiplier = \u2212MPC/MPS = \u2212(1\u22120.25)/0.25 = \u22120.75/0.25 = \u22123. It's negative (tax cut stimulates; tax hike contracts) and one less in absolute value than the spending multiplier (which is 4).","topic":"multiplier_effect"},{"question":"The government increases spending by $50B and taxes by $50B simultaneously (balanced budget). GDP changes by:","options":["A) $0 \u2014 they cancel out","B) +$50B","C) \u2212$50B","D) +$100B"],"answer":"B","explanation":"Balanced budget multiplier = 1. \u0394GDP = 1 \u00d7 $50B = +$50B. The spending increase (multiplier 4) outweighs the tax increase (multiplier 3 in absolute value) by exactly 1 \u2014 so the balanced budget always raises GDP by the amount of the change.","topic":"fiscal_policy"},{"question":"An inflationary gap exists. Which fiscal policy is most appropriate?","options":["A) Increase transfer payments to boost consumer spending","B) Cut taxes to stimulate investment","C) Decrease government spending to reduce AD","D) Increase the money supply to lower interest rates"],"answer":"C","explanation":"An inflationary gap means output is above potential \u2014 contractionary fiscal policy (\u2193G or \u2191T) is needed to shift AD left and reduce inflationary pressure. Increasing transfers, cutting taxes, or expanding the money supply would all worsen inflation.","topic":"fiscal_policy"},{"question":"Crowding out refers to the situation where:","options":["A) Government spending replaces private investment dollar-for-dollar","B) Higher real interest rates caused by deficit spending reduce private investment","C) Automatic stabilizers reduce the need for discretionary fiscal policy","D) Monetary policy offsets the effects of fiscal expansion"],"answer":"B","explanation":"Deficit spending requires government borrowing \u2192 demand for loanable funds \u2191 \u2192 real interest rates rise \u2192 private investment falls. This 'crowds out' some private activity, partially offsetting the stimulus effect of fiscal policy.","topic":"fiscal_policy"}],"unit":{"id":3,"lbl":"AS/AD & Fiscal","col":"#c084fc","ex":"17\u201327%","em":"\ud83d\udcc9"}},{"id":2009,"isDefault":true,"date":"2024-01-03T10:00:00.000Z","title":"3.3 \u2014 Automatic Stabilizers & Long-Run Adjustment","summary":"Not all fiscal policy requires a vote in Congress. Automatic stabilizers work behind the scenes, and in the long run, the economy finds its own path back \u2014 but it takes time, and the AP exam always asks you to show both.","studyGuide":{"keyTakeaways":["Automatic stabilizers respond to economic conditions without new legislation.","Long-run self-correction: wages fall in recessions (SRAS right); rise in booms (SRAS left).","Keynesians favor active policy; Classicals trust self-correction \u2014 know both views.","Discretionary fiscal policy has time lags: recognition, decision, and implementation."],"sections":[{"title":"Automatic Stabilizers","cards":[{"label":"Built-In","title":"No Vote Required","bullets":["**Unemployment insurance**: automatically increases spending in recessions, falls in booms.","**Progressive income taxes**: tax revenue falls automatically in recessions (less income \u2192 less tax) \u2192 supports disposable income.","Both expand the deficit in recessions and shrink it in expansions \u2014 counter-cyclically.","Reduce the severity of cycles without requiring congressional action."]},{"label":"vs. Discretionary","title":"Types of Fiscal Policy","bullets":["**Automatic**: responds automatically to economic conditions \u2014 built into the tax/transfer system.","**Discretionary**: deliberate changes by Congress (stimulus bills, tax cuts) \u2014 subject to lags.","**Time lags** of discretionary policy: Recognition lag \u2192 Decision lag \u2192 Implementation lag.","Lags can make discretionary policy procyclical if poorly timed."]}],"formulas":[]},{"title":"Long-Run Self-Correction","cards":[{"label":"The Classical View","title":"How the Economy Heals Itself","bullets":["**Recessionary gap**: unemployment rises \u2192 workers accept lower wages \u2192 input costs fall \u2192 SRAS shifts RIGHT \u2192 output returns to potential at lower price level.","**Inflationary gap**: labor is scarce \u2192 wages rise \u2192 input costs rise \u2192 SRAS shifts LEFT \u2192 output returns to potential at higher price level.","This is the **classical** or **supply-side self-correction** mechanism.","Problem: can take years \u2014 'In the long run we are all dead' (Keynes)."]},{"label":"Policy Debate","title":"Keynesians vs. Classicals","bullets":["**Keynesians**: self-correction is slow and painful \u2014 active fiscal/monetary policy needed.","**Classicals**: markets self-correct efficiently \u2014 government intervention creates more problems.","**AP Exam**: always show the short-run effect AND long-run self-correction when asked."]}],"formulas":[{"eq":"Recessionary gap \u2192 wages fall \u2192 SRAS right \u2192 full employment","label":"Self-correction"},{"eq":"Inflationary gap \u2192 wages rise \u2192 SRAS left \u2192 full employment","label":"Self-correction"}]}],"formulas":[{"eq":"Recession: SRAS shifts right (wages fall) \u2192 self-correct","label":""},{"eq":"Boom: SRAS shifts left (wages rise) \u2192 self-correct","label":""},{"eq":"Automatic stabilizers: counter-cyclical, no legislation needed","label":""}]},"quiz":[{"question":"Which of the following is an example of an automatic stabilizer?","options":["A) Congress passes a $900B stimulus bill during a recession","B) The Fed lowers the federal funds rate","C) Unemployment insurance payments rise as layoffs increase","D) The government increases infrastructure spending"],"answer":"C","explanation":"Automatic stabilizers respond automatically to economic conditions without new legislation. Unemployment insurance rises in recessions, supporting consumer spending. Stimulus bills, Fed actions, and infrastructure spending are all discretionary.","topic":"automatic_stabilizers"},{"question":"The economy is in a recessionary gap. Without any government intervention, the long-run self-correction process occurs because:","options":["A) Consumer confidence automatically rises, shifting AD right","B) Wages fall, reducing production costs and shifting SRAS right","C) The government increases spending to close the gap","D) The Fed automatically cuts interest rates to stimulate investment"],"answer":"B","explanation":"Classical self-correction: in a recession, unemployment rises \u2192 workers accept lower wages \u2192 input costs fall \u2192 SRAS shifts right \u2192 output returns to potential. No policy needed \u2014 but it takes time.","topic":"automatic_stabilizers"},{"question":"A major problem with discretionary fiscal policy is:","options":["A) It always increases the budget deficit","B) Time lags may cause the policy to take effect after the problem has passed","C) It operates automatically, which reduces its effectiveness","D) The spending multiplier is always less than 1 for discretionary spending"],"answer":"B","explanation":"Discretionary fiscal policy suffers from recognition, decision, and implementation lags. By the time a stimulus bill passes and takes effect, the recession may have ended \u2014 potentially worsening the next inflationary period.","topic":"fiscal_policy"},{"question":"An economy is in an inflationary gap. If no policy is implemented, what happens in the long run?","options":["A) SRAS shifts right as wages fall, closing the gap","B) AD shifts left as consumers reduce spending","C) SRAS shifts left as wages rise, returning output to potential","D) LRAS shifts right to accommodate the higher output"],"answer":"C","explanation":"In an inflationary gap, the economy is running hot \u2014 labor is scarce, wages rise. Higher wages increase production costs \u2192 SRAS shifts left \u2192 output returns to potential GDP, but at a permanently higher price level.","topic":"automatic_stabilizers"},{"question":"Progressive income taxes act as automatic stabilizers because:","options":["A) They increase tax rates in recessions to fund government spending","B) Tax revenues fall automatically during recessions, leaving more income in private hands","C) They require Congressional approval to take effect","D) They eliminate the need for monetary policy during downturns"],"answer":"B","explanation":"Progressive taxes mean that as incomes fall in a recession, households move into lower tax brackets \u2014 tax revenue falls automatically, effectively leaving more disposable income to support spending. No legislation required.","topic":"automatic_stabilizers"}],"unit":{"id":3,"lbl":"AS/AD & Fiscal","col":"#c084fc","ex":"17\u201327%","em":"\ud83d\udcc9"}},{"id":2010,"isDefault":true,"date":"2024-01-04T08:00:00.000Z","title":"4.1 \u2014 Money, Banking & the Money Multiplier","summary":"Banks don't just hold money \u2014 they create it. This session explains fractional reserve banking, T-accounts, and how a single deposit can ripple through the system to expand the money supply many times over.","studyGuide":{"keyTakeaways":["Money multiplier = 1 / Reserve Requirement. A $1,000 deposit with 10% RR \u2192 $10,000 money created.","Banks must hold required reserves; they can only lend excess reserves.","T-accounts: Assets (reserves + loans) = Liabilities (deposits). Always balanced.","M1 = currency + checking accounts; M2 = M1 + savings + money market funds."],"sections":[{"title":"Money & Its Functions","cards":[{"label":"What Money Is","title":"M1 and M2","bullets":["**M1** (most liquid): coins + paper currency + checking accounts (demand deposits).","**M2**: M1 + savings accounts + money market accounts + small CDs.","**Functions**: mediu
