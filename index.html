<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX — Your AP Exam Edge</title>
<style>
/* ── RESET & ROOT ── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070d;--surf:#0d0d18;--card:#131320;--card2:#191928;--bdr:#1e1e30;--bdr2:#2a2a3e;
  --txt:#f0f0f8;--mut:#4a4a6a;--soft:#8888aa;--mid:#b0b0c8;
  --accent:#f0c040;
  --c1:#f0c040;--c2:#4fc3f7;--c3:#a78bfa;--c4:#34d399;--c5:#fb7185;--c6:#c084fc;--c7:#ff8c42;
  --r4:4px;--r6:6px;--r8:8px;--r12:12px;
  --shadow:0 2px 12px rgba(0,0,0,.4);
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer}
a{color:inherit;text-decoration:none}
::selection{background:rgba(240,192,64,.25);color:var(--txt)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* ── HERO ── */
.hero{position:relative;padding:2rem 1.5rem 1.75rem;overflow:hidden;border-bottom:1px solid var(--bdr)}
.hero-glow-1{position:absolute;top:-80px;left:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(240,192,64,.06) 0%,transparent 65%);pointer-events:none}
.hero-glow-2{position:absolute;bottom:-60px;right:-60px;width:400px;height:400px;background:radial-gradient(circle,rgba(79,195,247,.04) 0%,transparent 65%);pointer-events:none}
.hero-inner{max-width:860px;margin:0 auto;position:relative;z-index:1}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px}
.hero-left{flex:1;min-width:0}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-family:monospace;letter-spacing:3px;text-transform:uppercase;color:var(--accent);background:rgba(240,192,64,.08);border:1px solid rgba(240,192,64,.2);border-radius:2px;padding:4px 10px;margin-bottom:14px}
.hero-title{font-family:monospace;font-size:clamp(38px,8vw,62px);font-weight:900;letter-spacing:-1px;line-height:.95;color:var(--txt);margin-bottom:10px}
.hero-title .a{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--soft);line-height:1.65;max-width:420px}

/* ── AXIE ── */
.axie{flex-shrink:0;cursor:pointer;position:relative;user-select:none}
.axie svg{transition:transform .35s cubic-bezier(.34,1.56,.64,1);display:block}
.axie:hover svg{transform:rotate(-8deg) scale(1.08) translateY(-3px)}
.axie:active svg{transform:scale(.95)}
.axie-msg{position:absolute;right:90px;top:-4px;background:var(--card2);border:1px solid var(--bdr2);border-radius:10px 10px 0 10px;padding:9px 13px;font-size:12px;color:var(--mid);line-height:1.5;max-width:200px;white-space:normal;opacity:0;transform:scale(.85) translateY(4px);transition:all .22s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:20;box-shadow:var(--shadow)}
.axie-msg.on{opacity:1;transform:scale(1) translateY(0)}
.axie-msg::after{content:'';position:absolute;right:-7px;top:10px;border:4px solid transparent;border-left-color:var(--bdr2)}

/* ── STATS ── */
.stats{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.035);border:1px solid var(--bdr);border-radius:20px;padding:5px 11px;font-size:12px;color:var(--soft);transition:border-color .2s}
.stat:hover{border-color:var(--bdr2)}
.stat b{color:var(--txt);font-weight:600}

/* ── COUNTDOWN ── */
.cd{background:linear-gradient(135deg,rgba(240,192,64,.07),rgba(240,192,64,.03));border:1px solid rgba(240,192,64,.18);border-radius:var(--r8);padding:14px 18px;margin-top:14px;display:flex;align-items:center;gap:0;flex-wrap:wrap}
.cd-block{display:flex;flex-direction:column;align-items:center;padding:0 16px}
.cd-num{font-family:monospace;font-size:30px;font-weight:900;line-height:1;color:var(--accent)}
.cd-lbl{font-size:9px;font-family:monospace;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-top:2px}
.cd-div{width:1px;height:32px;background:var(--bdr2)}
.cd-info{flex:1;min-width:160px;padding-left:18px;font-size:13px;color:var(--soft);line-height:1.55}
.cd-swatches{display:flex;gap:6px;align-items:center;margin-left:auto;padding-left:16px;flex-wrap:wrap}
.swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0}
.swatch.on{border-color:rgba(255,255,255,.7);transform:scale(1.15)}

/* ── XP ── */
.xp-wrap{margin-top:12px}
.xp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-family:monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--mut)}
.xp-top span{color:var(--accent)}
.xp-track{height:5px;background:var(--bdr);border-radius:3px;overflow:hidden}
.xp-fill{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.34,1.56,.64,1)}

/* ── LAYOUT ── */
#app{max-width:860px;margin:0 auto}
.page{padding:1.25rem 1rem 5rem}

/* ── TABS ── */
.tabbar{display:flex;border-bottom:1px solid var(--bdr);overflow-x:auto;background:var(--surf);position:sticky;top:0;z-index:40;scrollbar-width:none}
.tabbar::-webkit-scrollbar{display:none}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:12px 14px;font-size:10px;font-family:monospace;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);white-space:nowrap;transition:color .15s;flex-shrink:0}
.tab.on{border-bottom-color:var(--accent);color:var(--accent);font-weight:700}
.tab:hover:not(.on){color:var(--soft)}

/* ── BUTTONS ── */
.btn{background:transparent;border:1px solid var(--bdr2);border-radius:var(--r4);padding:8px 16px;font-size:13px;color:var(--mid);transition:all .15s}
.btn:hover{border-color:var(--soft);color:var(--txt);background:rgba(255,255,255,.03)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.btn-hi{background:rgba(240,192,64,.1);border:1px solid rgba(240,192,64,.35);border-radius:var(--r6);padding:11px 22px;font-size:14px;font-weight:600;color:var(--accent);transition:all .2s;letter-spacing:.3px}
.btn-hi:hover{background:rgba(240,192,64,.18);border-color:rgba(240,192,64,.6);transform:translateY(-1px);box-shadow:0 4px 16px rgba(240,192,64,.15)}
.btn-hi:active{transform:scale(.98) translateY(0)}
.btn-hi:disabled{opacity:.35;cursor:not-allowed;pointer-events:none;transform:none}
.btn-full{display:block;width:100%;text-align:center}
.btn-del{color:var(--c5);border-color:rgba(251,113,133,.2);font-size:11px;padding:4px 10px;border-radius:var(--r4)}
.btn-del:hover{background:rgba(251,113,133,.08);border-color:rgba(251,113,133,.4)}
.btn-notion{color:var(--c3);border-color:rgba(167,139,250,.3);font-size:12px;padding:7px 13px;display:flex;align-items:center;gap:5px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r8);padding:16px 18px;transition:border-color .2s}
.card-hi{border-top:2px solid}
.scard{border-left:3px solid;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;padding:13px 16px;cursor:pointer;border-radius:var(--r6);transition:background .15s,transform .15s}
.scard:hover{background:var(--card2);transform:translateX(2px)}
.scard:active{transform:scale(.99)}

/* ── UNIT TILES ── */
.ugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-top:8px}
.utile{border:1px solid var(--bdr);border-radius:var(--r8);padding:18px 16px;cursor:pointer;position:relative;overflow:hidden;transition:all .2s;background:var(--card)}
.utile:hover{border-color:var(--bdr2);background:var(--card2);transform:translateY(-2px);box-shadow:var(--shadow)}
.utile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.utile-ghost{font-family:monospace;font-size:44px;font-weight:900;line-height:1;opacity:.07;position:absolute;top:6px;right:10px;letter-spacing:-2px;user-select:none}

/* ── RING ── */
.ring{position:relative;flex-shrink:0}
.ring svg{transform:rotate(-90deg);display:block}
.ring-n{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:monospace;font-size:9px;font-weight:700;line-height:1;text-align:center}

/* ── SECTION HEAD ── */
.sh{display:flex;align-items:baseline;gap:12px;padding-bottom:9px;border-bottom:1px solid var(--bdr);margin:26px 0 12px}
.sh-n{font-family:monospace;font-size:34px;font-weight:900;opacity:.08;line-height:1;flex-shrink:0}
.sh-t{font-family:monospace;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}

/* ── FORMULA ── */
.formula{background:rgba(0,0,0,.35);border:1px solid var(--bdr);border-radius:3px;padding:9px 15px;font-family:monospace;font-size:13px;letter-spacing:.5px;margin:5px 0;border-left:3px solid}
.formula s{font-size:10px;color:var(--mut);font-style:normal;text-decoration:none}

/* ── LABEL ── */
.lbl{font-family:monospace;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mut)}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:11px}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:9px}

/* ── FLASHCARD ── */
.fc{perspective:800px}
.fc-inner{position:relative;min-height:220px;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;min-height:220px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1px solid var(--bdr);border-radius:var(--r8);padding:32px 24px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;cursor:pointer;background:var(--card);transition:border-color .2s}
.fc-face:hover{border-color:var(--bdr2)}
.fc-back{transform:rotateY(180deg);background:var(--card2)}
.fc-hint{font-size:11px;color:var(--mut);margin-top:12px;font-family:monospace;letter-spacing:1px}

/* ── QUIZ OPTION ── */
.qopt{padding:10px 14px;border-radius:var(--r4);border:1px solid var(--bdr);cursor:pointer;font-size:13px;color:var(--soft);transition:all .15s;margin-bottom:7px;line-height:1.5}
.qopt:hover:not(.locked){background:rgba(255,255,255,.03);border-color:var(--bdr2);color:var(--mid)}
.qopt.locked{cursor:default}

/* ── CHAT ── */
.bubble-u{background:rgba(79,195,247,.09);border:1px solid rgba(79,195,247,.22);color:#6ed4f8;padding:10px 15px;border-radius:10px 10px 2px 10px;font-size:13px;line-height:1.65;max-width:78%}
.bubble-a{background:var(--card);border:1px solid var(--bdr);color:var(--mid);padding:12px 15px;border-radius:10px 10px 10px 2px;font-size:13px;line-height:1.75;max-width:82%}
.chat-bline{display:flex;gap:7px;padding:4px 0;align-items:flex-start}
.chat-bline .arr{color:var(--accent);font-size:10px;padding-top:4px;flex-shrink:0}

/* ── SETUP ── */
.setup{max-width:440px;margin:3rem auto;padding:0 1rem}
.setup-steps{background:rgba(79,195,247,.05);border:1px solid rgba(79,195,247,.18);border-radius:var(--r6);padding:14px 18px;font-size:12px;color:var(--soft);line-height:1.95;margin-bottom:18px}

/* ── MISC ── */
.err{color:var(--c5);font-size:12px;padding:6px 0;font-family:monospace}
.spin{width:15px;height:15px;border:2px solid var(--bdr2);border-top-color:var(--c2);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.notion-ta{background:#060610;border:1px solid rgba(167,139,250,.22);border-radius:var(--r4);padding:10px;font-family:monospace;font-size:11px;color:var(--soft);width:100%;height:130px;resize:none;outline:none;margin-top:8px;line-height:1.6}
.tip-box{background:rgba(240,192,64,.05);border:1px solid rgba(240,192,64,.18);border-left:3px solid var(--accent);border-radius:var(--r4);padding:13px 17px}
.grade-badge{background:var(--card);border-radius:var(--r8);padding:12px 16px;min-width:148px}
.grade-n{font-family:monospace;font-size:30px;font-weight:900;line-height:1}
.grade-bar{height:3px;border-radius:2px;background:var(--bdr);margin-top:8px;overflow:hidden}
.grade-fill{height:100%;border-radius:2px;transition:width .9s cubic-bezier(.34,1.56,.64,1)}
ul.blist{padding:0;list-style:none;margin:0}
ul.blist li{padding:4px 0 4px 16px;position:relative;color:var(--soft);font-size:12px;line-height:1.65;border-bottom:1px solid rgba(255,255,255,.025)}
ul.blist li::before{content:'›';position:absolute;left:0;color:var(--mut)}

/* ── UNIT NAV ── */
.unav{position:fixed;bottom:0;left:0;right:0;background:rgba(6,6,12,.97);border-top:1px solid var(--bdr);display:flex;justify-content:center;z-index:100;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.unav-btn{background:none;border:none;border-top:2px solid transparent;padding:7px 0;flex:1;max-width:100px;font-family:monospace;font-size:8px;letter-spacing:.5px;text-transform:uppercase;color:var(--mut);transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.unav-btn:hover{color:var(--soft)}
.unav-btn.on{border-top-color:var(--accent);color:var(--accent)}
.unav-n{font-size:17px;font-weight:900;font-family:monospace;line-height:1}
.has-unav{padding-bottom:58px}

/* ── CONFETTI ── */
.cf{position:fixed;width:7px;height:7px;border-radius:2px;pointer-events:none;z-index:9999;animation:cffall linear forwards}
@keyframes cffall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(760deg);opacity:0}}

/* ── TOAST ── */
.toast{position:fixed;top:18px;right:18px;background:rgba(240,192,64,.12);border:1px solid rgba(240,192,64,.35);border-radius:var(--r6);padding:9px 15px;font-family:monospace;font-size:12px;color:var(--accent);z-index:9998;animation:tin .25s ease,tout .25s ease 1.75s forwards;pointer-events:none;box-shadow:var(--shadow)}
@keyframes tin{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes tout{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(16px)}}

/* ── QUOTE ── */
.qfoot{border-top:1px solid var(--bdr);padding:22px 24px;background:linear-gradient(180deg,transparent,rgba(240,192,64,.025));max-width:860px;margin:0 auto}
.qfoot-q{font-size:13px;color:var(--soft);line-height:1.8;font-style:italic;margin-bottom:8px}
.qfoot-a{font-family:monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mut)}
.qfoot-a span{color:var(--accent)}
.qfoot-btn{background:none;border:none;font-family:monospace;font-size:9px;letter-spacing:1px;color:var(--mut);cursor:pointer;padding:0;margin-top:5px;text-transform:uppercase;transition:color .15s}
.qfoot-btn:hover{color:var(--soft)}

/* ── ANIMATION ── */
.fadein{animation:fadein .3s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.scalein{animation:scalein .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes scalein{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}

/* ── RESPONSIVE ── */
@media(max-width:540px){
  .hero{padding:1.5rem 1rem 1.25rem}
  .hero-title{font-size:clamp(32px,9vw,48px)}
  .ugrid{grid-template-columns:1fr 1fr}
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr 1fr}
  .grade-badge{min-width:120px}
}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero" id="hero">
  <div class="hero-glow-1"></div>
  <div class="hero-glow-2"></div>
  <div class="hero-inner">
    <div class="hero-top">
      <div class="hero-left">
        <div class="hero-eyebrow">🎓 AP Exam Prep · CoCo's Study Tool</div>
        <div class="hero-title"><span class="a">APEX</span></div>
        <div class="hero-sub">Turn any lecture into a complete study system.</div>
      </div>
      <div class="axie" onclick="axieTap()" id="axie">
        <svg width="82" height="82" viewBox="0 0 80 80">
          <ellipse cx="40" cy="51" rx="21" ry="19" fill="#12122a" stroke="var(--accent)" stroke-width="1.4"/>
          <ellipse cx="40" cy="28" rx="18" ry="17" fill="#12122a" stroke="var(--accent)" stroke-width="1.4"/>
          <polygon points="25,15 20,4 29,13" fill="var(--accent)" opacity=".9"/>
          <polygon points="55,15 60,4 51,13" fill="var(--accent)" opacity=".9"/>
          <rect x="23" y="12" width="34" height="5" rx="1.5" fill="var(--accent)"/>
          <rect x="36" y="7" width="8" height="6" rx="1" fill="var(--accent)"/>
          <line x1="57" y1="14" x2="62" y2="21" stroke="var(--accent)" stroke-width="2"/>
          <circle cx="62" cy="22" r="2.5" fill="var(--accent)"/>
          <circle cx="32" cy="27" r="6.5" fill="#08081a" stroke="var(--c2)" stroke-width="1.5"/>
          <circle cx="48" cy="27" r="6.5" fill="#08081a" stroke="var(--c2)" stroke-width="1.5"/>
          <circle cx="33" cy="26" r="3.2" fill="var(--c2)"/>
          <circle cx="49" cy="26" r="3.2" fill="var(--c2)"/>
          <circle cx="34.2" cy="24.8" r="1.2" fill="white" opacity=".85"/>
          <circle cx="50.2" cy="24.8" r="1.2" fill="white" opacity=".85"/>
          <polygon points="40,33 37,37 43,37" fill="var(--accent)"/>
          <ellipse cx="19" cy="53" rx="7" ry="11" fill="var(--accent)" opacity=".15" transform="rotate(-12 19 53)"/>
          <ellipse cx="61" cy="53" rx="7" ry="11" fill="var(--accent)" opacity=".15" transform="rotate(12 61 53)"/>
          <g stroke="var(--accent)" stroke-width="1.8">
            <line x1="32" y1="68" x2="27" y2="75"/><line x1="32" y1="68" x2="32" y2="76"/>
            <line x1="32" y1="68" x2="37" y2="75"/>
            <line x1="48" y1="68" x2="43" y2="75"/><line x1="48" y1="68" x2="48" y2="76"/>
            <line x1="48" y1="68" x2="53" y2="75"/>
          </g>
        </svg>
        <div class="axie-msg" id="axie-msg">Hoot! Let's ace this 🎓</div>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="cd" id="cd"></div>
    <div class="xp-wrap" id="xp"></div>
  </div>
</div>

<div id="app"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
function loadS(){try{return JSON.parse(localStorage.getItem('apex-sessions')||'[]')}catch{return[]}}
function saveS(s){try{localStorage.setItem('apex-sessions',JSON.stringify(s))}catch{}}
function detectUnit(s){
  const tx=[s.title,s.summary,...(s.studyGuide?.keyTakeaways||[]),...(s.studyGuide?.sections||[]).map(x=>x.title+' '+(x.cards||[]).map(c=>c.title).join(' '))].join(' ').toLowerCase();
  let best=null,top=0;
  for(const u of UNITS){const sc=u.kw.filter(k=>tx.includes(k)).length;if(sc>top){top=sc;best=u;}}
  return best||UNITS[3];
}

let sessions=loadS().map(s=>s.unit?s:{...s,unit:detectUnit(s)});
let cur=null,tab='visual',htab='sessions';
let fcIdx=0,picks={},checked={},chatH=[],mcqP={};
let qScore=0,qTotal=0;

// ── THEME (must come after sessions is defined) ───────────────────────────
const PALETTE=['#f0c040','#4fc3f7','#a78bfa','#34d399','#fb7185','#c084fc','#ff8c42'];
let accent=localStorage.getItem('apex-accent')||'#f0c040';
const setAccent=c=>{accent=c;localStorage.setItem('apex-accent',c);document.documentElement.style.setProperty('--accent',c);updateHero();};
document.documentElement.style.setProperty('--accent',accent);

// ── XP & STREAK ───────────────────────────────────────────────────────────
let G=JSON.parse(localStorage.getItem('apex-g')||'{"xp":0,"lv":1,"streak":0,"last":"","sess":0,"cards":0,"quizzes":0}');
const saveG=()=>localStorage.setItem('apex-g',JSON.stringify(G));
const xpNeeded=l=>l*120;
function addXP(pts,msg){
  G.xp+=pts;
  while(G.xp>=xpNeeded(G.lv)){G.xp-=xpNeeded(G.lv);G.lv++;}
  saveG();toast(`+${pts} XP  ${msg}`);updateHero();
}
function checkStreak(){
  const td=new Date().toDateString(),yd=new Date(Date.now()-86400000).toDateString();
  if(G.last===td)return;
  G.streak=G.last===yd?G.streak+1:1;G.last=td;saveG();
}
function toast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2100);
}

function countdown(){

  const diff=exam-new Date();
  if(diff<=0)return{d:0,h:0,done:true};
  return{d:Math.floor(diff/86400000),h:Math.floor((diff%86400000)/3600000),done:false};
}

  {id:1,tag:'The foundation everything else is built on.',intro:'Before you can understand why the stock market moves or what the Fed does, you need to get comfortable with a few big ideas. Unit 1 is all about those fundamentals — and once these click, the rest of AP Macro starts to make sense.',secs:[{t:'Scarcity — the reason economics exists',b:'Here\'s the core problem: people want more than they can have. Resources — time, money, land, labor — are limited. Wants are not. That gap is called **scarcity**, and it\'s why every decision has a cost. Even choosing Netflix over studying has an opportunity cost.'},{t:'Opportunity cost — the real price of everything',b:'Every time you choose one thing, you give up another. That thing you give up is your **opportunity cost**. The true cost of any decision isn\'t just what you paid — it\'s what you didn\'t do instead.'},{t:'The PPC — a picture of what\'s possible',b:'The **Production Possibilities Curve** shows the maximum output a country can produce. On the curve = efficient. Inside = wasting resources. Outside = impossible. Outward shift = **economic growth**.'},{t:'Comparative advantage — why trade makes everyone richer',b:'Even if one country is better at producing everything, it still makes sense to trade. Focus on what you\'re **relatively** better at. Everyone ends up with more.'},{t:'Supply & demand — how markets find their price',b:'When price rises, buyers want less and sellers want more. When they meet, you get **equilibrium**. Master the shifters and you can predict almost any market outcome.'}],tip:'Unit 1 is 5–10% of the exam but runs through everything. Opportunity cost, PPC shifts, and comparative advantage appear in FRQs constantly.'},

async function callClaude(msgs,sys){
  if(!API_KEY){showSetup('Enter your API key to continue.');throw new Error('no-key');}
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'content-type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:MODEL,max_tokens:4000,system:sys,messages:msgs})
  });
  if(r.status===401){localStorage.removeItem('apex-key');API_KEY='';showSetup('❌ Invalid API key — please re-enter a valid key from console.anthropic.com');throw new Error('401');}
  if(!r.ok)throw new Error(`API ${r.status}: ${(await r.text()).slice(0,200)}`);
  return(await r.json()).content.filter(b=>b.type==='text').map(b=>b.text).join('');
}

async function doGen(){
  const tx=$('tx')?.value?.trim();if(!tx)return;
  $('gb').disabled=true;$('gl').style.display='flex';$('ge').textContent='';
  try{
    const sys=`You are an expert AP Macroeconomics tutor. Given a lecture transcript, respond ONLY with valid JSON — no markdown fences:
{"title":"concise title","summary":"2-3 sentence plain-English summary","instructorGrade":{"score":85,"rationale":"2-3 honest sentences. Score 1-100: clarity of explanations (40pts), use of examples (20pts), AP concept coverage (20pts), student engagement (20pts)."},"studyGuide":{"keyTakeaways":["...","...","...","..."],"sections":[{"title":"Section Title","cards":[{"label":"label","title":"Card Title","bullets":["point with **bold** key terms","another point"]},{"label":"label","title":"Card Title","text":"prose with **bold** key terms"}],"formulas":[{"eq":"formula","label":"what it means"}]}],"formulas":[{"eq":"formula","label":"description"}]},"flashcards":[{"term":"...","definition":"...","example":"..."}],"quiz":[{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"answer":"A","explanation":"..."}],"resources":[{"name":"...","url":"...","why":"..."}]}
Rules: 2-3 sections, 2-3 cards each. 4 takeaways. 3-5 global formulas. 6 flashcards. 5 quiz questions (answer = single letter). 3 resources. Be honest and specific in instructor grade.`;
    const raw=await callClaude([{role:'user',content:`Transcript:\n${tx.slice(0,6000)}`}],sys);
    const parsed=JSON.parse(raw.replace(/^```json|^```|```$/gm,'').trim());
    const s={id:Date.now(),date:new Date().toLocaleDateString(),transcript:tx,...parsed};
    s.unit=detectUnit(s);sessions.unshift(s);saveS(sessions);
    checkStreak();G.sess++;addXP(50,'New session!');
    axieSay('New session ready! Time to study 🦉');
    openSess(0);
  }catch(err){
    if(err.message!=='401'&&err.message!=='no-key'){$('ge').textContent='Error: '+err.message;}
    $('gb').disabled=false;$('gl').style.display='none';
  }
}

function renderTab(){
  const el=$('tc');if(!el)return;

  if(tab==='visual')el.innerHTML=renderVisual(s.studyGuide);
  else if(tab==='flashcards')el.innerHTML=renderFC(s.flashcards);
  else if(tab==='quiz')el.innerHTML=renderQuiz(s.quiz);
  else if(tab==='apexam')el.innerHTML=renderAPX(s);

}

function pickQ(qi,l){
  if(checked[qi])return;picks[qi]=l;
  document.querySelectorAll(`[id^="op-${qi}-"]`).forEach((el,oi)=>{
    const x='ABCD'[oi];
    el.style.background=x===l?'rgba(79,195,247,.09)':'transparent';
    el.style.borderColor=x===l?'#4fc3f7':'var(--bdr)';
    el.style.color=x===l?'#4fc3f7':'var(--soft)';
  });
  const b=$(`cb-${qi}`);if(b)b.style.display='inline-block';
}
function checkQ(qi,correct,enc){
  checked[qi]=true;const ch=picks[qi],ok=ch===correct;
  document.querySelectorAll(`[id^="op-${qi}-"]`).forEach((el,oi)=>{
    const x='ABCD'[oi];
    if(x===correct){el.style.background='rgba(52,211,153,.09)';el.style.borderColor='#34d399';el.style.color='#34d399';}
    else if(x===ch&&!ok){el.style.background='rgba(251,113,133,.09)';el.style.borderColor='#fb7185';el.style.color='#fb7185';}
    el.classList.add('locked');
  });
  const b=$(`cb-${qi}`);if(b)b.style.display='none';
  const ex=$(`ex-${qi}`);if(ex){ex.style.display='block';ex.innerHTML=(ok?'✅ ':'❌ ')+e(decodeURIComponent(enc));}
  if(ok){qScore++;addXP(15,'Correct! 🎯');}else addXP(5,'Good try!');
  const qs=$('qs');if(qs)qs.textContent=`${qScore}/${Object.keys(checked).length} correct`;
  if(Object.keys(checked).length===qTotal){
    G.quizzes++;saveG();
    setTimeout(()=>{
      if(qScore===qTotal){confetti();}
      else if(qScore>=qTotal*.8)axieSay(`${qScore}/${qTotal} — Nearly perfect! 🌟`);
      else axieSay(`${qScore}/${qTotal} — Review the missed ones! 💪`);
    },400);
  }
}

// ── AP EXAM ───────────────────────────────────────────────────────────────

    <button class="btn-hi" onclick="genAPX()">Generate AP Exam Questions 📝</button>

async function genAPX(){
  $('apl').style.display='block';$('ape').textContent='';
  try{
    const sys=`You are an AP Macroeconomics exam writer trained on College Board standards. Respond ONLY with valid JSON:
{"frqs":[{"title":"FRQ title","points":5,"context":"1-2 sentence scenario","parts":[{"letter":"a","question":"Question text","points":2,"skill":"Knowledge|Application|Analysis","modelAnswer":"Complete model answer","rubric":"What earns full credit"}]}],"mcqs":[{"question":"stem","options":["A) ...","B) ...","C) ...","D) ..."],"answer":"A","skill":"Knowledge|Application|Analysis","explanation":"Why correct and others wrong"}]}
Rules: 2 FRQs with 2-3 parts each. 4 MCQs. Scenario-based. Use real AP Macro graphs. Be specific to lecture topics.`;
    const raw=await callClaude([{role:'user',content:`Session: ${cur.title}\nSummary: ${cur.summary}\nTopics: ${(cur.studyGuide?.sections||[]).map(x=>x.title).join(', ')}`}],sys);
    const parsed=JSON.parse(raw.replace(/^```json|^```|```$/gm,'').trim());
    cur.apExam=parsed;sessions=sessions.map(x=>x.id===cur.id?cur:x);saveS(sessions);
    addXP(20,'AP Exam unlocked! 🎓');$('tc').innerHTML=renderAPXContent(parsed);
  }catch(err){
    if(err.message!=='401'&&err.message!=='no-key'){$('ape').textContent='Error: '+err.message;}
    $('apl').style.display='none';
  }
}
function renderAPXContent(d){

  const frqs=(d.frqs||[]).map((frq,fi)=>`
    <div class="card fadein" style="border-left:3px solid var(--accent);margin-bottom:18px;padding:17px 19px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:10px;flex-wrap:wrap">
        <div>
          <div class="lbl" style="color:var(--accent);margin-bottom:4px">Free Response Question ${fi+1}</div>
          <div style="font-size:15px;font-weight:700;color:var(--txt)">${e(frq.title)}</div>
        </div>
        <div style="font-family:monospace;font-weight:700;color:var(--accent);background:rgba(240,192,64,.1);border:1px solid rgba(240,192,64,.3);padding:4px 12px;border-radius:3px;white-space:nowrap;font-size:13px">${frq.points} pts</div>
      </div>
      ${frq.context?`<div style="background:rgba(255,255,255,.025);border-left:2px solid var(--bdr2);padding:9px 13px;margin-bottom:13px;font-size:12px;color:var(--soft);line-height:1.65;font-style:italic;border-radius:0 4px 4px 0">${e(frq.context)}</div>`:''}
      ${(frq.parts||[]).map((p,pi)=>{const sc=SC[p.skill]||'#888';return`
        <div style="margin-bottom:15px;padding-bottom:15px;border-bottom:1px solid var(--bdr)">
          <div style="display:flex;gap:11px;margin-bottom:8px">
            <span style="font-family:monospace;font-size:14px;font-weight:700;color:var(--accent);flex-shrink:0;padding-top:1px">(${p.letter})</span>
            <div style="flex:1">
              <p style="font-size:13px;font-weight:600;color:var(--txt);margin:0 0 6px;line-height:1.5">${e(p.question)}</p>
              <div style="display:flex;gap:6px;flex-wrap:wrap">
                <span style="font-family:monospace;font-size:9px;color:${sc};background:${sc}18;border:1px solid ${sc}30;padding:2px 8px;border-radius:2px">${p.skill}</span>
                <span class="lbl">${p.points} pt${p.points>1?'s':''}</span>
              </div>
            </div>
          </div>
          <div id="fa-${fi}-${pi}" style="display:none;margin-left:25px">
            <div style="background:rgba(52,211,153,.05);border:1px solid rgba(52,211,153,.18);border-radius:var(--r6);padding:11px 14px;margin-bottom:7px">
              <div class="lbl" style="color:#34d399;margin-bottom:5px">✅ Model Answer</div>
              <p style="font-size:12px;color:var(--soft);line-height:1.75;margin:0">${e(p.modelAnswer)}</p>
            </div>
            <div style="background:rgba(240,192,64,.04);border:1px solid rgba(240,192,64,.18);border-radius:var(--r6);padding:10px 14px">
              <div class="lbl" style="color:var(--accent);margin-bottom:4px">📋 AP Rubric Hint</div>
              <p style="font-size:12px;color:var(--soft);line-height:1.65;margin:0">${e(p.rubric)}</p>
            </div>
          </div>
          <button class="btn" onclick="togFRQ('fa-${fi}-${pi}',this)" style="margin-top:8px;margin-left:25px;font-size:11px;color:var(--mut)">Show Model Answer</button>
        </div>`;}).join('')}
    </div>`).join('');
  const mcqs=(d.mcqs||[]).map((q,i)=>{const sc=SC[q.skill]||'#888';return`
    <div class="card fadein" style="border-left:3px solid var(--c3);margin-bottom:11px;padding:15px 18px">
      <div style="display:flex;gap:10px;margin-bottom:11px">
        <span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--c3);flex-shrink:0">${i+1}.</span>
        <div>
          <p style="font-size:13px;font-weight:600;color:var(--txt);margin:0 0 7px;line-height:1.5">${e(q.question)}</p>
          <span style="font-family:monospace;font-size:9px;color:${sc};background:${sc}18;border:1px solid ${sc}30;padding:2px 8px;border-radius:2px">${q.skill}</span>
        </div>
      </div>
      <div>${(q.options||[]).map((opt,oi)=>`<div id="mop-${i}-${oi}" class="qopt" onclick="pickM(${i},'${opt[0]}')" style="margin-left:22px">${e(opt)}</div>`).join('')}</div>
      <div style="margin-left:22px;margin-top:8px"><button id="mcb-${i}" class="btn-hi" style="display:none;font-size:11px;padding:6px 14px" onclick="checkM(${i},'${q.answer}','${encodeURIComponent(q.explanation)}')">Check ✓</button></div>
      <div id="mex-${i}" style="display:none;margin-top:10px;margin-left:22px;font-size:12px;color:var(--soft);border-top:1px solid var(--bdr);padding-top:10px;line-height:1.7"></div>
    </div>`;}).join('');
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px">
    <div><div class="lbl" style="color:var(--accent);margin-bottom:3px">Free Response Questions 📝</div><p style="font-size:12px;color:var(--mut)">Write your answer first, then reveal the model</p></div>
    <button class="btn" onclick="cur.apExam=null;renderTab()" style="font-size:11px;color:var(--mut)">🔄 Regenerate</button>
  </div>${frqs}

function togFRQ(id,btn){const el=$(id);if(!el)return;const sh=el.style.display!=='none';el.style.display=sh?'none':'block';btn.textContent=sh?'Show Model Answer':'Hide Model Answer';if(!sh)addXP(10,'Model answer reviewed!');}
function pickM(qi,l){
  if(mcqP[qi+'_c'])return;mcqP[qi]=l;
  document.querySelectorAll(`[id^="mop-${qi}-"]`).forEach((el,oi)=>{const x='ABCD'[oi];el.style.background=x===l?'rgba(167,139,250,.09)':'transparent';el.style.borderColor=x===l?'#a78bfa':'var(--bdr)';el.style.color=x===l?'#a78bfa':'var(--soft)';});
  const b=$(`mcb-${qi}`);if(b)b.style.display='inline-block';
}
function checkM(qi,correct,enc){
  mcqP[qi+'_c']=true;const ch=mcqP[qi],ok=ch===correct;
  document.querySelectorAll(`[id^="mop-${qi}-"]`).forEach((el,oi)=>{const x='ABCD'[oi];if(x===correct){el.style.background='rgba(52,211,153,.09)';el.style.borderColor='#34d399';el.style.color='#34d399';}else if(x===ch&&!ok){el.style.background='rgba(251,113,133,.09)';el.style.borderColor='#fb7185';el.style.color='#fb7185';}el.style.cursor='default';});
  const b=$(`mcb-${qi}`);if(b)b.style.display='none';
  const ex=$(`mex-${qi}`);if(ex){ex.style.display='block';ex.innerHTML=(ok?'✅ ':'❌ ')+e(decodeURIComponent(enc));}
  addXP(ok?15:5,ok?'AP MCQ correct! 🎯':'Keep going!');
}

// ── GAPS ──────────────────────────────────────────────────────────────────
function renderGaps(s){

  return`<div style="text-align:center;padding:2.5rem 1rem">
    <div style="font-size:52px;margin-bottom:14px">🔍</div>
    <div class="lbl" style="color:var(--c5);margin-bottom:8px">Gap Analysis</div>
    <p style="font-size:13px;color:var(--soft);max-width:360px;margin:0 auto 20px;line-height:1.75">Axie will analyze this session and flag what was missed, what's likely on the AP exam, and what to study next.</p>
    <button class="btn-hi" onclick="genGaps()">Analyze Gaps 🔍</button>
    <div id="gapl" style="display:none;margin-top:14px;font-size:13px;color:var(--mut)">Axie is analyzing…</div>
    <div id="gape" class="err" style="margin-top:8px"></div>
  </div>`;
}
async function genGaps(){
  $('gapl').style.display='block';$('gape').textContent='';
  try{
    const sys=`You are an AP Macroeconomics exam expert. Analyze this session and respond ONLY with valid JSON:
{"gaps":[{"type":"missed|exam|review","title":"topic","description":"what and why"}],"watchouts":["short specific exam watch-out"],"nextSession":"one sentence recommendation"}
2-4 gaps, 3-5 watchouts. Be honest and specific. Types: missed=not covered, exam=likely on AP exam, review=needs clarification.`;
    const raw=await callClaude([{role:'user',content:`Session: ${cur.title}\nSummary: ${cur.summary}\nTopics: ${(cur.studyGuide?.sections||[]).map(x=>x.title).join(', ')}\nTranscript: ${(cur.transcript||'').slice(0,3000)}`}],sys);
    const parsed=JSON.parse(raw.replace(/^```json|^```|```$/gm,'').trim());
    cur.gaps=parsed;sessions=sessions.map(x=>x.id===cur.id?cur:x);saveS(sessions);
    addXP(15,'Gap analysis done!');$('tc').innerHTML=renderGapsContent(parsed);
  }catch(err){if(err.message!=='401'&&err.message!=='no-key'){$('gape').textContent='Error: '+err.message;}$('gapl').style.display='none';}
}
function renderGapsContent(d){
  const TS={missed:{col:'#fb7185',bg:'rgba(251,113,133,.08)',lbl:'❌ Not Covered'},exam:{col:'#f0c040',bg:'rgba(240,192,64,.08)',lbl:'⚡ AP Exam Topic'},review:{col:'#4fc3f7',bg:'rgba(79,195,247,.08)',lbl:'📖 Needs Clarification'}};
  return`<div style="margin-bottom:24px">
    <div class="lbl" style="margin-bottom:13px">Gaps &amp; Missing Coverage</div>
    ${(d.gaps||[]).map(g=>{const ts=TS[g.type]||TS.review;return`<div class="card fadein" style="border-left:3px solid ${ts.col};margin-bottom:9px;padding:13px 17px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
        <span style="font-family:monospace;font-size:9px;color:${ts.col};background:${ts.col}18;border:1px solid ${ts.col}30;padding:2px 8px;border-radius:2px">${ts.lbl}</span>

    ${(d.watchouts||[]).map((w,i)=>`<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr)">
      <span style="font-family:monospace;font-size:11px;color:var(--accent);min-width:18px;padding-top:1px">${i+1}</span>

    </div>`).join('')}
  </div>
  ${d.nextSession?`<div class="tip-box"><div class="lbl" style="color:var(--c4);margin-bottom:6px">🦉 Axie's Recommendation</div><p style="font-size:13px;color:var(--soft);line-height:1.65;margin:0">${e(d.nextSession)}</p></div>`:''}
  <button class="btn" onclick="cur.gaps=null;renderTab()" style="margin-top:14px;font-size:11px;color:var(--mut)">Re-analyze</button>`;
}

// ── CHAT ──────────────────────────────────────────────────────────────────
function renderChat(){
  chatH=[];
  return`<div class="lbl" style="margin-bottom:13px">🦉 Ask Axie Anything</div>
  <div id="cm" style="display:flex;flex-direction:column;gap:11px;min-height:80px;margin-bottom:14px">
    <div class="card fadein" style="border-left:3px solid var(--c3);padding:13px 16px">
      <p style="margin:0;font-size:13px;color:var(--soft);line-height:1.65">Ask me anything about this lecture or AP Macro! I'll keep answers short, clear, and useful. 🦉</p>
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <input id="ci" placeholder="Ask Axie a question…" onkeydown="if(event.key==='Enter')doChat()" style="flex:1;padding:11px 14px;font-size:13px;border-radius:var(--r6);border:1px solid var(--bdr2);background:var(--surf);color:var(--txt);outline:none;transition:border-color .2s" onfocus="this.style.borderColor='var(--bdr2)'" onblur="this.style.borderColor='var(--bdr)'"/>
    <button class="btn-hi" onclick="doChat()" style="padding:11px 18px">Ask 🦉</button>
  </div>
  <div id="cb2" style="display:none;font-size:11px;color:var(--mut);font-style:italic;margin-top:7px">Axie is thinking…</div>`;
}
function fmtChat(t){
  return t.split('\n').filter(l=>l.trim()).map(l=>{
    const b=l.trim().startsWith('-')||l.trim().startsWith('•')||l.trim().startsWith('*');
    return b?`<div class="chat-bline"><span class="arr">▸</span><span style="font-size:13px;color:var(--mid);line-height:1.65">${e(l.replace(/^[-•*]\s*/,''))}</span></div>`:`<p style="margin:0 0 5px;font-size:13px;color:var(--mid);line-height:1.65">${e(l)}</p>`;
  }).join('');
}
async function doChat(){
  const inp=$('ci');const msg=inp?.value?.trim();if(!msg)return;inp.value='';
  chatH.push({role:'user',content:msg});
  const cm=$('cm');
  cm.innerHTML+=`<div style="display:flex;justify-content:flex-end"><div class="bubble-u fadein">${e(msg)}</div></div>`;
  const busy=$('cb2');if(busy)busy.style.display='block';
  try{
    const sys=`You are Axie, a friendly AP Macro tutor owl 🦉 helping a high school student named CoCo. Give SHORT bullet-point answers — max 4 bullets, each under 15 words. One direct sentence first, then bullets. Plain English, no jargon without explanation. Be warm and encouraging. Lecture: ${cur.summary}`;
    const rep=await callClaude(chatH,sys);
    chatH.push({role:'assistant',content:rep});
    cm.innerHTML+=`<div style="display:flex;justify-content:flex-start;gap:8px;align-items:flex-start">
      <span style="font-size:18px;flex-shrink:0;margin-top:2px">🦉</span>
      <div class="bubble-a fadein">${fmtChat(rep)}</div>
    </div>`;
    addXP(5,'Question asked!');
  }catch(err){cm.innerHTML+=`<div style="color:var(--c5);font-size:12px">${e(err.message)}</div>`;}
  if(busy)busy.style.display='none';
  cm.scrollTop=cm.scrollHeight;
}

// ── NOTION ────────────────────────────────────────────────────────────────
function buildNotion(s){
  const gr=s.instructorGrade;
  return['Please save this study session to Notion as a structured page.',
    `Title: ${s.title} — AP Macro [${s.date}]`,    `Unit: Unit ${s.unit?.id} — ${s.unit?.lbl||s.unit?.label||''}`,
    `Summary: ${s.summary}`,gr?`Instructor Grade: ${gr.score}/100 — ${gr.rationale}`:'',
    '','KEY TAKEAWAYS:',...(s.studyGuide?.keyTakeaways||[]).map((t,i)=>`${i+1}. ${t}`),
    '','SECTIONS:',...(s.studyGuide?.sections||[]).flatMap(sec=>[`## ${sec.title}`,...(sec.cards||[]).map(c=>`- ${c.title}: ${c.bullets?.join('; ')||c.text||''}`),...(sec.formulas||[]).map(f=>`Formula: ${f.eq} — ${f.label||''}`)]),
    '','FORMULAS:',...(s.studyGuide?.formulas||[]).map(f=>`${f.eq} — ${f.label||''}`),
    '','FLASHCARDS:',...(s.flashcards||[]).map((f,i)=>`${i+1}. ${f.term}: ${f.definition}`),
    '','QUIZ:',...(s.quiz||[]).map((q,i)=>`${i+1}. ${q.question} [${q.answer}] ${q.explanation}`),

  ].filter(Boolean).join('\n');
}
