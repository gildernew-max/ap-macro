m of exchange, unit of account, store of value.","**Commodity money**: intrinsic value (gold coins). **Fiat money**: government decree only (modern currency)."]},{"label":"T-Accounts","title":"Bank Balance Sheets","bullets":["Assets (left): Reserves (required + excess) + Loans + Securities.","Liabilities (right): Deposits (what the bank owes depositors).","When a bank makes a loan: new asset (loan) + new liability (borrower's deposit) \u2014 money created.","Assets = Liabilities + Net Worth. Always balanced."]}],"formulas":[{"eq":"Required Reserves = Deposits \u00d7 Reserve Requirement","label":""},{"eq":"Excess Reserves = Total Reserves \u2212 Required Reserves","label":"What can be lent"}]},{"title":"The Money Multiplier","cards":[{"label":"The Math","title":"How Banks Create Money","bullets":["Bank A gets $1,000 deposit. Holds 10% ($100), lends $900.","Bank B gets $900 deposit. Holds $90, lends $810.","Chain continues until all excess reserves are lent out.","**Money Multiplier = 1 / RR**. Total money created = initial deposit \u00d7 multiplier."]},{"label":"Important Limits","title":"What Reduces the Multiplier","bullets":["Banks hold **excess reserves** (don't lend all they can) \u2192 actual multiplier < theoretical max.","People hold **cash** instead of depositing \u2192 reduces the deposit base.","The money multiplier gives the **maximum** potential expansion, not guaranteed expansion.","During financial crises, banks hoard excess reserves \u2014 multiplier collapses."]}],"formulas":[{"eq":"Money Multiplier = 1 / RR","label":""},{"eq":"Max money created = Initial Deposit \u00d7 (1/RR)","label":""},{"eq":"Amount lent = Initial Deposit \u00d7 (1 \u2212 RR)","label":"First bank lends this"}]}],"formulas":[{"eq":"Money Multiplier = 1 / Reserve Requirement","label":""},{"eq":"Max money created = Deposit \u00d7 Multiplier","label":""},{"eq":"Required Reserves = Deposits \u00d7 RR","label":""},{"eq":"Excess Reserves = Total \u2212 Required","label":""}]},"quiz":[{"question":"A bank receives a new deposit of $5,000. The reserve requirement is 20%. How much can this bank immediately lend?","options":["A) $1,000","B) $4,000","C) $5,000","D) $25,000"],"answer":"B","explanation":"Required reserves = $5,000 \u00d7 20% = $1,000. Excess reserves = $5,000 \u2212 $1,000 = $4,000. The first bank can lend $4,000 \u2014 which becomes a deposit at another bank, and so on.","topic":"money_banking"},{"question":"If the reserve requirement is 10%, the money multiplier is:","options":["A) 0.1","B) 1","C) 5","D) 10"],"answer":"D","explanation":"Money multiplier = 1/RR = 1/0.10 = 10. A $1,000 deposit with a 10% reserve requirement can support up to $10,000 in total money creation throughout the banking system.","topic":"money_multiplier"},{"question":"A bank's T-account shows: Assets = $500,000 in reserves + $1,500,000 in loans. Liabilities = $2,000,000 in deposits. The reserve requirement is 20%. How much can this bank lend?","options":["A) $0 \u2014 the bank is already at its lending limit","B) $100,000","C) $400,000","D) $500,000"],"answer":"B","explanation":"Required reserves = $2,000,000 \u00d7 20% = $400,000. Actual reserves = $500,000. Excess reserves = $500,000 \u2212 $400,000 = $100,000. The bank can lend an additional $100,000.","topic":"t_accounts"},{"question":"Which of the following reduces the actual money multiplier below its theoretical maximum?","options":["A) Banks increasing their loans","B) The Fed purchasing government bonds","C) Households depositing more cash into banks","D) Banks holding excess reserves rather than lending them out"],"answer":"D","explanation":"The theoretical multiplier assumes banks lend all excess reserves. When banks hold excess reserves (e.g., during a financial crisis), each deposit injection creates less money \u2014 the actual multiplier falls below 1/RR.","topic":"money_multiplier"},{"question":"Which of the following is included in M1 but NOT in M2?","options":["A) Savings accounts","B) Money market mutual fund accounts","C) Checking account balances","D) Small certificates of deposit"],"answer":"C","explanation":"M1 includes currency + checking accounts (demand deposits). M2 includes all of M1 plus savings accounts, money market funds, and small CDs. Checking accounts are in M1 (and therefore also M2); the other options are M2-only additions. Trick: nothing is in M1 but NOT M2 \u2014 M2 contains M1. The question is checking if you know what's in M1.","topic":"money_banking"}],"unit":{"id":4,"lbl":"Financial Sector","col":"#34d399","ex":"18\u201323%","em":"\ud83c\udfe6"}},{"id":2011,"isDefault":true,"date":"2024-01-04T09:00:00.000Z","title":"4.2 \u2014 Federal Reserve Tools & Monetary Policy","summary":"The Fed controls the money supply and interest rates \u2014 the most powerful macroeconomic force in the US economy. This session covers all three tools, the loanable funds market, and the complete policy chain the AP exam loves.","studyGuide":{"keyTakeaways":["Open market operations (OMO) are the Fed's primary tool: buy bonds \u2192 money supply \u2191 \u2192 rates \u2193.","Expansionary: buy bonds / lower discount rate / lower RR \u2192 \u2191MS \u2192 \u2193r \u2192 \u2191I \u2192 AD right.","In the loanable funds market, real interest rate equilibrates saving (supply) and investment (demand).","Crowding out: deficit spending \u2192 \u2191demand for loanable funds \u2192 \u2191real rates \u2192 \u2193private investment."],"sections":[{"title":"The Fed's Three Tools","cards":[{"label":"Primary Tool","title":"Open Market Operations (OMO)","bullets":["**Buy bonds**: Fed pays banks \u2192 bank reserves \u2191 \u2192 money supply \u2191 \u2192 interest rates \u2193.","**Sell bonds**: banks pay Fed \u2192 bank reserves \u2193 \u2192 money supply \u2193 \u2192 interest rates \u2191.","OMO is the most frequently used and most powerful of the three tools.","Federal funds rate = rate banks charge each other for overnight loans \u2014 the Fed's target rate."]},{"label":"Two More Tools","title":"Discount Rate & Reserve Requirements","bullets":["**Discount Rate**: rate at which banks borrow from the Fed. Lower rate \u2192 banks borrow more \u2192 MS \u2191.","**Reserve Requirements**: lower RR \u2192 banks keep less \u2192 lend more \u2192 money multiplier \u2191 \u2192 MS \u2191.","Reserve requirements rarely changed in practice \u2014 too disruptive.","**Interest on Reserves (IOR)**: newer tool \u2014 paying banks to hold reserves can limit lending."]}],"formulas":[{"eq":"Buy bonds \u2192 reserves\u2191 \u2192 MS\u2191 \u2192 r\u2193 \u2192 I\u2191 \u2192 AD right","label":"Expansionary chain"},{"eq":"Sell bonds \u2192 reserves\u2193 \u2192 MS\u2193 \u2192 r\u2191 \u2192 I\u2193 \u2192 AD left","label":"Contractionary chain"}]},{"title":"Loanable Funds Market","cards":[{"label":"The Market","title":"Supply, Demand, and Real Interest Rate","bullets":["**Supply of loanable funds**: savings \u2014 upward sloping (higher real rate \u2192 more saving).","**Demand for loanable funds**: borrowing for investment \u2014 downward sloping (lower rate \u2192 more borrowing).","**Real interest rate** = price that equilibrates saving and investment.","**Shifts in supply**: \u2191 household savings, \u2191 government surplus \u2192 supply right \u2192 rates fall.","**Shifts in demand**: \u2191 investment opportunities, \u2191 government deficit \u2192 demand right \u2192 rates rise."]},{"label":"Crowding Out","title":"Deficits and the Loanable Funds Market","text":"When the government runs a deficit, it must borrow \u2192 demand for loanable funds increases \u2192 real interest rate rises \u2192 private investment is 'crowded out.' This partially offsets the stimulus effect of fiscal expansion. Budget surplus does reverse: crowding IN \u2014 rates fall, investment rises. This is why some economists prefer monetary policy (doesn't crowd out) over fiscal policy."}],"formulas":[{"eq":"Deficit \u2192 \u2191demand for loanable funds \u2192 \u2191real rate \u2192 \u2193investment","label":"Crowding out"},{"eq":"Surplus \u2192 \u2193demand \u2192 \u2193real rate \u2192 \u2191investment","label":"Crowding in"}]}],"formulas":[{"eq":"Expansionary: buy bonds \u2192 MS\u2191 \u2192 r\u2193 \u2192 I\u2191 \u2192 AD right","label":""},{"eq":"Contractionary: sell bonds \u2192 MS\u2193 \u2192 r\u2191 \u2192 I\u2193 \u2192 AD left","label":""},{"eq":"Crowding out: \u2191deficit \u2192 \u2191real rate \u2192 \u2193private investment","label":""},{"eq":"Federal funds rate = overnight interbank lending rate","label":""}]},"quiz":[{"question":"The Federal Reserve sells government bonds. The most likely immediate effect is:","options":["A) Bank reserves increase and interest rates fall","B) Bank reserves decrease and interest rates rise","C) The money supply increases and AD shifts right","D) The federal funds rate decreases"],"answer":"B","explanation":"When the Fed sells bonds, banks pay for them with reserves \u2192 bank reserves decrease \u2192 less money available to lend \u2192 money supply contracts \u2192 interest rates rise. This is contractionary monetary policy.","topic":"fed_tools"},{"question":"Which Federal Reserve action would be MOST expansionary?","options":["A) Raising the reserve requirement from 10% to 15%","B) Selling $50B in government securities","C) Lowering the discount rate from 5% to 3%","D) Raising the federal funds rate target"],"answer":"C","explanation":"Lowering the discount rate makes it cheaper for banks to borrow from the Fed \u2192 banks borrow more \u2192 lend more \u2192 money supply expands \u2192 interest rates fall \u2192 AD shifts right. The other options are all contractionary.","topic":"fed_tools"},{"question":"In the loanable funds market, an increase in government borrowing (larger deficit) causes:","options":["A) Supply of loanable funds to increase, lowering real interest rates","B) Demand for loanable funds to increase, raising real interest rates","C) Supply of loanable funds to decrease, raising real interest rates","D) No change \u2014 government borrowing doesn't affect private markets"],"answer":"B","explanation":"Government deficits require borrowing \u2192 the government enters the loanable funds market as a borrower \u2192 demand increases \u2192 real interest rate rises \u2192 this is the mechanism behind crowding out.","topic":"loanable_funds"},{"question":"The economy is overheating with rising inflation. Which combination of policies would be most appropriate?","options":["A) Fed buys bonds; government cuts taxes","B) Fed sells bonds; government increases spending","C) Fed raises the discount rate; government reduces spending","D) Fed lowers reserve requirements; government increases transfer payments"],"answer":"C","explanation":"To fight inflation, both monetary and fiscal policy should be contractionary. Raising the discount rate (Fed) reduces the money supply and raises rates. Reducing government spending (fiscal) shifts AD left. Both cool the overheating economy.","topic":"fed_tools"},{"question":"The crowding out effect suggests that expansionary fiscal policy is LESS effective when:","options":["A) The economy is in a deep recession with high unemployment","B) Investment is highly sensitive to changes in real interest rates","C) The money supply is growing rapidly","D) The economy has high levels of private saving"],"answer":"B","explanation":"Crowding out is more severe when investment is highly interest-rate sensitive \u2014 even a small rise in real rates from government borrowing causes large falls in private investment. In a deep recession with idle resources, investment may be insensitive to rates, making crowding out minimal.","topic":"loanable_funds"}],"unit":{"id":4,"lbl":"Financial Sector","col":"#34d399","ex":"18\u201323%","em":"\ud83c\udfe6"}},{"id":2012,"isDefault":true,"date":"2024-01-05T08:00:00.000Z","title":"5.1 \u2014 The Phillips Curve & Stagflation","summary":"The Phillips Curve is the mirror image of AS/AD. It shows the short-run trade-off between inflation and unemployment \u2014 and why that trade-off disappears in the long run. Stagflation breaks it entirely.","studyGuide":{"keyTakeaways":["SRPC: inverse relationship between unemployment and inflation \u2014 moving along it reflects AD shifts.","LRPC: vertical at the NRU \u2014 no long-run trade-off exists.","SRPC shifts right with higher inflationary expectations or supply shocks (stagflation).","SRPC left shift = SRAS right shift; SRPC right shift = SRAS left shift \u2014 always mirrored."],"sections":[{"title":"The Short-Run Phillips Curve","cards":[{"label":"The Trade-Off","title":"SRPC Shape and Movement","bullets":["**Downward-sloping** SRPC: lower unemployment comes with higher inflation.","Movement **along** SRPC: caused by AD shifts (expansionary policy \u2192 lower U, higher \u03c0).","At full employment (NRU): on the SRPC at the natural rate of unemployment.","SRPC and AS/AD are mirror images: AD right \u2192 move up-left on SRPC (lower U, higher \u03c0)."]},{"label":"Shifting the SRPC","title":"What Moves the Curve Itself","bullets":["**SRPC shifts RIGHT**: higher inflationary expectations, supply shocks \u2192 MORE inflation at every unemployment rate.","**SRPC shifts LEFT**: lower inflationary expectations, positive supply shocks \u2192 LESS inflation at every unemployment rate.","**Stagflation** (1970s oil shock): SRAS left \u2192 SRPC right \u2192 unemployment AND inflation both rise simultaneously.","Shifts in SRPC mirror shifts in SRAS \u2014 always."]}],"formulas":[{"eq":"AD right \u2192 move up-left on SRPC (\u2193U, \u2191\u03c0)","label":""},{"eq":"SRAS left \u2192 SRPC right (stagflation)","label":""}]},{"title":"The Long-Run Phillips Curve","cards":[{"label":"No Trade-Off","title":"The LRPC is Vertical","bullets":["In the long run, wages and prices fully adjust \u2192 no real trade-off between inflation and unemployment.","**LRPC is vertical** at the Natural Rate of Unemployment (NRU).","Attempts to push unemployment permanently below NRU \u2192 accelerating inflation, not lower unemployment.","Long-run result of expansionary policy: higher price level, same output and unemployment."]},{"label":"Expectations","title":"How Expectations Shift the SRPC","bullets":["If workers expect higher inflation, they demand higher wages \u2192 SRAS shifts left \u2192 SRPC shifts right.","Policy becomes less effective over time as expectations adjust.","**Credible anti-inflation policy** (Volcker 1979-82) can shift SRPC left \u2014 but at the cost of recession."]}],"formulas":[{"eq":"LRPC: vertical at NRU","label":""},{"eq":"Higher expectations \u2192 SRPC shifts right","label":""},{"eq":"Return to NRU in LR: no permanent unemployment-inflation trade-off","label":""}]}],"formulas":[{"eq":"AD\u2191 \u2192 move up-left on SRPC","label":""},{"eq":"SRAS\u2193 \u2192 SRPC shifts right (stagflation)","label":""},{"eq":"LRPC vertical at NRU","label":""},{"eq":"Long-run: policy \u2192 \u2191\u03c0, same U","label":""}]},"quiz":[{"question":"The government increases spending, which shifts AD to the right. On the SRPC, this causes:","options":["A) A rightward shift of the SRPC","B) Movement up and to the left along the SRPC","C) Movement down and to the right along the SRPC","D) A leftward shift of the SRPC"],"answer":"B","explanation":"AD shifting right causes output to rise above potential and unemployment to fall \u2192 this is movement up-left along a FIXED SRPC (lower unemployment, higher inflation). The SRPC itself doesn't shift \u2014 that requires changes in expectations or supply shocks.","topic":"phillips_curve"},{"question":"A sharp rise in global oil prices would most likely cause:","options":["A) Movement up-left along the SRPC to lower unemployment","B) The SRPC to shift left, reducing inflation at every unemployment rate","C) The SRPC to shift right, increasing inflation at every unemployment rate","D) Movement down-right along the SRPC to lower inflation"],"answer":"C","explanation":"An oil price spike is a negative supply shock \u2014 SRAS shifts left. This mirrors as the SRPC shifting right: at every unemployment rate, inflation is now higher. Unemployment AND inflation rise simultaneously \u2014 stagflation.","topic":"phillips_curve"},{"question":"The Long-Run Phillips Curve (LRPC) is vertical because:","options":["A) Prices are fixed in the long run, eliminating any trade-off","B) In the long run, all prices and wages adjust, so there is no permanent unemployment-inflation trade-off","C) Government policy is always perfectly effective at stabilizing the economy","D) The economy always returns to zero unemployment in the long run"],"answer":"B","explanation":"In the long run, wages and prices adjust fully. Workers demand higher wages when prices rise, eliminating the real wage effect that creates the short-run trade-off. The LRPC is vertical at the NRU \u2014 no policy can permanently lower unemployment below it without accelerating inflation.","topic":"phillips_curve"},{"question":"Stagflation is best represented on a Phillips Curve diagram as:","options":["A) Movement up and to the left along a stable SRPC","B) A rightward shift of the SRPC, with the economy at higher inflation and higher unemployment","C) A leftward shift of the SRPC, showing improved conditions","D) Movement down and to the right along the SRPC"],"answer":"B","explanation":"Stagflation = high unemployment + high inflation simultaneously. This can't happen from a movement along the SRPC (which trades one for the other). It requires the SRPC to shift right \u2014 reflecting a worsened trade-off from a supply shock or higher expectations.","topic":"phillips_curve"},{"question":"If workers successfully anticipate future inflation and demand higher wages, the most likely result is:","options":["A) The LRPC shifts to the right","B) The SRPC shifts to the right, worsening the inflation-unemployment trade-off","C) The SRPC shifts to the left, improving economic conditions","D) The economy moves down and to the right along the existing SRPC"],"answer":"B","explanation":"When workers anticipate inflation and demand higher wages \u2192 labor costs rise \u2192 SRAS shifts left \u2192 SRPC shifts right. The economy faces a worse trade-off: same unemployment now comes with higher inflation. This is why credible low-inflation policy is important for shifting expectations.","topic":"phillips_curve"}],"unit":{"id":5,"lbl":"Long-Run Policy","col":"#fb7185","ex":"20\u201330%","em":"\ud83d\udcc8"}},{"id":2013,"isDefault":true,"date":"2024-01-05T09:00:00.000Z","title":"5.2 \u2014 Crowding Out, MV=PY & Long-Run Growth","summary":"Three big long-run ideas: why government deficits can hurt growth, why printing money causes inflation, and what actually makes an economy richer over decades. All three appear regularly on the AP exam.","studyGuide":{"keyTakeaways":["Crowding out: deficit \u2192 \u2191loanable funds demand \u2192 \u2191real rates \u2192 \u2193private investment.","MV = PY: excess money growth relative to real output \u2192 inflation. Know the logic, not just the formula.","Long-run growth = LRAS shifting right, driven by technology, capital, and human capital.","Supply-side policies target productive capacity (LRAS), not just demand (AD)."],"sections":[{"title":"Crowding Out & Crowding In","cards":[{"label":"The Mechanism","title":"How Deficits Affect Investment","bullets":["Government runs deficit \u2192 must borrow \u2192 enters loanable funds market as borrower.","Demand for loanable funds \u2191 \u2192 real interest rate \u2191.","Higher real rates \u2192 firms borrow less \u2192 **private investment \u2193** = crowded out.","Extent of crowding out depends on interest elasticity of investment."]},{"label":"Crowding In","title":"The Budget Surplus Effect","bullets":["Government surplus \u2192 government repays debt \u2192 demand for loanable funds \u2193.","Real interest rate \u2193 \u2192 private investment becomes cheaper \u2192 investment \u2191.","**Crowding in**: fiscal austerity can stimulate private investment in the long run.","AP Exam: always draw the loanable funds market and show the shift."]}],"formulas":[{"eq":"Deficit \u2192 \u2191demand LF \u2192 \u2191real rate \u2192 \u2193private investment","label":"Crowding out"},{"eq":"Surplus \u2192 \u2193demand LF \u2192 \u2193real rate \u2192 \u2191private investment","label":"Crowding in"}]},{"title":"Quantity Theory & Long-Run Growth","cards":[{"label":"MV = PY","title":"Money, Prices & Output","bullets":["**M** = money supply, **V** = velocity (times money turns over), **P** = price level, **Y** = real output.","If M grows faster than Y (with V constant): P must rise \u2192 **inflation**.","Classical view: in the long run, monetary policy affects only P, not Y.","Hyperinflation: governments print money to finance spending \u2192 M explodes \u2192 P explodes."]},{"label":"Real Growth","title":"What Shifts LRAS Right","bullets":["\u2191 **Technology**: most powerful long-run growth driver.","\u2191 **Physical capital**: more machines, factories, infrastructure.","\u2191 **Human capital**: education, training, better-skilled workers.","\u2191 **Natural resources** and \u2191 **Labor force** size.","**Supply-side policies**: tax incentives for investment, R&D subsidies, deregulation, education."]}],"formulas":[{"eq":"MV = PY \u2192 if \u0394M > \u0394Y and V stable \u2192 inflation","label":""},{"eq":"LRAS right shift = sources of economic growth","label":""}]}],"formulas":[{"eq":"MV = PY","label":"Quantity Theory of Money"},{"eq":"Excess money growth (\u0394M > \u0394Y) \u2192 inflation","label":""},{"eq":"Crowding out: deficit \u2192 \u2191real rate \u2192 \u2193investment","label":""},{"eq":"LRAS right: technology, capital, human capital","label":""}]},"quiz":[{"question":"According to the Quantity Theory of Money (MV = PY), if the money supply grows by 8% and real output grows by 3% (with velocity constant), the price level will approximately:","options":["A) Rise by 3%","B) Rise by 5%","C) Rise by 8%","D) Fall by 5%"],"answer":"B","explanation":"MV = PY \u2192 %\u0394M + %\u0394V = %\u0394P + %\u0394Y \u2192 8% + 0% = %\u0394P + 3% \u2192 %\u0394P \u2248 5%. Money growing faster than output causes prices to rise by the difference (assuming constant velocity).","topic":"quantity_theory"},{"question":"Government deficit spending is most likely to crowd out private investment when:","options":["A) The economy has substantial idle resources and low interest rates","B) Investment is highly sensitive to interest rate changes and loanable funds supply is inelastic","C) The central bank simultaneously increases the money supply","D) Consumer confidence is low and households are saving more"],"answer":"B","explanation":"Crowding out is strongest when investment is very interest-rate sensitive (elastic demand) and loanable funds supply is inelastic. A small increase in deficit borrowing raises real rates significantly, causing large investment cuts.","topic":"crowding_out"},{"question":"Which of the following would cause the Long-Run Aggregate Supply (LRAS) curve to shift to the RIGHT?","options":["A) An increase in government transfer payments","B) A cut in the federal funds rate","C) A major advance in AI-driven manufacturing technology","D) An increase in consumer spending from tax cuts"],"answer":"C","explanation":"LRAS shifts right with increases in productive capacity: technology (A is the biggest driver), physical capital, human capital, or natural resources. Transfer payments and interest rate cuts affect aggregate demand, not the supply-side capacity of the economy.","topic":"long_run_growth"},{"question":"A supply-side economist would most likely advocate for which policy to promote long-run growth?","options":["A) Increasing government spending on social programs","B) Reducing interest rates to stimulate borrowing","C) Cutting capital gains taxes to encourage investment in new businesses","D) Expanding the money supply to reduce real interest rates"],"answer":"C","explanation":"Supply-side policies target productive capacity \u2014 they aim to shift LRAS right by incentivizing investment, R&D, and work. Tax cuts on capital gains encourage business investment and entrepreneurship. The other options target aggregate demand (AD shifts), not long-run supply.","topic":"long_run_growth"},{"question":"A government switches from a budget deficit to a budget surplus. In the loanable funds market, this is most likely to:","options":["A) Increase the demand for loanable funds, raising real interest rates","B) Reduce the demand for loanable funds, lowering real interest rates","C) Increase the supply of loanable funds, raising real interest rates","D) Shift the supply of loanable funds left, increasing real interest rates"],"answer":"B","explanation":"A budget surplus means the government borrows less (or repays debt) \u2192 demand for loanable funds falls \u2192 real interest rate falls \u2192 private investment becomes cheaper \u2192 crowding in. This is the mechanism by which fiscal austerity can stimulate long-run investment.","topic":"crowding_out"}],"unit":{"id":5,"lbl":"Long-Run Policy","col":"#fb7185","ex":"20\u201330%","em":"\ud83d\udcc8"}},{"id":2014,"isDefault":true,"date":"2024-01-06T08:00:00.000Z","title":"6.1 \u2014 Exchange Rates & the Forex Market","summary":"When the dollar strengthens, US exports become expensive and imports get cheap. This session covers how exchange rates are determined, what makes them move, and how they connect to the broader macroeconomy.","studyGuide":{"keyTakeaways":["Dollar appreciates \u2192 exports \u2193 (more expensive abroad), imports \u2191 (cheaper) \u2192 Xn \u2193 \u2192 AD left.","Dollar depreciates \u2192 exports \u2191, imports \u2193 \u2192 Xn \u2191 \u2192 AD right.","Supply of dollars: Americans buying foreign goods/assets. Demand for dollars: foreigners buying US goods/assets.","Higher US interest rates \u2192 more demand for dollars \u2192 dollar appreciates."],"sections":[{"title":"The Forex Market","cards":[{"label":"How It Works","title":"Supply and Demand for Dollars","bullets":["**Demand for dollars**: foreigners who want to buy US goods, services, or assets.","**Supply of dollars**: Americans who want to buy foreign goods, services, or assets.","**Exchange rate**: price of one currency in terms of another (e.g., $/\u20ac).","**Appreciation**: dollar buys MORE foreign currency (stronger dollar).","**Depreciation**: dollar buys LESS foreign currency (weaker dollar)."]},{"label":"Shifts","title":"What Moves the Forex Market","bullets":["\u2191 US interest rates \u2192 US assets more attractive \u2192 **demand for dollars \u2191** \u2192 dollar appreciates.","\u2191 US inflation \u2192 US goods relatively more expensive \u2192 **demand for dollars \u2193** \u2192 dollar depreciates.","\u2191 Foreign income \u2192 foreigners buy more US goods \u2192 **demand for dollars \u2191** \u2192 dollar appreciates.","\u2191 US income \u2192 Americans buy more imports \u2192 **supply of dollars \u2191** \u2192 dollar depreciates."]}],"formulas":[{"eq":"Dollar demand \u2191 \u2192 appreciation","label":""},{"eq":"Dollar supply \u2191 \u2192 depreciation","label":""}]},{"title":"Exchange Rates & the Macroeconomy","cards":[{"label":"The Key Effects","title":"Appreciation vs. Depreciation \u2192 Net Exports","bullets":["**Dollar appreciates**: US exports cost MORE for foreigners \u2192 exports \u2193. Imports cost LESS for Americans \u2192 imports \u2191. Net exports (Xn) \u2193 \u2192 AD shifts LEFT.","**Dollar depreciates**: US exports cost LESS for foreigners \u2192 exports \u2191. Imports cost MORE for Americans \u2192 imports \u2193. Net exports \u2191 \u2192 AD shifts RIGHT.","Xn is in the GDP formula (C + Ig + G + Xn) \u2014 exchange rate changes directly affect GDP."]},{"label":"Purchasing Power Parity","title":"Long-Run Exchange Rate Tendency","text":"**Purchasing Power Parity (PPP)**: exchange rates tend toward a level where a basket of goods costs the same across countries. If US prices rise faster than foreign prices, the dollar tends to depreciate in the long run \u2014 restoring PPP. Used for comparing living standards across countries."}],"formulas":[{"eq":"Appreciation: Xn\u2193 \u2192 AD shifts left","label":""},{"eq":"Depreciation: Xn\u2191 \u2192 AD shifts right","label":""}]}],"formulas":[{"eq":"Dollar appreciates \u2192 exports \u2193, imports \u2191 \u2192 Xn \u2193 \u2192 AD left","label":""},{"eq":"Dollar depreciates \u2192 exports \u2191, imports \u2193 \u2192 Xn \u2191 \u2192 AD right","label":""},{"eq":"\u2191US rates \u2192 \u2191dollar demand \u2192 appreciation","label":""}]},"quiz":[{"question":"If the US dollar appreciates against the euro, which of the following is most likely to occur?","options":["A) US exports to Europe increase","B) European imports become more expensive for Americans","C) US net exports decrease, shifting AD to the left","D) The US trade deficit shrinks"],"answer":"C","explanation":"Dollar appreciation makes US exports more expensive for Europeans (exports fall) and European goods cheaper for Americans (imports rise). Net exports (Xn = X \u2212 M) fall \u2192 AD shifts left. The trade deficit worsens (opposite of D).","topic":"exchange_rates"},{"question":"Which of the following would cause the US dollar to APPRECIATE on the foreign exchange market?","options":["A) US inflation rises faster than foreign inflation","B) The Federal Reserve lowers interest rates","C) Foreign investors increase purchases of US Treasury bonds","D) US consumers increase imports from abroad"],"answer":"C","explanation":"Foreign investors buying US Treasuries need dollars \u2192 demand for dollars increases \u2192 dollar appreciates. US inflation (A) causes depreciation. Lower US rates (B) reduce demand for dollars \u2192 depreciation. More imports (D) increase dollar supply \u2192 depreciation.","topic":"exchange_rates"},{"question":"A depreciation of the US dollar would most likely:","options":["A) Make US exports more expensive for foreign buyers","B) Shift US aggregate demand to the left","C) Increase US net exports and shift AD to the right","D) Reduce US import prices and increase consumer welfare"],"answer":"C","explanation":"Depreciation makes US exports cheaper for foreigners (exports rise) and imports more expensive for Americans (imports fall) \u2192 net exports rise \u2192 AD shifts right. This can close a recessionary gap but also raises import prices (D is wrong).","topic":"exchange_rates"},{"question":"Country A has higher inflation than Country B. According to Purchasing Power Parity, Country A's currency will tend to:","options":["A) Appreciate, because higher prices mean more valuable currency","B) Depreciate, because its goods become relatively more expensive","C) Remain stable, since PPP is only a long-run theory","D) Appreciate, as foreign investors seek higher returns"],"answer":"B","explanation":"PPP: higher inflation makes a country's goods relatively more expensive \u2192 foreigners demand less \u2192 currency demand falls \u2192 currency depreciates. In the long run, exchange rates adjust to equalize purchasing power across countries.","topic":"exchange_rates"},{"question":"US income rises significantly, leading Americans to purchase more imported goods. The effect on the foreign exchange market for US dollars is:","options":["A) Demand for dollars increases, causing appreciation","B) Supply of dollars increases, causing depreciation","C) Both supply and demand increase equally, leaving the rate unchanged","D) Demand for dollars decreases, causing depreciation"],"answer":"B","explanation":"To buy foreign imports, Americans must exchange dollars for foreign currency \u2014 they supply more dollars to the foreign exchange market. As supply increases (with demand unchanged), the exchange rate falls \u2014 dollar depreciates.","topic":"exchange_rates"}],"unit":{"id":6,"lbl":"Open Economy & Forex","col":"#f59e0b","ex":"10\u201313%","em":"\ud83c\udf0d"}},{"id":2015,"isDefault":true,"date":"2024-01-06T09:00:00.000Z","title":"6.2 \u2014 The Interest Rate Chain & Balance of Payments","summary":"The most-tested sequence in Unit 6: how the Fed's rate decision flows through exchange rates to net exports and AD. Plus the balance of payments identity that ties trade deficits to capital flows.","studyGuide":{"keyTakeaways":["The chain: Fed raises rates \u2192 US assets attractive \u2192 dollar demand \u2191 \u2192 dollar appreciates \u2192 Xn \u2193 \u2192 AD left.","Balance of payments: Current Account + Capital Account = 0. Always balanced.","Trade deficit (current account deficit) \u2192 capital account surplus (foreign investment inflow).","This chain appears on virtually every AP Macro exam \u2014 memorize it forward and backward."],"sections":[{"title":"The Interest Rate \u2192 Exchange Rate Chain","cards":[{"label":"THE Chain","title":"Fed Policy \u2192 Net Exports \u2192 AD","bullets":["**Step 1**: Fed raises interest rates \u2192 US bonds and assets offer higher returns.","**Step 2**: Foreign investors want US assets \u2192 demand for dollars increases.","**Step 3**: Dollar **appreciates** (stronger dollar).","**Step 4**: US exports become MORE expensive for foreigners \u2192 **exports fall**.","**Step 5**: US imports become CHEAPER for Americans \u2192 **imports rise**.","**Step 6**: Net exports (Xn = X \u2212 M) **fall** \u2192 AD shifts LEFT."]},{"label":"Reverse Chain","title":"Fed Lowers Rates \u2192 AD Right","bullets":["Fed lowers rates \u2192 US assets less attractive \u2192 demand for dollars \u2193 \u2192 dollar depreciates.","Dollar weaker \u2192 exports cheaper \u2192 exports \u2191 \u2192 imports more expensive \u2192 imports \u2193.","Net exports rise \u2192 AD shifts right.","**Full chain reversed**: lower r \u2192 weaker dollar \u2192 higher Xn \u2192 AD right."]}],"formula function loadState() {
  state.apiKey    = localStorage.getItem('apex-key')      || '';
  state.accent    = '#f0c040'; // locked to gold
  // Load user sessions from localStorage
  const userSessions = (JSON.parse(localStorage.getItem('apex-sessions') || '[]'))
    .map(s => s.unit ? s : { ...s, unit: detectUnit(s) });
  // Merge: default sessions first (as base), user sessions on top
  // User sessions with matching unit replace default; extras append
  const userUnitIds = new Set(userSessions.map(s => s.unit?.id).filter(Boolean));
  const defaults = DEFAULT_CURRICULUM.filter(d => !userUnitIds.has(d.unit?.id));
  state.sessions = [...userSessions, ...defaults];
  const saved = JSON.parse(localStorage.getItem('apex-xp') || 'null');
  if (saved) state.xp = saved;
  state.perf      = JSON.parse(localStorage.getItem('apex-perf') || '{}');
  state.lastDrill = parseInt(localStorage.getItem('apex-lastdrill') || '0');
  state.qIdx      = Math.floor(Math.random() * QUOTES.length);
  document.documentElement.style.setProperty('--accent', state.accent);
  document.documentElement.style.setProperty('--c1',     state.accent);
}

function persistSessions() {
  // Only persist sessions that aren't default curriculum
  const userOnly = state.sessions.filter(s => !s.isDefault);
  localStorage.setItem('apex-sessions', JSON.stringify(userOnly));
}
function persistXP()        { localStorage.setItem('apex-xp',         JSON.stringify(state.xp)); }
function persistPerf()      { localStorage.setItem('apex-perf',        JSON.stringify(state.perf)); }
function persistLastDrill() { localStorage.setItem('apex-lastdrill',   String(state.lastDrill)); }

function updateCurSession(patch) {
  if (state.curIdx < 0) return; // guard: invalid index
  state.sessions[state.curIdx] = { ...state.sessions[state.curIdx], ...patch };
  persistSessions();
}

`;

  const xpEl = $('xp');

function getTier(lv) {
  if (lv < 3)  return 'Apprentice';
  if (lv < 6)  return 'Strategist';
  if (lv < 10) return 'Analyst';
  return 'Macro Master';
}

function streakBonus(streak) {
  return Math.min(1 + (streak * 0.05), 1.5); // caps at +50% (30-day streak)
}

function sessionsToday() {
  const td = new Date().toDateString();
  return state.sessions.filter(s => new Date(s.date).toDateString() === td).length;
}

function normTopic(t) {
  return t?.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'') || null;
}

const UNIT_TOPICS = {
  1: ['scarcity','opportunity_cost','ppc','comparative_advantage','supply_demand'],
  2: ['gdp','unemployment','inflation_cpi','business_cycle','gdp_deflator'],
  3: ['asad_model','fiscal_policy','multiplier_effect','automatic_stabilizers','output_gaps'],
  4: ['money_supply','t_accounts','money_multiplier','fed_tools','loanable_funds'],
  5: ['phillips_curve','crowding_out','quantity_theory','long_run_growth','stagflation'],
  6: ['exchange_rates','balance_of_payments','forex_market','interest_rate_chain','net_exports'],
};

function getUnitProfile() {
  const profile = {};
  for (const u of UNITS) {
    const unitSessions = state.sessions.filter(s => s.unit?.id === u.id);
    const perf         = state.perf[u.id];
    const avgScore     = perf?.total > 0
      ? perf.correct / perf.total
      : unitSessions.length && unitSessions[0].instructorGrade
        ? unitSessions[0].instructorGrade.score / 100
        : null;
    const lastStudied  = unitSessions.length
      ? Math.max(...unitSessions.map(s => new Date(s.date).getTime()))
      : null;
    const daysSince    = lastStudied
      ? Math.floor((Date.now() - lastStudied) / 86400000)
      : Infinity;
    const wm           = u.ex.match(/(\d+)[–-](\d+)/);
    const weight       = wm ? (parseInt(wm[1]) + parseInt(wm[2])) / 2 : 15;
    const scoreSignal  = avgScore != null ? (1 - avgScore) : 0.5;
    const urgency      = scoreSignal * (weight / 10) + (Math.min(daysSince, 30) / 45);
    profile[u.id] = {
      id:u.id, lbl:u.lbl, col:u.col, em:u.em, ex:u.ex, weight,
      sessions:unitSessions.length, avgScore, daysSince, urgency,
      ignored: perf?.ignored ?? 0,
    };
  }
  return profile;
}

function getWeakestUnit() {
  const profile = Object.values(getUnitProfile());
  const unstudied = profile.filter(u => u.sessions === 0);
  if (unstudied.length) return unstudied.sort((a,b) => b.weight - a.weight)[0];
  return profile.sort((a,b) => b.urgency - a.urgency)[0];
}

function getWeakTopics(unitId) {
  const topics = state.perf[unitId]?.topics;
  if (!topics) return [];
  return Object.entries(topics)
    .filter(([,v]) => v.total >= 3 && (v.correct / v.total) < 0.6)
    .map(([k,v]) => ({ topic:k, label:k.replace(/_/g,' '), score:v.correct/v.total, total:v.total }))
    .sort((a,b) => a.score - b.score);
}

function getWeakestTopic() {
  let worst = null;
  for (const u of UNITS) {
    const weak = getWeakTopics(u.id);
    if (!weak.length) continue;
    const top = weak[0];
    if (!worst || top.score < worst.score) worst = { ...top, unitId:u.id, unitLbl:u.lbl };
  }
  return worst;
}

function renderAdaptivePressure() {
  if (window._pressureFired) return;
  window._pressureFired = true;

  const G         = state.xp;
  const COOLDOWN  = 1000 * 60 * 10;
  const weakTopic = getWeakestTopic();

  // ── PREDICTIVE: topic-level, highest priority ──
  if (weakTopic && weakTopic.score < 0.5) {
    state.focusUnit = weakTopic.unitId;
    setTimeout(() => {
      axieEnqueue(`⚠️ You're likely to miss ${weakTopic.label} questions — ${Math.round(weakTopic.score*100)}% correct so far.`);
      if (Date.now() - (state.lastDrill || 0) < COOLDOWN) {
        axieEnqueue(`→ Do one session on ${weakTopic.label} to clear this.`);
      } else {
        axieEnqueue(`→ Pulling up a quick drill now.`);
        axieAfterQueue(() => {
          state.lastDrill = Date.now();
          persistLastDrill();
          launchDrill(weakTopic.unitId, weakTopic.topic);
        });
      }
    }, 1800);
    return;
  }

  const weakest = getWeakestUnit();
  const p       = weakest ? getUnitProfile()[weakest.id] : null;

  if (!weakest || state.sessions.length < 2) {
    if (G.streak >= 3) {
      setTimeout(() => axieSay(
        G.streak >= 7
          ? `📈 ${G.streak} days straight. Most people quit by now.`
          : `📊 ${G.streak}-day streak — you're building something real.`
      ), 2000);
    } else if (Math.random() < 0.2) {
      setTimeout(() => axieSay("🧠 Most students skip this part. You're not most students."), 3500);
    }
    return;
  }

  let msg = null, delay = 1800, followUp = null;

  if (p.sessions === 0) {
    if (p.ignored === 0)      { msg = `📌 You haven't touched ${p.em} Unit ${p.id} yet — it's ${p.ex} of the exam.`; followUp = `→ One session on Unit ${p.id} fixes this today.`; }
    else if (p.ignored === 1) { msg = `📌 Unit ${p.id} is still untouched. That gap is growing.`; followUp = `→ Do one session on Unit ${p.id} right now.`; }
    else                      { msg = `🚨 You're actively avoiding Unit ${p.id} (${p.lbl}). That's dangerous.`; followUp = `→ Unit ${p.id} is ${p.ex} of the exam. This is the one.`; }
    if (!state.perf[weakest.id]) state.perf[weakest.id] = { correct:0, total:0, ignored:0, topics:{} };
    state.perf[weakest.id].ignored++; persistPerf();

  } else if (p.avgScore != null && p.avgScore < 0.7) {
    if (p.ignored === 0)      { msg = `⚠️ Unit ${p.id} (${p.lbl}) is your weakest — ${Math.round(p.avgScore*100)}% avg. That's fixable.`; followUp = `→ Do one session on Unit ${p.id} today.`; }
    else if (p.ignored === 1) { msg = `⚠️ Unit ${p.id} is still your weakest. This is starting to matter.`; followUp = `→ One focused session changes this number.`; }
    else                      { msg = `🚨 You're avoiding Unit ${p.id} (${p.lbl}). Real risk before the exam.`; followUp = `→ This is the one. Do it now.`; }
    if (!state.perf[weakest.id]) state.perf[weakest.id] = { correct:0, total:0, ignored:0, topics:{} };
    state.perf[weakest.id].ignored++; persistPerf();

  } else if (p.daysSince >= 4) {
    msg = `📅 Unit ${p.id} was ${p.daysSince} days ago. AP exams don't forget.`;
    followUp = `→ A quick review session keeps it sharp.`;

  } else if (G.streak >= 3) {
    msg = G.streak >= 7
      ? `📈 ${G.streak} days straight. Most people quit by now.`
      : `📊 ${G.streak}-day streak — you're building something real.`;
    delay = 2000;

  } else if (Math.random() < 0.2) {
    msg = "🧠 Most students skip this part. You're not most students.";
    delay = 3500;
  }

  if (msg) {
    setTimeout(() => {
      axieEnqueue(msg);
      if (followUp) axieEnqueue(followUp);
    }, delay);
  }
}

function renderHeroFullBar() {
  const G    = state.xp;
  const xpEl = $('xp');

  xpEl.innerHTML =

     <div class="xp-track"><div class="xp-fill" style="width:100%;background:linear-gradient(90deg,${state.accent},#f0c040)"></div></div>`;
  setTimeout(() => renderHero(), 400);
}

function addXP(pts, msg) {
  const G        = state.xp;
  const streak   = streakBonus(G.streak);
  const count    = sessionsToday();
  const momentum = Math.min(1 + (count - 1) * 0.1, 1.4);
  const actual   = Math.round(pts * streak * momentum);
  G.xp += actual;

  const parts = [`+${actual} XP  ${msg}`];
  if (G.streak >= 2) parts.push(`🔥 +${Math.round((streak-1)*100)}% streak`);
  if (momentum > 1)  parts.push(`⚡ +${Math.round((momentum-1)*100)}% momentum`);
  showToast(parts.join('  '));

  let leveled = false;
  while (G.xp >= xpNeeded(G.lv)) {
    G.xp -= xpNeeded(G.lv);
    G.lv++;
    leveled = true;
  }
  if (leveled) {
    renderHeroFullBar();
    setTimeout(() => {
      launchConfetti('medium');
      const messages = {
        'Apprentice':   `🏆 Apprentice — you're building the habit. Keep going.`,
        'Strategist':   `🏆 Strategist — you're ahead of where you should be.`,
        'Analyst':      `🏆 Analyst — this is where most people stall. You didn't.`,
        'Macro Master': `🏆 Macro Master — you're in rare company now.`,
      };
      axieEnqueue(messages[getTier(G.lv)]);
    }, 400);
  }
  persistXP();
  if (!leveled) renderHero();
}

function checkStreak() {
  const td  = new Date().toDateString();
  const yd  = new Date(Date.now() - 86400000).toDateString();
  if (state.xp.last === td) return;
  const wasStreak  = state.xp.streak;
  const continued  = state.xp.last === yd;
  state.xp.streak  = continued ? state.xp.streak + 1 : 1;
  state.xp.last    = td;
  if (!continued && wasStreak > 0) {
    setTimeout(() => axieSay("⚠️ You almost lost it. Reset — but you're back."), 800);
  } else if ([3, 7, 14].includes(state.xp.streak)) {
    setTimeout(() => {
      launchConfetti();
      axieEnqueue(`🔥 ${state.xp.streak}-day streak! You're locked in.`);
    }, 150);
  }
  persistXP();
}

function countdown() {
  const diff = AP_EXAM_DATE - new Date();
  if (diff <= 0) return { d:0, h:0, done:true };
  return { d: Math.floor(diff / 86400000), h: Math.floor((diff % 86400000) / 3600000), done:false };
}

function showToast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 2100);
}

function launchConfetti(type = 'big') {
  const config = { small: 20, medium: 40, big: 70 };
  const count  = config[type] || 70;
  const cols   = ['#f0c040','#4fc3f7','#a78bfa','#34d399','#fb7185','#c084fc','#ff8c42','#fff'];
  for (let i = 0; i < count; i++) {
    const size = type === 'small' ? 5 : 7;
    const el = document.createElement('div'); el.className = 'cf';
    el.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}vw;background:${cols[Math.floor(Math.random()*cols.length)]};transform:rotate(${Math.random()*360}deg);animation-duration:${1.4+Math.random()*2}s;animation-delay:${Math.random()*.6}s`;
    document.body.appendChild(el); setTimeout(() => el.remove(), 3800);
  }
  // callers own their messages — no axieSay here
}

function ring(pct, col, sz = 38) {
  const r = 14, c = 2*Math.PI*r, d = c*(pct/100), g = c-d;
  return `<div class="ring" style="width:${sz}px;height:${sz}px">
    <svg width="${sz}" height="${sz}" viewBox="0 0 34 34">
      <circle cx="17" cy="17" r="${r}" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="3"/>
      <circle cx="17" cy="17" r="${r}" fill="none" stroke="${col}" stroke-width="3" stroke-dasharray="${d} ${g}" stroke-linecap="round"/>
    </svg>
    <div class="ring-n" style="color:${col}">${pct}%</div>
  </div>`;
}

function upct(uid) {
  return Math.min(100, Math.round((state.sessions.filter(s => s.unit?.id === uid).length / 3) * 100));
}

function uNavBar(activeId) {
  return `<div class="unav">${UNITS.map(u => {
    const on  = activeId === u.id;
    const cnt = state.sessions.filter(s => s.unit?.id === u.id).length;
    return `<button class="unav-btn${on ? ' on' : ''}" onclick="jumpUnit(${u.id})" style="${on ? `border-top-color:${u.col};color:${u.col}` : ''}">
      <span class="unav-n">${u.em}</span>
      <span>${cnt ? cnt + 's' : ''}</span>

  }).join('')}</div>`;
}

const UNIT_OVERVIEWS = [
  {id:1,tag:'The foundation everything else is built on.',intro:'Before you can understand why the stock market moves or what the Fed does, you need to get comfortable with a few big ideas. Unit 1 is all about those fundamentals — and once these click, the rest of AP Macro starts to make sense.',secs:[{t:'Scarcity — the reason economics exists',b:'Here\'s the core problem: people want more than they can have. Resources — time, money, land, labor — are limited. Wants are not. That gap is called **scarcity**, and it\'s why every decision has a cost. Even choosing Netflix over studying has an opportunity cost.'},{t:'Opportunity cost — the real price of everything',b:'Every time you choose one thing, you give up another. That thing you give up is your **opportunity cost**. The true cost of any decision isn\'t just what you paid — it\'s what you didn\'t do instead.'},{t:'The PPC — a picture of what\'s possible',b:'The **Production Possibilities Curve** shows the maximum output a country can produce. On the curve = efficient. Inside = wasting resources. Outside = impossible. Outward shift = **economic growth**.'},{t:'Comparative advantage — why trade makes everyone richer',b:'Even if one country is better at producing everything, it still makes sense to trade. Focus on what you\'re **relatively** better at. Everyone ends up with more.'},{t:'Supply & demand — how markets find their price',b:'When price rises, buyers want less and sellers want more. When they meet, you get **equilibrium**. Master the shifters and you can predict almost any market outcome.'}],tip:'Unit 1 is 5–10% of the exam but runs through everything. Opportunity cost, PPC shifts, and comparative advantage appear in FRQs constantly.'},
  {id:2,tag:'How do we know if the economy is healthy?',intro:'You can\'t fix what you can\'t measure. Unit 2 is about the scoreboard — the tools economists use to take the economy\'s temperature. These are the numbers policymakers obsess over every day.',secs:[{t:'GDP — the economy\'s report card',b:'**Gross Domestic Product** = total value of everything a country produces. GDP = C + Ig + G + Xn. NOT included: used goods, stocks, underground activity. **Real GDP** adjusts for inflation — always use it to compare across years.'},{t:'Unemployment — not everyone counts',b:'You\'re only "unemployed" if actively looking. Stop looking → fall out of labor force → rate goes DOWN. Three types: **frictional** (between jobs), **structural** (skills mismatch), **cyclical** (recession). Natural rate = frictional + structural.'},{t:'Inflation — when your dollar buys less',b:'Inflation = general rise in price level. Main measure = **CPI**. **Borrowers win** — they repay with cheaper dollars. **Lenders and savers lose** — money loses purchasing power.'},{t:'The business cycle — boom and bust',b:'Economies expand, peak, contract, trough. **Recessionary gap** = output below potential. **Inflationary gap** = economy running hot. Where you are determines which policy tools make sense.'}],tip:'Unit 2 is 12–17% of the exam. FRQs love to ask you to calculate unemployment rate, inflation rate, or GDP deflator. Know your formulas cold.'},
  {id:3,tag:'What causes booms and busts — and what can the government do?',intro:'Unit 3 is the biggest, most tested unit. The AS/AD model shows how the whole economy works in one graph, and fiscal policy is what the government does when things go wrong.',secs:[{t:'The AS/AD model — the economy in one graph',b:'**AD** slopes down. **SRAS** slopes up. **LRAS** is vertical at potential output. Where AD meets SRAS = short-run equilibrium. Positive demand shock → ↑ output AND ↑ prices. Negative supply shock = **stagflation** — the worst combo.'},{t:'The multiplier — small changes, big effects',b:'Government spends $1 → becomes income → someone spends 80¢ → and so on. **Spending multiplier** = 1 ÷ MPS. **Tax multiplier** = −MPC ÷ MPS. Always 1 less in absolute value than the spending multiplier.'},{t:'Fiscal policy — the government\'s toolkit',b:'**Expansionary** (recession): ↑ spending, ↓ taxes → AD right. **Contractionary** (inflation): ↓ spending, ↑ taxes → AD left. **Automatic stabilizers** kick in without any new legislation.'},{t:'Long-run self-correction',b:'Recessionary gap → wages fall → SRAS right → full employment. Inflationary gap → wages rise → SRAS left → full employment. Takes time — that\'s why policymakers don\'t always wait.'}],tip:'Unit 3 is 17–27% of the exam. Draw the AS/AD model, show shifts, identify gaps, explain policy — all connected.'},

  {id:5,tag:'What happens in the long run when policy goes wrong — or right?',intro:'Unit 5 is where short-run thinking meets long-run reality. Policies that feel good today can have painful side effects later.',secs:[{t:'The Phillips Curve — inflation vs unemployment',b:'Short run: lower unemployment → higher inflation. **SRPC** is downward sloping. Long run: no trade-off — **LRPC is vertical** at the natural rate. The SRPC mirrors the SRAS — they shift together. Stagflation shifts both SRAS left and SRPC right.'},{t:'Crowding out — the dark side of deficit spending',b:'Government borrows → ↑ demand for loanable funds → real rates rise → private investment falls = **crowded out**. Budget surplus does the reverse: **crowding in** → lower rates → more investment.'},{t:'The Quantity Theory of Money',b:'**M × V = P × Y**. If M doubles and V, Y stay constant → P doubles → inflation. This is why excessive money printing causes inflation in the long run.'},{t:'Long-run economic growth',b:'Real growth = LRAS shifting right. Drivers: ↑ resources, ↑ technology, ↑ productivity. Government accelerates this with R&D, tax credits, education, deregulation. PPC shifts outward.'}],tip:'Unit 5 is 20–30% — highest weight of any unit. Know Phillips Curve shifts, crowding out in the loanable funds graph, and long-run policy consequences cold.'},

];

function detectUnit(s) {
  const tx = [s.title, s.summary, ...(s.studyGuide?.keyTakeaways || []),
    ...(s.studyGuide?.sections || []).map(x => x.title + ' ' + (x.cards || []).map(c => c.title).join(' '))
  ].join(' ').toLowerCase();
  let best = null, top = 0;
  for (const u of UNITS) {
    const sc = u.kw.filter(k => tx.includes(k)).length;
    if (sc > top) { top = sc; best = u; }
  }
  return best || UNITS[3];
}

async function callClaude(msgs, sys) {
  if (!state.apiKey) {
    // FIX C: route through render() instead of calling renderSetup() directly
    state.page     = 'setup';
    state._setupErr = 'Enter your API key to continue.';
    render();
    throw new Error('no-key');
  }
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'content-type':'application/json', 'x-api-key':state.apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body: JSON.stringify({ model:MODEL, max_tokens:4000, system:sys, messages:msgs })
  });
  if (r.status === 401) {
    localStorage.removeItem('apex-key');
    state.apiKey    = '';
    // FIX C: route through render() instead of calling renderSetup() directly
    state.page      = 'setup';
    state._setupErr = '❌ Invalid API key — please re-enter from console.anthropic.com';
    render();
    throw new Error('401');
  }
  if (!r.ok) throw new Error(`API ${r.status}: ${(await r.text()).slice(0, 200)}`);
  return (await r.json()).content.filter(b => b.type === 'text').map(b => b.text).join('');
}

// Compute trail progress state:
// A unit is 'done' if it has ≥1 session
// A unit is 'active' if it's the first with 0 sessions (or all done = unit 6 active)
// Topics inherit from their unit: done if unit done, active if unit active, else locked
function getTrailState() {
  const us = UNITS.map(u => ({
    ...u,
    sessCount: state.sessions.filter(s => s.unit?.id === u.id).length,
    sessions:  state.sessions.map((s,i) => ({s,i})).filter(({s}) => s.unit?.id === u.id),
  }));
  // Find the first unit with 0 sessions — that's the active unit
  let activeIdx = us.findIndex(u => u.sessCount === 0);
  if (activeIdx === -1) activeIdx = us.length - 1; // all done → last is active
  us.forEach((u, i) => {
    u.state = i < activeIdx ? 'done' : i === activeIdx ? 'active' : 'locked';
  });
  return us;
}

// ─────────────────────────────────────────────────────────────────────────────
// TRAIL RENDERING — full path home screen
// ─────────────────────────────────────────────────────────────────────────────

function renderTrailHTML() {
  const trail     = getTrailState();
  const totalSess = state.sessions.length;
  const doneSess  = trail.filter(u => u.state === 'done').length;
  const pct       = Math.round((doneSess / UNITS.length) * 100);
  const G         = state.xp;

  // Progress bar
  const progressBar = `
    <div class="trail-progress-bar fadein">
      <div class="trail-progress-stat">
        <div class="trail-progress-stat-n" style="color:var(--accent)">${doneSess}</div>
        <div class="trail-progress-stat-l">Units Done</div>
      </div>
      <div class="trail-progress-divider"></div>
      <div class="trail-progress-stat">
        <div class="trail-progress-stat-n" style="color:var(--c2)">${totalSess}</div>
        <div class="trail-progress-stat-l">Sessions</div>
      </div>
      <div class="trail-progress-divider"></div>
      <div class="trail-progress-stat">
        <div class="trail-progress-stat-n" style="color:var(--c7)">${G.streak > 0 ? G.streak + ' 🔥' : '0'}</div>
        <div class="trail-progress-stat-l">Day Streak</div>
      </div>
      <div class="trail-progress-divider"></div>
      <div class="trail-progress-pct">
        <div class="trail-progress-pct-label">Course progress — ${pct}%</div>
        <div class="trail-progress-pct-track">
          <div class="trail-progress-pct-fill" style="width:${pct}%"></div>
        </div>
      </div>
      ${!state.apiKey ? `<button class="btn" onclick="state.page='setup';state._setupErr='';render()" style="font-size:11px;white-space:nowrap">🔑 Add Key</button>` : ''}
    </div>`;

  // ════════════════════════════════════════════════════════
  // GEOMETRY
  // SVG_W=420, SVG road curves stay unchanged
  // OUTER = wider nodes-layer so labels have room on both sides
  // SVG sits centered inside OUTER with offset SVG_OX
  // HTML node x = SVG_OX + SVG_nodeX
  // Label zones:
  //   Left  nodes (SVG x=120): HTML x=190 → label in [16..131]
  //   Right nodes (SVG x=300): HTML x=370 → label in [429..544]
  // ════════════════════════════════════════════════════════
  const SVG_W   = 420;
  const SVG_CX  = SVG_W / 2;          // 210 — SVG center
  const OFFSET  = 90;                  // node offset from SVG center
  const OUTER   = 560;                 // nodes-layer width (wider than SVG)
  const SVG_OX  = (OUTER - SVG_W) / 2; // 70 — SVG left offset inside OUTER
  const CX      = SVG_OX + SVG_CX;    // 280 — center in OUTER coords
  const VSTEP   = 230;
  const CP      = 0.35;
  const R       = 43;                  // node circle radius
  const LGAP    = 16;                  // gap from circle edge to label
  const LWID    = 120;                 // label width

  // SVG-space node positions (for road drawing)
  const svgNodeX = idx => idx % 2 === 0 ? SVG_CX - OFFSET : SVG_CX + OFFSET; // 120 or 300
  const svgNodeY = idx => 70 + idx * VSTEP;

  // HTML-space node positions (for HTML elements)
  const nodeX    = idx => SVG_OX + svgNodeX(idx); // 190 or 370
  const nodeY    = idx => svgNodeY(idx);           // same Y

  const finishY  = 70 + trail.length * VSTEP + 60;
  const svgH     = finishY + 110;

  const onLeft   = idx => idx % 2 === 0;

  function bez(t, x0, y0, cpx0, cpy0, cpx1, cpy1, x1, y1) {
    const u = 1 - t;
    return {
      x: u*u*u*x0 + 3*u*u*t*cpx0 + 3*u*t*t*cpx1 + t*t*t*x1,
      y: u*u*u*y0 + 3*u*u*t*cpy0 + 3*u*t*t*cpy1 + t*t*t*y1,
    };
  }

  // ── SVG: roads + shadows ──
  let svgDefs = `<defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;

  let svgRoads = '', svgShadows = '';

  for (let i = 0; i < trail.length - 1; i++) {
    const u    = trail[i];
    const x0   = svgNodeX(i),   y0 = svgNodeY(i);
    const x1   = svgNodeX(i+1), y1 = svgNodeY(i+1);
    const cpx0 = SVG_CX, cpy0 = y0 + VSTEP * CP;
    const cpx1 = SVG_CX, cpy1 = y1 - VSTEP * CP;
    const isDone   = u.state === 'done';
    const isActive = u.state === 'active';

    if (isDone) {
      svgRoads += `<path d="M${x0},${y0} C${cpx0},${cpy0} ${cpx1},${cpy1} ${x1},${y1}"
        fill="none" stroke="${u.col}" stroke-width="26" stroke-linecap="round" opacity="0.22" filter="url(#glow)"/>`;
    }
    svgRoads += `<path d="M${x0},${y0} C${cpx0},${cpy0} ${cpx1},${cpy1} ${x1},${y1}"
      fill="none" stroke="${isDone?u.col:'#3d3428'}" stroke-width="16" stroke-linecap="round"
      opacity="${isDone?'1':isActive?'0.5':'0.25'}"/>`;
    if (isDone) {
      svgRoads += `<path d="M${x0},${y0} C${cpx0},${cpy0} ${cpx1},${cpy1} ${x1},${y1}"
        fill="none" stroke="rgba(255,255,255,.12)" stroke-width="4" stroke-dasharray="10 18" stroke-linecap="round"/>`;
    } else {
      svgRoads += `<path d="M${x0},${y0} C${cpx0},${cpy0} ${cpx1},${cpy1} ${x1},${y1}"
        fill="none" stroke="#4a3f30" stroke-width="3" stroke-dasharray="6 10" stroke-linecap="round" opacity="0.6"/>`;
    }
  }
  // Last unit → finish (in SVG space)
  {
    const last = trail[trail.length-1];
    const x0 = svgNodeX(trail.length-1), y0 = svgNodeY(trail.length-1);
    const x1 = SVG_CX, y1 = finishY;
    const isDone = last.state === 'done';
    svgRoads += `<path d="M${x0},${y0} C${SVG_CX},${y0+60} ${SVG_CX},${y1-60} ${x1},${y1}"
      fill="none" stroke="${isDone?last.col:'#3d3428'}" stroke-width="16" stroke-linecap="round"
      opacity="${isDone?'1':'0.25'}"/>`;
    if (!isDone) svgRoads += `<path d="M${x0},${y0} C${SVG_CX},${y0+60} ${SVG_CX},${y1-60} ${x1},${y1}"
      fill="none" stroke="#4a3f30" stroke-width="3" stroke-dasharray="6 10" stroke-linecap="round" opacity="0.6"/>`;
  }

  // Shadows (SVG space)
  trail.forEach((u, idx) => {
    if (u.state === 'locked') return;
    svgShadows += `<circle cx="${svgNodeX(idx)}" cy="${svgNodeY(idx)+4}" r="46" fill="rgba(0,0,0,.35)" filter="url(#glow)"/>`;
  });
  const allDone = trail.every(u => u.state === 'done');
  if (allDone) svgShadows += `<circle cx="${SVG_CX}" cy="${finishY+4}" r="38" fill="rgba(0,0,0,.35)" filter="url(#glow)"/>`;

  // SVG is centered inside the nodes-layer via SVG_OX offset
  const fullSVG = `<svg class="trail-svg"
    viewBox="0 0 ${SVG_W} ${svgH}"
    xmlns="http://www.w3.org/2000/svg"
    style="height:${svgH}px;position:absolute;left:${SVG_OX}px;top:0;width:${SVG_W}px;pointer-events:none;overflow:visible;">
    ${svgDefs}${svgRoads}${svgShadows}
  </svg>`;

  // ── HTML nodes layer (OUTER width) ──
  let nodesHTML = `<div class="trail-nodes-layer" style="height:${svgH}px;position:relative;width:${OUTER}px;margin:0 auto;">`;

  trail.forEach((u, idx) => {
    const x     = nodeX(idx);   // HTML-space x (includes SVG_OX offset)
    const y     = nodeY(idx);
    const sx    = svgNodeX(idx); // SVG-space x (for waypoint bezier)
    const uc    = u.col;
    const isExp = _trailExpanded === u.id;
    const left  = onLeft(idx);
    const topics = TRAIL_TOPICS[u.id] || [];

    // ── WAYPOINT DOTS + LABELS ──
    // Waypoints computed in SVG space, then offset to HTML space via SVG_OX
    if (idx > 0) {
      const px_svg = svgNodeX(idx-1), py = svgNodeY(idx-1);
      const cx_svg = svgNodeX(idx);
      const cpx0 = SVG_CX, cpy0 = py + VSTEP * CP;
      const cpx1 = SVG_CX, cpy1 = y  - VSTEP * CP;

      [0.25, 0.5, 0.75].forEach((t, ti) => {
        // Bezier point in SVG space
        const pt_svg = bez(t, px_svg, py, cpx0, cpy0, cpx1, cpy1, cx_svg, y);
        // Translate to HTML space
        const pt_x = SVG_OX + pt_svg.x;
        const pt_y = pt_svg.y;
        const tp   = topics[ti] || { lbl: '' };

        const orbBg  = u.state==='done' ? uc : u.state==='active' ? 'var(--card)' : 'var(--surf)';
        const orbBdr = u.state!=='locked' ? uc : 'var(--bdr)';
        const orbSh  = u.state==='done' ? `0 0 10px ${uc}80` : 'none';
        const wpColor = u.state==='done' ? uc : u.state==='active' ? 'var(--mid)' : 'var(--mut)';
        const isAct  = u.state === 'active';

        // Dot (centered on pt_x, pt_y)
        nodesHTML += `<div style="position:absolute;left:${pt_x}px;top:${pt_y}px;
          transform:translate(-50%,-50%);z-index:8;width:24px;height:24px;border-radius:50%;
          background:${orbBg};border:3px solid ${orbBdr};box-shadow:${orbSh};
          display:flex;align-items:center;justify-content:center;
          font-size:10px;font-weight:900;color:${u.state==='done'?'rgba(0,0,0,.7)':'transparent'}">
          ${u.state==='done'?'✓':''}
        </div>`;

        // Label: separate element, positioned LEFT or RIGHT of dot
        // Which side? If pt_x < CX → more room on right; if pt_x >= CX → more room on left
        if (tp.lbl) {
          const wpSide = pt_x < CX ? 'right' : 'left';
          const R_WP   = 12;
          const GAP_WP = 12;
          const W_WP   = LWID + 30; // wider for waypoints — can wrap
          let wpStyle;
          if (wpSide === 'right') {
            wpStyle = `position:absolute;left:${pt_x+R_WP+GAP_WP}px;top:${pt_y-14}px;
              width:${W_WP}px;text-align:left;`;
          } else {
            const rEdge = OUTER - (pt_x - R_WP - GAP_WP);
            wpStyle = `position:absolute;right:${rEdge}px;top:${pt_y-14}px;
              width:${W_WP}px;text-align:right;`;
          }
          nodesHTML += `<div style="${wpStyle}z-index:11;
            color:${wpColor};font-size:12px;font-weight:${isAct?700:500};
            font-family:monospace;letter-spacing:.2px;line-height:1.3;
            white-space:normal;word-break:break-word;">
            ${tp.lbl}
          </div>`;
        }
      });
    }

    // ── SESSION PANEL ──
    let panelHTML = '';
    if (isExp) {
      const panelSide = left
        ? 'right:calc(50% + 56px);left:auto;transform:none'
        : 'left:calc(50% + 56px);right:auto;transform:none';
      let cards = '';
      if (u.sessions.length) {
        cards = u.sessions.slice(0,5).map(({s,i}) => {
          const gr = s.instructorGrade;
          const gc = gr ? (gr.score>=90?'#34d399':gr.score>=75?'#e8a020':'#fb7185') : uc;
          return `<div class="trail-panel-card" onclick="goStudy(${i})">
            <div style="width:8px;height:8px;border-radius:50%;background:${uc};flex-shrink:0;box-shadow:0 0 6px ${uc}80"></div>
            <div style="min-width:0;flex:1">
              <div style="font-weight:700;font-size:12px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e(s.title)}</div>
              <div style="font-family:monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);margin-top:2px">
                ${new Date(s.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}${gr?` · <span style="color:${gc}">${gr.score}/100</span>`:''}
              </div>
            </div>
            <span style="color:${uc};font-size:13px">→</span>
          </div>`;
        }).join('');
        if (u.sessions.length>5) cards+=`<div style="font-size:10px;color:var(--mut);text-align:center;padding:4px 0;font-family:monospace">+${u.sessions.length-5} more</div>`;
      } else {
        cards = `<div style="font-size:11px;color:var(--mut);text-align:center;padding:10px 0;font-style:italic">No sessions yet</div>`;
      }
      panelHTML = `<div class="trail-panel" style="${panelSide};top:-10px;--uc:${uc}">
        <button class="trail-panel-close" onclick="event.stopPropagation();_trailExpanded=null;setApp(renderTrailHTML())">✕</button>
        <div class="trail-panel-title" style="color:${uc}">${u.em} ${u.lbl}</div>
        ${cards}
        <div class="trail-panel-add" style="--uc:${uc}" onclick="goNew()">+ New Session ✨</div>
      </div>`;
    }

    // ── NODE CIRCLE ──
    const nodeBg     = u.state==='done' ? uc : u.state==='active' ? 'var(--card)' : 'var(--surf)';
    const checkBadge = u.state==='done' ? `<div class="trail-badge check">✓</div>` : '';

    nodesHTML += `<div class="trail-node-bubble" id="trail-u-${u.id}"
      style="left:${x}px;top:${y-50}px;--uc:${uc}">
      <div class="trail-node-circle ${u.state}"
        style="background:${nodeBg};--uc:${uc}"
        onclick="trailTapUnit(${u.id})">
        <div class="trail-node-em">${u.em}</div>
        <div class="trail-node-unit">U${u.id}</div>
        ${checkBadge}
      </div>
      ${panelHTML}
    </div>`;

    // ── NODE LABEL — separate div, FULLY OUTSIDE the path ──
    // Left nodes: label sits LEFT of circle, right-aligned
    // Right nodes: label sits RIGHT of circle, left-aligned
    // No truncation — allow wrapping
    const labelColor = u.state==='locked' ? 'var(--mut)' : uc;

    let labelStyle;
    if (left) {
      // Right edge of label = x - R - LGAP
      const rEdge = OUTER - (x - R - LGAP); // from right of OUTER
      labelStyle = `position:absolute;right:${rEdge}px;left:0;
        top:${y-36}px;width:${x-R-LGAP}px;
        text-align:right;z-index:12;padding-right:4px;`;
    } else {
      // Left edge of label = x + R + LGAP
      const lEdge = x + R + LGAP;
      labelStyle = `position:absolute;left:${lEdge}px;right:0;
        top:${y-36}px;width:${OUTER-lEdge}px;
        text-align:left;z-index:12;padding-left:4px;`;
    }

    const yahHTML = u.state==='active'
      ? `<div class="trail-yah" style="--uc:${uc};margin-top:6px;font-size:11px">📍 You are here</div>` : '';

    const dotsHTML = u.sessions.length
      ? `<div class="trail-dots" style="justify-content:${left?'flex-end':'flex-start'};margin-top:6px">
          ${u.sessions.slice(0,5).map(({s,i})=>
            `<div class="trail-dot" style="background:${uc};box-shadow:0 0 5px ${uc}60"
              onclick="event.stopPropagation();goStudy(${i})" title="${e(s.title)}"></div>`
          ).join('')}
          ${u.sessions.length>5?`<span style="font-family:monospace;font-size:9px;color:${uc}">+${u.sessions.length-5}</span>`:''}
        </div>` : '';

    nodesHTML += `<div style="${labelStyle}">
      <div style="font-family:monospace;font-size:13px;font-weight:800;
        letter-spacing:.3px;text-transform:uppercase;line-height:1.3;color:${labelColor};
        word-break:break-word;">${u.lbl}</div>
      <div style="font-family:monospace;font-size:11px;font-weight:500;
        color:var(--mut);margin-top:3px;">${u.ex} of exam</div>
      ${yahHTML}
      ${dotsHTML}
    </div>`;
  });

  // ── FINISH NODE ──
  const finLbl = allDone ? '✨ AP Exam Ready!' : `AP Macro · ${countdown().d} days`;
  // Finish is at SVG center, translate to HTML space
  const finX = SVG_OX + SVG_CX;
  nodesHTML += `
    <div class="trail-finish-node" style="left:${finX}px;top:${finishY-38}px">
      <div class="trail-finish-circle${allDone?' done':''}">
        ${allDone?'🏆':'🎓'}
      </div>
      <div class="trail-finish-lbl" style="color:${allDone?'var(--accent)':'var(--mut)'}">
        ${finLbl}
      </div>
      <div style="margin-top:14px">
        <button class="btn-hi" onclick="goNew()" style="font-size:12px;padding:9px 22px">+ New Session ✨</button>
      </div>
    </div>`;

  nodesHTML += '</div>';

  return `<div style="max-width:860px;margin:0 auto">
    <div class="page fadein" style="padding-bottom:5rem">
      ${progressBar}
      <div class="trail-outer" style="overflow:visible;">
        <div style="position:relative;width:${OUTER}px;max-width:100%;margin:0 auto;">
          ${fullSVG}
          ${nodesHTML}
        </div>
      </div>
    </div>
  </div>`;
}

function trailTapUnit(id) {
  // Free travel — no locked gate. Students can jump to any unit.
  if (_trailExpanded === id) {
    _trailExpanded = null;
  } else {
    _trailExpanded = id;
  }
  setApp(renderTrailHTML());
  setTimeout(() => { animateTrailSpine(); }, 80);
  setTimeout(() => {
    const el = document.getElementById(`trail-u-${id}`);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
  }, 120);
}

function renderSessions() {
  let out = `<button class="btn-hi btn-full" onclick="goNew()" style="margin-bottom:22px">+ New Session ✨</button>`;

  if (!state.sessions.length) return out + `<div class="card fadein" style="text-align:center;padding:3rem 2rem">

  </div>`;

  for (const u of UNITS) {
    const us = state.sessions.map((s, i) => ({ s, i })).filter(({ s }) => s.unit?.id === u.id);
    if (!us.length) continue;
    out += `<div class="sh"><span class="sh-n" style="color:${u.col}">0${u.id}</span><span class="sh-t" style="color:${u.col}">${u.em} ${u.lbl}</span></div>`;
    out += us.map(({ s, i }) => {
      const gr = s.instructorGrade;
      const gc = gr ? gr.score >= 90 ? '#34d399' : gr.score >= 75 ? '#f0c040' : '#fb7185' : 'var(--mut)';
      return `<div class="scard fadein" style="border-color:${u.col}" onclick="goStudy(${i})">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:14px;color:var(--txt);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e(s.title)}</div>
          <div class="lbl">${e(s.date)} · ${s.flashcards?.length||0} cards · ${s.quiz?.length||0} q${gr ? ` · <span style="color:${gc}">${gr.score}/100</span>` : ''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
          ${ring(upct(u.id), u.col, 34)}
          <button class="btn btn-del" onclick="event.stopPropagation();delSession(${i})">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  const untagged = state.sessions.map((s, i) => ({ s, i })).filter(({ s }) => !s.unit);
  if (untagged.length) {
    out += `<div class="sh"><span class="sh-t">Untagged</span></div>`;
    out += untagged.map(({ s, i }) => `<div class="scard" style="border-color:var(--bdr2)" onclick="goStudy(${i})">
      <div><div style="font-weight:600;font-size:14px;color:var(--txt)">${e(s.title)}</div><div class="lbl">${e(s.date)}</div></div>
      <button class="btn btn-del" onclick="event.stopPropagation();delSession(${i})">✕</button>
    </div>`).join('');

async function doGen() {
  const tx = $('tx')?.value?.trim(); if (!tx) return;
  $('gb').disabled = true; $('gl').style.display = 'flex'; $('ge').textContent = '';
  try {
    const sys = `You are an expert AP Macroeconomics tutor. Given a lecture transcript, respond ONLY with valid JSON — no markdown fences:
{"title":"concise title","summary":"2-3 sentence plain-English summary","instructorGrade":{"score":85,"rationale":"2-3 honest sentences. Score 1-100: clarity (40pts), examples (20pts), AP coverage (20pts), engagement (20pts)."},"studyGuide":{"keyTakeaways":["...","...","...","..."],"sections":[{"title":"Section Title","cards":[{"label":"label","title":"Card Title","bullets":["point with **bold** terms"]},{"label":"label","title":"Card Title","text":"prose with **bold** terms"}],"formulas":[{"eq":"formula","label":"what it means"}]}],"formulas":[{"eq":"formula","label":"description"}]},"flashcards":[{"term":"...","definition":"...","example":"..."}],"quiz":[{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"answer":"A","explanation":"...","topic":"snake_case_topic"}],"resources":[{"name":"...","url":"...","why":"..."}]}
Rules: 2-3 sections, 2-3 cards each. 4 takeaways. 3-5 global formulas. 6 flashcards. 5 quiz questions (answer=single letter). 3 resources.`;
    const raw    = await callClaude([{ role:'user', content:`Transcript:\n${tx.slice(0,6000)}` }], sys);
    const parsed = JSON.parse(raw.replace(/^```json|^```|```$/gm,'').trim());
    const s      = { id:Date.now(), date:new Date().toISOString(), transcript:tx, ...parsed };
    s.unit = detectUnit(s);
    state.sessions.unshift(s);
    persistSessions();
    checkStreak();
    state.xp.sess++;
    persistXP(); // FIX E: persist sess count immediately
    addXP(50, 'New session!');
    launchConfetti();
    const todayCount = sessionsToday();
    if (todayCount >= 2) {
      setTimeout(() => axieSay(`⚡ ${todayCount} sessions today — momentum active. XP boosted.`), 900);
    } else {
      setTimeout(() => axieSay('🔥 New session unlocked — let\'s go!'), 400);
    }
    goStudy(0);
  } catch (err) {
    if (err.message !== '401' && err.message !== 'no-key') { $('ge').textContent = 'Error: ' + err.message; }
    $('gb').disabled = false; $('gl').style.display = 'none';
  }
}
